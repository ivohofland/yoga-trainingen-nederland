name: Deploy

# Runs ONLY after the `validate` workflow succeeds on main.
#
# The workflow name here must match `name:` in validate.yml exactly. ivohofland.dev's copy
# of this file watches a workflow called "CI"; ours is called "validate", and a typo here
# does not error — the trigger simply never fires, and the site quietly stops deploying.
on:
  workflow_run:
    workflows: ["validate"]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    # Three checks, not one. `workflow_run` fires for every run of the named workflow,
    # whatever triggered it — including `validate.yml`'s `pull_request` runs. A fork PR
    # whose head branch happens to be named `main` makes `head_branch == "main"` true even
    # though nothing pushed to THIS repo's main, so `conclusion == 'success'` alone would
    # still match and this job would run with secrets and POST the deploy ping. It can't
    # deploy the fork's code — the server always resets to this repo's own `origin/main` —
    # but an outsider could make the VPS rebuild on demand for free. `event == 'push'`
    # closes that; `head_repository.full_name == github.repository` closes the remaining
    # edge (a branch named `main` in this repo that isn't the one push runs on).
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    # This job only POSTs to an external webhook URL; it never touches the GITHUB_TOKEN,
    # so it is granted none of its scopes.
    permissions: {}
    runs-on: ubuntu-latest
    steps:
      # Stays green and no-ops until the DEPLOY_WEBHOOK_* secrets are configured, so this
      # file can land before the server exists.
      - name: Check deploy config
        id: cfg
        env:
          URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
        run: |
          if [ -z "${URL:-}" ]; then
            echo "DEPLOY_WEBHOOK_URL not set — skipping (add the webhook secrets to enable)."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      # A signed HTTPS ping, and nothing else. The server pulls itself; there is no inbound
      # SSH and no IP to whitelist. The only inbound is this POST on 443, authenticated by
      # an HMAC-SHA256 signature the listener verifies before it runs anything.
      - name: Trigger deploy webhook
        if: ${{ steps.cfg.outputs.ready == 'true' }}
        env:
          URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          SECRET: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}
        run: |
          body='{"ref":"refs/heads/main"}'
          sig="sha256=$(printf '%s' "$body" | openssl dgst -sha256 -hmac "$SECRET" | awk '{print $NF}')"
          code=$(curl -sS -X POST "$URL" \
            --max-time 30 \
            -H 'Content-Type: application/json' \
            -H "X-Hub-Signature-256: $sig" \
            --data "$body" \
            -o /dev/null -w '%{http_code}')
          echo "webhook responded: HTTP $code"
          test "$code" = "200"
