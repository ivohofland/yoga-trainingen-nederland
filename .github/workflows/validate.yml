name: validate

on:
  push:
  pull_request:

defaults:
  run:
    working-directory: yoga-trainingen-directory

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: yoga-trainingen-directory/package-lock.json
      - run: npm ci
      # The gate everything passes through: parses every record, checks
      # referential integrity, and fails the run on invalid data.
      - run: npm run validate
      # THE INVARIANTS. `npm run build` runs gen-schema → validate → provenance →
      # test → test:ci → export-json → next build (package.json is the source of
      # truth for the exact order) — and npm's own `postbuild` lifecycle hook then
      # runs scripts/verify-export.ts against the export `next build` just wrote,
      # automatically, as part of this SAME `npm run build` invocation: a failure
      # there fails this step's exit code too, not a separate one. It is the same
      # gate a contributor runs locally — so CI cannot pass a change that
      # `npm run build` would refuse.
      #
      # Until this line existed, CI ran `validate` and NOTHING ELSE: every one of
      # the editorial invariants — a finding never rendered as a gap, our
      # arithmetic never rendered in a school's own ink, a claim quoted verbatim —
      # gated nothing whatever on push or on a pull request. They were tests that
      # only failed on the machine of whoever remembered to run them.
      #
      # `npm test` is listed separately, and FIRST, on purpose: it is the check
      # whose failure must be legible in the run log, not buried inside a Next.js
      # build. (`build` runs it again; a passing suite makes that a no-op.)
      - run: npm test
      - run: npm run build
      #
      # `npm run provenance` (the STRICT pass) DOES run here — it's inside `npm run
      # build` above, not a separate step, and it is a build gate: a failure fails
      # this job. But it proves less in CI than it does on a researcher's machine.
      # Archive bodies are gitignored — the .sha256 beside each one is committed,
      # the copyrighted page is not (data/archives/README.md) — so a CI checkout
      # can open almost none of the artifacts the check exists to read. Its
      # STRUCTURAL tier ("you cited a page that is in no archive") needs only the
      # record plus the committed .sha256 sidecars, so it runs and gates the build
      # everywhere, CI included. Its CONTENT tier ("we opened the artifact and the
      # fact is not in it") needs the body: where the body is absent, that claim is
      # SKIPPED, not passed — the run prints `INHOUD NIET GETOETST` rather than a
      # green tick. So a green run here means the structural tier held, not that
      # the artifacts were read; that full read only happens locally, where the
      # archives are.
