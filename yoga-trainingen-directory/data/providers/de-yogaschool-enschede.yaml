programs:
  - id: docentenopleiding-raja
    name: "Docentenopleiding Raja Yoga"
    url: https://yogaschool.nl/docentenopleiding/
    format_label: other
    style_claimed: >
      Klassieke Raja Yoga (het 8-ledige pad van Patanjali), met Hatha en Raja
      geïntegreerd ("geen Hatha Yoga zonder Raja Yoga, geen Raja Yoga zonder
      Hatha Yoga"). Asana + energiebeheersing (pranayama), concentratie &
      meditatie (richting Samadhi), het drievoudige lichaam en de viervoudige
      geest, plus theorie uit de klassieke geschriften (Yogasutra's van
      Patanjali, Bhagavad Gita, Hatha Yoga Pradipika, Atma Vidya).
      Praktijkgericht; sterk op persoonlijke ontwikkeling en Dharma.
      Nederlandstalig.
    styles: [ raja, hatha ]
    accreditation:
      - body: other
        label_claimed: >
          "Samen met de voorafgaande Basisopleiding beantwoordt de opleiding
          ruimschoots aan de standaard van 500 uren van de Internationale Yoga
          Federatie." Plus NRTO-kwaliteitskeurmerk.
        verified: unknown
        source: site-docenten-2026-07
        note: >
          Benchmark tegen de IYF-500u-standaard (Internationale Yoga Federatie),
          NIET Yoga Alliance; geldt voor Basis + Docenten gecombineerd.
          NRTO-keurmerk op schoolniveau. Geen van beide onafhankelijk
          register-geverifieerd.
    delivery:
      mode: in_person
      structure: mixed
      duration_months_min: 36
      language: nl
    prerequisites_claimed: >
      Afgeronde Basisopleiding Raja Yoga (1 jaar, €1510) is voorwaarde. Voor wie
      nog niet bij de school bekend is: kennismakingsgesprek/intake. Gericht op
      persoonlijke ontwikkeling; wekelijkse lessen + dagelijkse eigen
      beoefening.
    price:
      amount_eur: 4590
      vat: unknown
      published: yes
      note: >
        €1530/jaar (per 1 jan 2026), betaald in termijnen van €153/mnd (10 mnd);
        lesboeken inbegrepen. De Docentenopleiding duurt 3 jaar ⇒ ca. €4590
        totaal (3 × €1530). Geen btw-vermelding op de pagina → vat unknown (NRTO
        ≠ btw-vrijstelling; niet CRKBO).
      source: site-docenten-2026-07
    hours_claimed:
      total: 600
      contact: 360
      self_study: 240
      supervised_teaching_practice: null
      breakdown_published: yes
      source: site-docenten-2026-07
      note: >
        120 lesblokken van wekelijks 3 uur = 360 contacturen over 3 jaar +
        minimaal 240 uur zelfstudie (min. 1 uur per dag) = 600 uur totaal. Een
        geïsoleerd lespraktijk-/supervised-teaching-getal wordt niet gegeven; de
        opleiding is sterk beoefenings-/theoriegericht met een eindexamen, niet
        primair lespraktijk-uren.
    composition:
      type: single_program
    assessment_described:
      exists: yes
      continuous: yes
      final: yes
      quote: >
        "In het examen worden 3 onderdelen getoetst door de examencommissie. Dat
        zijn de asana's, theorie uit de eerste 4 lesjaren en de ontwikkelde
        contemplatie vaardigheden ... Er zijn twee examen momenten per lesjaar."
    track_record:
