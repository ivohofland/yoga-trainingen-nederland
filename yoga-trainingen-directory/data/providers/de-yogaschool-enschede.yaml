id: de-yogaschool-enschede
name: De Yogaschool
aka: [ "De Yogaschool Enschede", "Yogaschool Enschede", "Yogaschool.nl" ]
website: https://yogaschool.nl
status: active
# Klassieke Raja Yoga-school (~30 jaar). NIET Yoga Alliance: de school benchmarkt
# tegen de 500-urenstandaard van de Internationale Yoga Federatie (IYF) en voert het
# NRTO-kwaliteitskeurmerk. Meerjarig traject: Basisopleiding → Docentenopleiding →
# Meesteropleiding.
locations:
  - city: Enschede
    address: "Emmastraat 147"
    note: "hoofdlocatie/kennismakingsgesprekken (Emmastraat 147, Enschede). De
      school noemt daarnaast meerdere leslocaties (over-ons/locaties); niet
      uitputtend geverifieerd."
crkbo:
  registered: no
  checked: "2026-07-01"
  source: crkbo-register-2026-07
  note: >
    Geen treffer: naam "Yogaschool" en website "yogaschool" → 3 andere
    instellingen (De Nieuwe Yogaschool Online, Yogaschool de Toermalijn,
    Yogaschool Nooord), GEEN yogaschool.nl / De Yogaschool Enschede
    (2026-07-01). Niet CRKBO-Instelling. De opleidingspagina's vermelden geen
    btw → price.vat = unknown (§4.11; NRTO is een kwaliteitskeurmerk, geen
    btw-vrijstelling en geen CRKBO).
registrations:
  - body: other
    identifier: "NRTO-kwaliteitskeurmerk (De Nederlandse Raad voor Training en
      Opleidingen)"
    holder: "De Yogaschool"
    verified_in_register: unknown
    source: site-basis-2026-07
    note: >
      De Basisopleidingspagina claimt: "Wij hebben het kwaliteitskeurmerk van de
      NRTO ontvangen". NRTO is een algemeen Nederlands opleidings-/
      trainingskeurmerk (niet yoga-specifiek, geen YA, geen btw-vrijstelling).
      Claim verbatim vastgelegd; het NRTO-ledenregister is niet apart bevraagd →
      verified_in_register unknown.
legal:
  legal_name: "onbekend (De Yogaschool)"
  note: >
    Klassieke Raja Yoga-school in Enschede, ~30 jaar actief (de
    Docentenopleiding start in 2026 "voor de 30e keer"). Senior leerkrachten
    ("Yogacharya's") Patrick Ros en Ylvy Vaanholt; breder docententeam o.a. José
    Oudhoff, Monika Farkas, Sandra, Linda, Wam, Leonie, Han, Mascha. Curriculum
    leunt op een esoterisch-theosofisch getinte Raja Yoga-lijn (lesboek Atma
    Vidya van Y. Saraswati; Meesteropleiding met "Witte Magie", de
    7-stralenleer/esoterische psychologie en esoterische genezing).
    KvK/juridische naam niet doorzocht.
