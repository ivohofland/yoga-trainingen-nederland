        totaal studeer je minimaal 3 jaar." 3 × €1530 = €4590 is ONZE rekensom;
        4590 staat op geen enkele gearchiveerde pagina van deze school. Let op:
        drie jaar is het MINIMUM dat de school noemt ("Je kunt daarna aanvullend
        verder studeren") — het afgeleide totaal is dus een ondergrens. Geen
