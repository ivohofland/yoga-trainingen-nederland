# yaml-language-server: $schema=../provider.schema.json
id: de-yogaschool-enschede
name: De Yogaschool
aka: [ "De Yogaschool Enschede", "Yogaschool Enschede", "Yogaschool.nl" ]
website: https://yogaschool.nl
status: active
# Klassieke Raja Yoga-school (~30 jaar). NIET Yoga Alliance: de school benchmarkt
# tegen de 500-urenstandaard van de Internationale Yoga Federatie (IYF) en voert het
# NRTO-kwaliteitskeurmerk. Meerjarig traject: Basisopleiding → Docentenopleiding →
# Meesteropleiding.
locations:
  - city: Enschede
    address: "Emmastraat 147"
    note: "hoofdlocatie/kennismakingsgesprekken (Emmastraat 147, Enschede). De
      school noemt daarnaast meerdere leslocaties (over-ons/locaties); niet
      uitputtend geverifieerd."
crkbo:
  registered: no
  checked: "2026-07-01"
  source: crkbo-register-2026-07
  note: >
    Geen treffer: naam "Yogaschool" en website "yogaschool" → 3 andere
    instellingen (De Nieuwe Yogaschool Online, Yogaschool de Toermalijn,
    Yogaschool Nooord), GEEN yogaschool.nl / De Yogaschool Enschede
    (2026-07-01). Niet CRKBO-Instelling. De opleidingspagina's vermelden geen
    btw → price.vat = unknown (§4.11; NRTO is een kwaliteitskeurmerk, geen
    btw-vrijstelling en geen CRKBO).
registrations:
  - body: other
    identifier: "NRTO-kwaliteitskeurmerk (De Nederlandse Raad voor Training en
      Opleidingen)"
    holder: "De Yogaschool"
    verified_in_register: unknown
    source: site-basis-2026-07
    note: >
      De Basisopleidingspagina claimt: "Wij hebben het kwaliteitskeurmerk van de
      NRTO ontvangen". NRTO is een algemeen Nederlands opleidings-/
      trainingskeurmerk (niet yoga-specifiek, geen YA, geen btw-vrijstelling).
      Claim verbatim vastgelegd; het NRTO-ledenregister is niet apart bevraagd →
      verified_in_register unknown.
legal:
  legal_name: "onbekend (De Yogaschool)"
  note: >
    Klassieke Raja Yoga-school in Enschede, ~30 jaar actief (de
    Docentenopleiding start in 2026 "voor de 30e keer"). Senior leerkrachten
    ("Yogacharya's") Patrick Ros en Ylvy Vaanholt; breder docententeam o.a. José
    Oudhoff, Monika Farkas, Sandra, Linda, Wam, Leonie, Han, Mascha. Curriculum
    leunt op een esoterisch-theosofisch getinte Raja Yoga-lijn (lesboek Atma
    Vidya van Y. Saraswati; Meesteropleiding met "Witte Magie", de
    7-stralenleer/esoterische psychologie en esoterische genezing).
    KvK/juridische naam niet doorzocht.
depth: listed
last_verified: "2026-07-01"
sources:
  - id: site-basis-2026-07
    type: website
    url: https://yogaschool.nl/yoga-opleiding/
    archived_url: https://web.archive.org/web/20260702063435/https://yogaschool.nl/yoga-opleiding/
    captured: "2026-07"
    note: >
      /yoga-opleiding/ — een ALGEMENE opleidingspagina, NIET de eigen pagina van
      de Basisopleiding (dat is /basisopleiding/, zie de bron hieronder).
      Klassiek 8-ledig systeem (Yama's/Niyama's, asana,
      energiebeheersing/pranayama, concentratie & meditatie). Iedere maand in
      2025 nieuwe Basisopleidingen; toegang na kennismakingsgesprek (met Ylvy of
      Mascha, Emmastraat 147). Draagt het NRTO-kwaliteitskeurmerk.

      TWEE PAGINA'S, TWEE PRIJZEN — een bevinding, geen keuze. Deze pagina zegt
      letterlijk: "De kosten voor de opleiding zijn €1510,00 per jaar. Dit wordt
      betaald in termijnen van €1510,00 per maand (10 maanden)." (het
      termijnbedrag is op de pagina zelf een kennelijke fout: €1510 per maand ×
      10 ≠ €1510 per jaar). De eigen Basisopleidingspagina zegt: "De kosten voor
      de Basisopleiding vanaf januari 2026 zijn € 1590,00 per seizoen of lesjaar
      van 40 weken." Beide staan er, beide zijn gearchiveerd; de school noemt
      geen van beide bedragen achterhaald. De verplichte-vooropleiding-kosten
      worden geciteerd aan de pagina die de Basisopleiding zelf beschrijft
      (site-basisopleiding-2026-07, € 1.590), en dít blijft staan als het
      gepubliceerde andere bedrag.
    local_snapshot: data/archives/de-yogaschool-enschede/site-basis-2026-07-2026-07-02.pdf
  - id: site-basisopleiding-2026-07
    type: website
    url: https://yogaschool.nl/basisopleiding/
    archived_url: https://web.archive.org/web/20260713202536/https://yogaschool.nl/basisopleiding/
    captured: "2026-07"
    note: >
      DE EIGEN PAGINA VAN DE BASISOPLEIDING — de opleiding die verplicht is
      vóór de Docentenopleiding, en tot v0.9 nergens in dit record als bron
      stond. Letterlijk: "De kosten voor de Basisopleiding vanaf januari 2026
      zijn € 1590,00 per seizoen of lesjaar van 40 weken. Dit wordt betaald in
      termijnen van € 159,00 per maand (10 maanden)." Lesmateriaal/lesboeken
      (t.w.v. € 125) inbegrepen. Duur: "De basisopleiding bestaat uit 40
      lesblokken van wekelijks 2 1/2 uur, verspreid over een jaar" — één lesjaar,
      dus één periode. "Er zijn minimaal 100 lesuren en er staan 80
      thuisstudie-uren per lesjaar." De poort, letterlijk: "Aangezien de
      Basisopleiding je het fundament over Raja Yoga bijbrengt, is deze opleiding
      verplicht als je wilt starten met de Docentenopleiding." Geen
      btw-vermelding op de pagina.
    local_snapshot: data/archives/de-yogaschool-enschede/site-basisopleiding-2026-07-2026-07-13.pdf
  - id: site-docenten-2026-07
    type: website
    url: https://yogaschool.nl/docentenopleiding/
    archived_url: null
    captured: "2026-07"
    note: >
      LIVE Docentenopleiding Raja Yoga (vervolg op de Basisopleiding): 120
      lesblokken van wekelijks 3 uur (ochtend of avond), 3 jaar / 360
      contacturen + minimaal 240 uur zelfstudie (min. 1 uur zelfwerkzaamheid per
      dag). "Start dit jaar voor de 30e keer"; samen met de Basisopleiding
      "beantwoordt ruimschoots aan de standaard van 500 uren van de
      Internationale Yoga Federatie" (IYF — géén Yoga Alliance). Afronding met
      examen (examencommissie: asana's, theorie eerste 4 lesjaren,
      contemplatievaardigheden; 2 examenmomenten per lesjaar, herkansing
      mogelijk) → Raja Yogadocent. Lesindeling 1,5u asana+pranayama, 20 min
      concentratie/meditatie, theepauze, 0,5-1u theorielezing. Kosten per 1 jan
      2026 €1530/jaar (termijnen €153/mnd ×10; lesboeken incl.: Atma Vidya (Y.
      Saraswati), Yogasutra's van Patanjali, Bhagavad Gita, Hatha Yoga
      Pradipika). Start na zomer- of kerstvakantie. Docenten: Sandra, Ylvy,
      Linda, Wam, Leonie, Han, Monika, José.
    local_snapshot: data/archives/de-yogaschool-enschede/site-docenten-2026-07-2026-07-02.pdf
  - id: site-meester-2026-07
    type: website
    url: https://yogaschool.nl/meesteropleiding/
    archived_url: https://web.archive.org/web/20260702063729/https://yogaschool.nl/meesteropleiding/
    captured: "2026-07"
    note: >
      LIVE Meesteropleiding Raja Yoga (vervolg ná de Docentenopleiding): 120
      lesblokken van wekelijks 3 uur, min. 3 jaar, min. 1,5u zelfwerkzaamheid
      per dag. Driejarige themalijn: jaar 1 "Witte Magie", jaar 2 "Esoterische
      Psychologie" (7-stralenleer), jaar 3 "Esoterische Genezing". Bij succesvol
      afstuderen "traditionele erkenning en werk aangeboden als docent van een
      docentenopleiding". Kosten €1530/jaar (termijnen €153/mnd ×10; lesboeken
      incl.). Leerkrachten: Yogacharya's Patrick Ros en Ylvy Vaanholt, plus José
      Oudhoff en Monika Farkas (o.a. Mascha, Han).
    local_snapshot: data/archives/de-yogaschool-enschede/site-meester-2026-07-2026-07-02.pdf
