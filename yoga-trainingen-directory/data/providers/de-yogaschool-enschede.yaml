claims:
  - id: meester-lineage
    scope: program:meesteropleiding-raja
    quote: >
      "Het eerste jaar: Witte Magie. ... Het tweede jaar: Esoterische
      Psychologie. ... [de] intrinsieke conditie volgens de 7 stralenleer. ...
      Het derde jaar: Esoterische Genezing."
    category: lineage_authority
    source: site-meester-2026-07
    analysis:
      note: >
        ATTRIBUTIE (beschrijvend, niet-evaluatief): de driejarige themalijn van
        de Meesteropleiding komt één-op-één overeen met het corpus van Alice A.
        Bailey / "Djwhal Khul" (theosofische "Ageless Wisdom", uitgegeven door
        Lucis Trust): "Witte Magie" = A Treatise on White Magic (1934);
        "Esoterische Psychologie" + de 7-stralenleer = Esoteric Psychology (A
        Treatise on the Seven Rays); "Esoterische Genezing" = Esoteric Healing.
        De lineage is dus niet een klassiek-Indiase yogastroming maar 20e-eeuwse
        Westerse theosofie/esoterie, gelegd bovenop een klassieke
        Patanjali-Raja-Yoga-basis (de Basis-/Docentenopleiding). De school
        presenteert dit als "de heilige Raja Yoga wetenschap"/"traditioneel"
        zonder de Bailey/theosofische herkomst expliciet te benoemen — relevant
        voor lezers die "traditionele Raja Yoga" als Indiaas-klassiek zouden
        lezen. Onderbouwing: correspondentie van de boektitels (zie
        lit-alice-bailey-2026-07).
      status: accurate
      reviewed: "2026-07"
      methodology_version: "0.1"

