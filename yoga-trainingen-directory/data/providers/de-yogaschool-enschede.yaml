programs:
  - id: docentenopleiding-raja
    name: "Docentenopleiding Raja Yoga"
    url: https://yogaschool.nl/docentenopleiding/
    format_label: other
    style_claimed: >
      Klassieke Raja Yoga (het 8-ledige pad van Patanjali), met Hatha en Raja
      geïntegreerd ("geen Hatha Yoga zonder Raja Yoga, geen Raja Yoga zonder
      Hatha Yoga"). Asana + energiebeheersing (pranayama), concentratie &
      meditatie (richting Samadhi), het drievoudige lichaam en de viervoudige
      geest, plus theorie uit de klassieke geschriften (Yogasutra's van
      Patanjali, Bhagavad Gita, Hatha Yoga Pradipika, Atma Vidya).
      Praktijkgericht; sterk op persoonlijke ontwikkeling en Dharma.
      Nederlandstalig.
    styles: [ raja, hatha ]
    accreditation:
      - body: other
        label_claimed: >
          "Samen met de voorafgaande Basisopleiding beantwoordt de opleiding
          ruimschoots aan de standaard van 500 uren van de Internationale Yoga
          Federatie." Plus NRTO-kwaliteitskeurmerk.
        verified: unknown
        source: site-docenten-2026-07
        note: >
          Benchmark tegen de IYF-500u-standaard (Internationale Yoga Federatie),
          NIET Yoga Alliance; geldt voor Basis + Docenten gecombineerd.
          NRTO-keurmerk op schoolniveau. Geen van beide onafhankelijk
          register-geverifieerd.
    delivery:
      mode: in_person
      structure: mixed
      duration_months_min: 36
      language: nl
    prerequisites_claimed: >
      "Je kunt met de Docentenopleiding beginnen na het volbrengen van de
      Basisopleiding." Voor wie nog niet bij de school bekend is:
      kennismakingsgesprek/intake. Gericht op persoonlijke ontwikkeling;
      wekelijkse lessen + dagelijkse eigen beoefening. (Het bedrag van de
      Basisopleiding stond hier tot v0.9 in proza — als "€1510", het bedrag van
      de ALGEMENE opleidingspagina. De eigen Basisopleidingspagina noemt € 1.590
      per lesjaar; de poort staat nu gestructureerd in `prerequisite[]`, met de
      bron die haar prijs stelt, zodat de vergelijking haar kan zien.)
    prerequisite:
      - kind: program
        label: "Basisopleiding Raja Yoga"
        cost_eur: 1590
        period: per_year
        periods: 1
        source: site-basisopleiding-2026-07
        note: >
          "Aangezien de Basisopleiding je het fundament over Raja Yoga bijbrengt,
          is deze opleiding verplicht als je wilt starten met de
          Docentenopleiding." Kosten: "€ 1590,00 per seizoen of lesjaar van 40
          weken" (vanaf januari 2026), en de opleiding duurt één lesjaar ("40
          lesblokken ... verspreid over een jaar") → één periode, € 1.590. De
          Basisopleiding is GEEN docentenopleiding en staat daarom niet als eigen
          `program` in dit record; haar prijs staat hier, geciteerd aan de pagina
          die haar afdrukt. LET OP: de algemene opleidingspagina
          (site-basis-2026-07) noemt voor de Basisopleiding €1510,00 per jaar —
          twee gepubliceerde bedragen voor dezelfde opleiding; zie de bronnoten.
    price:
      amount_eur: 1530
      period: per_year
      periods: 3
      vat: unknown
      published: yes
      note: >
        DE SCHOOL PUBLICEERT GEEN TOTAALPRIJS. Ze publiceert een JAARPRIJS: "De
        kosten voor de docentenopleiding zijn: per 1 januari 2026: €1530,00 per
        jaar. Wordt betaald in termijnen van €153,00 per maand (10 maanden)."
        Lesboeken zijn inbegrepen. En ze publiceert de duur: "De opleiding neemt
        drie jaar of 360 uren in beslag." 3 × €1530 = €4590 is ONZE rekensom —
        het getal 4590 komt in geen enkel gearchiveerd artefact van deze school
        voor, en werd tot v0.8 in `amount_eur` bewaard en als hún gepubliceerde
        prijs gerenderd. Nu: `period: per_year` + `periods: 3`; het totaal wordt
        afgeleid en zichtbaar als het onze getoond (spec §6). Geen
        btw-vermelding op de pagina → vat unknown (§4.11; NRTO is een
        kwaliteitskeurmerk, geen btw-vrijstelling, en de school staat niet in
        het CRKBO-register).
      source: site-docenten-2026-07
    hours_claimed:
      total: null
      contact: 360
      self_study: 240
      supervised_teaching_practice: null
      breakdown_published: yes
      contact_published: yes
      source: site-docenten-2026-07
      note: >
        DE SCHOOL PUBLICEERT GEEN TOTAAL. Ze publiceert twee getallen, apart:
        "De opleiding neemt drie jaar of 360 uren in beslag. Daarnaast is er
        minimale zelfstudie van 240 uur." (120 lesblokken van wekelijks 3 uur =
        360 contacturen over 3 jaar; de zelfstudie is een minimum, min. 1 uur
        per dag.) 360 + 240 = 600 is ONZE optelling — het getal 600 komt op geen
        enkele gearchiveerde pagina van deze school voor, en total blijft daarom
        leeg (spec §6: afgeleide waarden worden niet opgeslagen). Een geïsoleerd
        lespraktijk-/supervised-teaching-getal wordt niet gegeven; de opleiding
        is sterk beoefenings-/theoriegericht met een eindexamen, niet primair
        lespraktijk-uren.
    composition:
      type: single_program
    assessment_described:
      exists: yes
      continuous: yes
      final: yes
      quote: >
        "In het examen worden 3 onderdelen getoetst door de examencommissie. Dat
        zijn de asana's, theorie uit de eerste 4 lesjaren en de ontwikkelde
        contemplatie vaardigheden ... Er zijn twee examen momenten per lesjaar."
    track_record:
      first_seen_year: 1996
      source: site-docenten-2026-07
      note: >
        De Docentenopleiding start in 2026 "voor de 30e keer" ⇒ ~30 jaar bestaan
        (first_seen_year 1996 is hieruit afgeleid, niet apart geverifieerd).
    cohorts:
      - id: docenten-2026
        start: "2026-09"
        status: announced
        source: site-docenten-2026-07
        language: nl
        note: >
          1e-jaars Docentenopleiding start na de zomervakantie (± sep 2026; ook
          een instroom na de kerstvakantie). "2026-09" benadert de
          na-zomer-start; exacte datum wordt via berichtgeving doorgegeven. 30e
          editie.

