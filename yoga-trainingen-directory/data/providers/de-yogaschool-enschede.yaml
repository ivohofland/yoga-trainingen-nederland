sources:
  - id: site-basis-2026-07
    type: website
    url: https://yogaschool.nl/yoga-opleiding/
    archived_url: https://web.archive.org/web/20260702063435/https://yogaschool.nl/yoga-opleiding/
    captured: "2026-07"
    note: >
      LIVE (browser-gerenderd) Basisopleiding Raja Yoga: klassiek 8-ledig
      systeem (Yama's/Niyama's, asana, energiebeheersing/pranayama, concentratie
      & meditatie). Iedere maand in 2025 nieuwe Basisopleidingen; toegang na
      kennismakingsgesprek (met Ylvy of Mascha, Emmastraat 147). Kosten
      €1510/jaar (termijnen; lesboeken t.w.v. €120 inbegrepen). Draagt het
      NRTO-kwaliteitskeurmerk. Basis is voorwaarde voor de Docentenopleiding.
    local_snapshot: data/archives/de-yogaschool-enschede/site-basis-2026-07-2026-07-02.pdf
  - id: site-docenten-2026-07
    type: website
    url: https://yogaschool.nl/docentenopleiding/
    archived_url: null
    captured: "2026-07"
    note: >
      LIVE Docentenopleiding Raja Yoga (vervolg op de Basisopleiding): 120
      lesblokken van wekelijks 3 uur (ochtend of avond), 3 jaar / 360
      contacturen + minimaal 240 uur zelfstudie (min. 1 uur zelfwerkzaamheid per
      dag). "Start dit jaar voor de 30e keer"; samen met de Basisopleiding
      "beantwoordt ruimschoots aan de standaard van 500 uren van de
      Internationale Yoga Federatie" (IYF — géén Yoga Alliance). Afronding met
      examen (examencommissie: asana's, theorie eerste 4 lesjaren,
      contemplatievaardigheden; 2 examenmomenten per lesjaar, herkansing
      mogelijk) → Raja Yogadocent. Lesindeling 1,5u asana+pranayama, 20 min
      concentratie/meditatie, theepauze, 0,5-1u theorielezing. Kosten per 1 jan
      2026 €1530/jaar (termijnen €153/mnd ×10; lesboeken incl.: Atma Vidya (Y.
      Saraswati), Yogasutra's van Patanjali, Bhagavad Gita, Hatha Yoga
      Pradipika). Start na zomer- of kerstvakantie. Docenten: Sandra, Ylvy,
      Linda, Wam, Leonie, Han, Monika, José.
    local_snapshot: data/archives/de-yogaschool-enschede/site-docenten-2026-07-2026-07-02.pdf
  - id: site-meester-2026-07
    type: website
    url: https://yogaschool.nl/meesteropleiding/
    archived_url: https://web.archive.org/web/20260702063729/https://yogaschool.nl/meesteropleiding/
    captured: "2026-07"
    note: >
      LIVE Meesteropleiding Raja Yoga (vervolg ná de Docentenopleiding): 120
      lesblokken van wekelijks 3 uur, min. 3 jaar, min. 1,5u zelfwerkzaamheid
      per dag. Driejarige themalijn: jaar 1 "Witte Magie", jaar 2 "Esoterische
      Psychologie" (7-stralenleer), jaar 3 "Esoterische Genezing". Bij succesvol
      afstuderen "traditionele erkenning en werk aangeboden als docent van een
      docentenopleiding". Kosten €1530/jaar (termijnen €153/mnd ×10; lesboeken
      incl.). Leerkrachten: Yogacharya's Patrick Ros en Ylvy Vaanholt, plus José
      Oudhoff en Monika Farkas (o.a. Mascha, Han).
