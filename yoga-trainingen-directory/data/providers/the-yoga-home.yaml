      Yoga, Hatha Yoga, de Yoga Sutra's van Patanjali en Bhakti Yoga. Pijlers:
      Shastra (geschriften), Sound (muziek/mantra/harmonium), teaching
      skills/didactiek en daily Sadhana. Praktijk: asana in vinyasa flow,
      pranayama, kriya's, meditatie, Dharma talks, hands-on assists, mantra
      zingen. Sterke devotionele/Jivamukti- lijn (Sharon Gannon & David Life;
      Radhanath Swami/Prabhupada-literatuur). Nederlandstalig.
