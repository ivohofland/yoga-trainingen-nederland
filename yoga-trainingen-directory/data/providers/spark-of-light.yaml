aka: [ "Spark of Light", "Andere Boeg" ]
website: https://sparkoflightyoga.com
status: active
locations:
  - city: Wageningen
    address: "Nel Vietsstraat 14b, 6702 (YA-adres); lesweekenden in sportcentrum de
      Bongerd / de Zwanenridder, Wageningen e.o."
    note: "opleidingslocatie 200u (Wageningen). Vlakbij Arnhem/Ede/Nijmegen."
  - city: Doorwerth
    note: "opleidingslocatie 300u-modules (let op: kat aanwezig)."
crkbo:
  registered: yes
  register: instelling
  holder: "Andere Boeg"
  checked: "2026-06-21"
  source: crkbo-register-2026-06
  note: >
    Register-geverifieerd, maar via een HOLDER-NUANCE: de Instelling staat NIET
    onder "Spark of Light" of op website-substring "sparkoflight" (DevExpress
    Website-filter matcht vanaf het begin van "www."), maar onder de naam
    "Andere Boeg", Wageningen, met Website-kolom www.sparkoflightyoga.com —
    gevonden via Plaats-filter "Wageningen" (2026-06-21). Naam-zoekacties op
    "Spark of Light"/"Kamp"/"Marloes" (ook in het Docentenregister) gaven 0
    relevante treffers. De site stelt EXPLICIET "BTW-vrijgesteld, omdat het een
    CRKBO-erkende opleiding is" → price.vat = exempt_crkbo (register +
    expliciete claim sluiten aan, §4.11).
registrations:
  - body: yoga_alliance
    identifier: "RYS 200, RYS 300"
    holder: "Spark of Light Yoga"
    first_registered: "2018-12"
    verified_in_register: yes
    source: ya-register-2026-06
    note: >
      RYS 200 ÉN RYS 300 geverifieerd op het live YA-profiel "Spark of Light
      Yoga" (Nel Vietsstraat 14b, Wageningen; talen EN+NL, langzaam ook DE/FR;
      rating 4.75/8 reviews, NPS 8.8; First Registered December 2018; bevestigd
      2026-06-21). De RYS-200- én RYS-300-designatiebadges staan rechtsboven op
      het profiel. LET OP voor scraping: de badges zijn afbeeldingen zonder
      machineleesbare alt-tekst, dus een tekst-/DOM-extractie mist de RYS 300 —
      visuele (screenshot) verificatie nodig. Onder "Upcoming Training Dates"
      staan alleen 200u-cohorten omdat de 300u modulair is (geen vaste
      cohortdatum).
  - body: vyn
    identifier: "VYN"
    holder: "Spark of Light Yoga"
    verified_in_register: unknown
    source: site-200-2026-06
    note: >
      Beide opleidingen stellen erkenning door de Vereniging Yogadocenten
      Nederland (VYN); afgestudeerden kunnen zich als "yogainstructeur" bij VYN
      aanmelden. Geen per-school VYN-permalink waargenomen →
      verified_in_register unknown tot het VYN-register dit bevestigt.
