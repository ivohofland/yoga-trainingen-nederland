programs:
  - id: 200-hatha
    name: "Hatha Yoga Opleiding (200u)"
    url: https://sparkoflightyoga.com/hatha-yoga-opleiding-200-uur/
    format_label: "200"
    style_claimed: "Hatha yoga vanuit de nondualistisch-shaivistische (tantrische)
      traditie: houdingen (max. gezondheid i.p.v. max. prestatie), anatomie,
      meditaties, adem-/ontspanningstechnieken, mantra's, mudra's, bandhas,
      pranayama, yoga nidra, filosofie & zelfonderzoek"
    styles: [ hatha ]
    accreditation:
      - body: yoga_alliance
        label_claimed: "Erkend door Yoga Alliance; na afronding aanmelden als yogadocent
          (200 RYT)"
        verified: yes
        source: ya-register-2026-06
        note: "School-RYS 200 geverifieerd in het register."
      - body: vyn
        label_claimed: "Erkend door de Vereniging Yogadocenten Nederland; aanmelden als
          yogainstructeur"
        verified: unknown
        source: site-200-2026-06
        note: "VYN-erkenning nog te bevestigen in het VYN-register."
    delivery:
      mode: in_person
      structure: weekends
      duration_months_min: 10
      language: nl
    prerequisites_claimed: "geen vooropleiding; psychisch gezond (expliciet NIET
      geschikt bij gevoeligheid voor/voorgeschiedenis van psychose of ander
      psychiatrisch beeld). Geschikt voor aankomend docent én verdieping eigen
      practice"
    price:
      amount_eur: 3450
      variants:
        - { label: "niet-flexibel, lesgeld in 1x (start aug 2026)", amount_eur: 3450 }
        - { label: "niet-flexibel, lesgeld in 2x", amount_eur: 3587 }
        - {
            label: "losse weekend-module (bestaande docenten, mits plaats)",
            amount_eur: 333
          }
      vat: exempt_crkbo
      published: yes
      note: >
        Start aug 2026: €3450 (1x betaald) of €3587 (in 2x); flexibel tarief
        +10% (zie contract). EXPLICIET BTW-vrijgesteld (CRKBO-erkend).
        Practitioner-route: examens + werk buiten de weekenden optioneel;
        docent-certificaat vereist ze wel.
      source: site-200-2026-06
    hours_claimed:
      total: 200
      contact: null
      self_study: null
      supervised_teaching_practice: null
      breakdown_published: not_published
      contact_published: not_published
      source: site-200-2026-06
      note: >
        10 lesweekenden/jaar (9 modules van 2 dagen + 2 examendagen), elke
        lesdag 09:00-17:30. Daarnaast ~5u/week buiten de weekenden verwacht
        (eigen beoefening, oefenen in lesgeven, achtergronden) voor het
        docent-certificaat. Lesgeven aan medecursisten vanaf het begin; geen
        geïsoleerd contact-/ lespraktijk-urental gepubliceerd. Online omgeving
        vanaf sep 2026.
    group_size_claimed:
      min: 16
      max: 24
      source: site-200-2026-06
      note: "16-24 deelnemers; vanaf feb 2027 max. 28."
    assessment_described:
      exists: yes
      quote: "Wil je het certificaat voor yoga docent halen ... 2 examen-dagen; wil je
        een practitioner-certificaat, dan zijn ... ook de examens optioneel"
    track_record:
      first_seen_year: 2018
      source: ya-register-2026-06
      note: >
        RYS sinds dec 2018; 2 instroommomenten per jaar (feb + eind aug/begin
        sep). YA-register toont meerdere gedateerde cohorten.
    cohorts:
      - id: hatha-2025-08
        start: "2025-08"
        end: "2026-06"
        status: confirmed_ran
        source: ya-register-2026-06
        language: en
        note: "YA-register: 30 aug 2025 - 28 jun 2026 (Hatha & Tantra focus); loopt."
      - id: hatha-2026-02
        start: "2026-02"
        end: "2027-01"
        status: confirmed_ran
        source: ya-register-2026-06
        language: nl
        note: "YA-register: 7 feb 2026 - 10 jan 2027; gestart (feb 2026)."
      - id: hatha-2026-08
        start: "2026-08"
        status: announced
        source: site-200-2026-06
        language: nl
        note: "Najaarssemester 2026: 29-30 aug, 26-27 sep, 24-25 okt, 21-22 nov, 19-20
          dec 2026 (vervolg in 2027). Aangekondigd."
    teachers:
      - person_id: marloes-van-der-kamp
        role: "hoofddocent / eigenaar"

  - id: 300-verdieping
    name: "Verdiepende Yoga Docentopleiding (300u, modulair)"
    url: https://sparkoflightyoga.com/yoga-docentopleiding-300-uur/
    format_label: "300"
    style_claimed: "Multi-style verdieping: Yin yoga (meridianen, fascia, mudra,
      adem), Yoga Nidra (gedachtenpatronen, diepe ontspanning), Energetische
      Aspecten (prana/adem/bewustzijn, chakra yoga, ayurveda & yoga); asana-
      uitlijning, contra-indicaties, anatomie, meditatie"
    styles: [ multistyle, yin ]
    accreditation:
      - body: yoga_alliance
        label_claimed: "Erkend door Yoga Alliance; voor erkenning volg je 6 modules van
          50 uur"
        verified: yes
        source: ya-register-2026-06
        note: >
          School draagt de RYS-300-designatie op het YA-profiel (badge
          rechtsboven, bevestigd 2026-06-21). De 300u is opgebouwd uit 6
          YA-erkende 50u-modules.
      - body: vyn
        label_claimed: "Erkend door de Vereniging Yogadocenten Nederland; 7 modules +
          scriptie + afsluitend examen, min. 3 jaar"
        verified: unknown
        source: site-300-2026-06
        note: "VYN-erkenning + vrijstellingen; nog te bevestigen in het VYN-register."
    delivery:
      mode: hybrid
      structure: modular
      duration_months_min: 12
      duration_months_max: 36
      language: nl
    prerequisites_claimed: "afgeronde 200u-yogaopleiding (elders mag, na overleg
      over ontbrekende onderdelen); modules ook los te volgen als bijscholing"
    prerequisite:
      - kind: other
        label: "afgeronde 200-uursopleiding (ook elders behaald)"
        source: site-300-2026-06
        note: >
          "Deze verdiepende yoga docent opleiding is bedoeld voor mensen die al
          een 200 uur ... hebt afgerond", en met zoveel woorden ook elders: "Heb
          je wel een 200 uur opleiding gedaan, maar niet bij Spark of Light
          Yoga?" De school verkoopt zelf een 200u (€ 3.450), maar eist die niet
          — dus geen bedrag opgeteld: dat zou een verplichte aankoop bij hén
          beweren die de pagina uitdrukkelijk niet stelt.
    price:
      vat: unknown
      published: no
      note: >
        Geen prijs gepubliceerd op de 300u-pagina ("neem contact op"); modules
        los te volgen. BTW: NIET WAARGENOMEN → unknown (§4.11). Dit record droeg
        `exempt_crkbo`, en de note zei er zelf bij dat de behandeling "als de 200u
        (CRKBO) aangenomen" was — een afleiding van de pagina van een ANDERE
        opleiding, precies wat §4.11 verbiedt. De enige twee treffers op deze
        pagina die op een vrijstelling lijken, gaan over VRIJSTELLING VAN MODULES,
        niet over belasting: "er is geen vrijstelling mogelijk" (voor
        YA-erkenning) en "staat de Vereniging Yogadocenten Nederland wel
        vrijstellingen toe" (bij eerder gevolgde trainingen). Over btw zegt deze
        pagina niets. (De 200u-pagina zegt het wél, in zoveel woorden — "De
        opleiding is BTW-vrijgesteld, omdat het een CRKBO-erkende..." — en dáár
        staat `exempt_crkbo` dan ook, terecht.)
      source: site-300-2026-06
    hours_claimed:
      total: 300
      contact: null
      self_study: null
      supervised_teaching_practice: null
      breakdown_published: not_published
      contact_published: not_published
      source: site-300-2026-06
      note: >
        YA-pad: 6 modules van 50u (geen vrijstelling). VYN-pad: 7 modules +
        scriptie + examen, min. 3 jaar (vrijstellingen mogelijk). Modules: Yin
        (2×50u YA / 2×40u VYN), Yoga Nidra (2×50u), Energetische Aspecten (2×50u
        + 1×32u). Modulair instroombaar; los als 50u-bijscholing.
    composition:
      type: fixed_modular
    coherence_signals:
      required_sequence: no
      required_sequence_note: "Elke module los instroombaar; binnen 1/2/3 jaar te
        voltooien (VYN min. 3 jaar). Geen vaste volgorde."
      single_cohort_intake: no
    group_size_claimed:
      max: 16
      source: site-300-2026-06
      note: "Max. 16 deelnemers."
    assessment_described:
      exists: yes
      quote: "Voor erkenning bij de Vereniging Yogadocenten Nederland volg je alle 7
        modules, schrijf je een scriptie en doe je een afsluitend examen"
    track_record:
      first_seen_year: 2018
      source: ya-register-2026-06
      note: "Vervolgopleiding gekoppeld aan de 200u; modulaire, doorlopende instroom."
    teachers:
      - person_id: marloes-van-der-kamp
        role: "hoofddocent / eigenaar"

