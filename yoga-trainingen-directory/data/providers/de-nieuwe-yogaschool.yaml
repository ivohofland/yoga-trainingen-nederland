        note: "Externe accreditatie. RYS gehouden onder 'Johan Noorloos Teachertraining'
          (zie registrations)."
      - body: other
        label_claimed: "Yoga Alliance & Het Nieuwe Yoganetwerk gecertificeerd diploma"
        verified: no
        source: site-vinyasa-2026-06
        note: >
          ZELF-CERTIFICERING: 'Het Nieuwe Yoganetwerk' is DNYS' eigen
          netwerk/BV, geen onafhankelijke accreditatie (zie bron netwerk-2026-06
          + claim hny-zelfcertificering). Apart gehouden van de YA-accreditatie
          hierboven.
    delivery:
      mode: in_person
      structure: weekends
      duration_months_min: 7
      language: nl
    prerequisites_claimed: "geen vooropleiding nodig; HBO werk- en denkniveau; geen
      yoga-ervaring vereist"
    price:
      amount_eur: 2964.50
      vat: incl
      published: yes
      excludes: "verplichte literatuur (boekenlijst apart gepubliceerd)"
      note: >
        € 2.450 excl. btw → € 2.964,50 incl. 21% btw (consumentenprijs). Let op:
        mét btw verkocht, ondanks CRKBO bij de Online B.V. (zie crkbo-note).
        Vroegboek €121 korting (eerste 5; code EARLYBIRD-VINYASA-AUG).
        Termijnbetaling mogelijk. Inclusief lessenkaart cadeau.
      source: site-vinyasa-2026-06
    hours_claimed:
      total: 200
      contact: null
      self_study: null
      supervised_teaching_practice: null
      breakdown_published: not_published
      contact_published: not_published
      source: site-vinyasa-2026-06
      note: >
        200u-format; lesdata als weekenden (vr-avond + za/zo) + enkele
        midweekdagen, geen uren-uitsplitsing. 4 OPTIONELE praktijkdagen onder
        mentorbegeleiding. Zelfstudie: verplichte literatuur, boekpresentatie,
        persoonlijk verslag, eigen oefengroepje. Max. 3 dagen missen.
    assessment_described:
      exists: yes
      continuous: yes
      final: yes
      quote: "Aan het einde van de 200-uurs Vinyasa yoga opleiding rond je de training
        af met een praktijkexamen en een theorie-examen."
    transparency:
