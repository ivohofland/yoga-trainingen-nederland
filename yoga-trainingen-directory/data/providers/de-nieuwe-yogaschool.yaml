# yaml-language-server: $schema=../provider.schema.json
id: de-nieuwe-yogaschool
name: De Nieuwe Yogaschool
aka: [ "DNYS", "DNYS Academie", "Johan Noorloos Teachertraining" ]
website: https://denieuweyogaschool.nl
status: active
locations:
  - city: Amsterdam
    address: "Laurierstraat 109, 1016 PL"
    note: "studio + DNYS Academie (opleidingslocatie); opgericht 2013"
  - city: Leeuwarden
    address: "Westersingel 2F, 8913 CK (Club Yoga Leeuwarden)"
    note: >
      Gastlocatie voor de Vinyasa 200u-opleiding. Club Yoga Leeuwarden host de
      DNYS/Johan-Noorloos-opleiding sinds 2016; inschrijving én certificering
      (Yoga Alliance) lopen via De Nieuwe Yogaschool (Momence-boeking), niet via
      Club Yoga zelf — Club Yoga is alleen de zaal/partner. Zie bron
      club-yoga-2026-06.
crkbo:
  registered: yes
  register: instelling
  holder: "De Nieuwe Yogaschool Online B.V."
  checked: "2026-06-20"
  source: crkbo-register-2026-06
  note: >
    Register-geverifieerd: zoekterm "Nieuwe Yogaschool" → exact 1 treffer "De
    Nieuwe Yogaschool Online B.V., Amsterdam, denieuweyogaschoolonline.nl"
    (2026-06-20). HOLDER-/STRUCTUUR-NUANCE: de CRKBO-registratie zit in de
    *Online* B.V. (die de online opleidingen btw-vrij verkoopt), terwijl de live
    200u-opleidingen MÉT 21% btw worden verkocht (€2450 excl → €2964,50 incl).
    De btw-structurering is daarmee zichtbaar als feit (§10/§4.11): de
    vrijstelling rijdt op de online-entiteit, niet op de live trainingen.
registrations:
  - body: yoga_alliance
    identifier: "RYS 200, RYS 300"
    holder: "Johan Noorloos Teachertraining"
    first_registered: "2014-05"
    verified_in_register: yes
    source: ya-register-2026-06
    note: >
      HOLDER-SPECIMEN: de YA-RYS staat op naam van oprichter "Johan Noorloos
      Teachertraining", niet op de studio of de B.V. Profielpagina (live
      2026-06-20) bevestigt RYS-status, locatie Amsterdam, talen DUTCH+ENGLISH.
      RYS-niveau (200 + 300) en eerste registratie (2014-05) uit de
      YA-directory-enumeratie. LET OP: er is GEEN actueel 300u-traject
      geadverteerd — de drie lopende yoga-opleidingen zijn alle 200u. De
      "Advanced trainingen" zijn korte workshops (<6 dagen) en de overige
      opleidingen (Yogatherapie/Ademcoach/Schoolverlichting) zijn aparte
      specialisaties (deels alleen HNY-gecertificeerd). De RYS300 wordt dus
      gehouden maar is niet aan een lopend 300u-programma gekoppeld.
founded_year:
  value: 2013
  source: site-vinyasa-2026-06
  note: "Studio opgericht in 2013 door Johan Noorloos, Mariken Hogenhout en
    Sijbrand Maal; YA-RYS sinds 2014-05."
depth: listed
last_verified: "2026-06-20"
