programs:
  - id: 200-ky-teachertraining
    name: "Kundalini Yoga Teacher Training Level 1 (Lerarenopleiding, 200u)"
    url: https://gurugian.nl/ky-teachertraining/
    format_label: "200"
    style_claimed: >
      Kundalini Yoga "zoals onderwezen door Yogi Bhajan maar zonder dogma en
      vrij gedoceerd" — moderne, open benadering die zich expliciet distantieert
      van cult-/guru-verheerlijking en van Yogi Bhajan/KRI (kiest YA boven KRI-
      certificering i.v.m. de Yogi-Bhajan-affaire; eigen manuals + Guru Rattana,
      niet de Aquarian Teacher). Onderdelen: sadhana/persoonlijke beoefening,
      werking van Kundalini Yoga (subtiele & fysieke anatomie, chakra's,
      tattvas, gunas, kriya/meditatie/pranayama/bandha/mantra), geschiedenis van
      Kundalini Yoga & Sikhisme, spirituele kant, rol & ethiek van de leraar,
      business van het lesgeven.
    styles: [ kundalini ]
    accreditation:
      - body: yoga_alliance
        label_claimed: "RYS-200 uurs opleiding gecertificeerd door Yoga Alliance; één
          van de eerste onafhankelijke Kundalini Yoga lerarenopleidingen"
        verified: yes
        source: ya-register-2026-06
        note: >
          RYS 200 geverifieerd in het register. Lead teacher Jasper Kok is E-RYT
          500 (voldoet aan de elevated lead-trainer-eis). De school positioneert
          het YA-certificaat expliciet als alternatief voor het KRI-certificaat
          van de Yogi-Bhajan-organisaties.
      - body: crkbo
        label_claimed: "(CRKBO-Instelling-logo in de footer; geen expliciete btw-/CRKBO-
          claim bij de opleidingsprijs)"
        verified: yes
        source: crkbo-register-2026-06
        note: "CRKBO-Instelling 'Gian' (Schoorl) register-geverifieerd; de
          opleidingspagina vermeldt CRKBO/btw niet bij de €4197-prijs."
    delivery:
      mode: in_person
      structure: intensive
      duration_months_min: 10
      language: nl
    prerequisites_claimed: "In principe toegankelijk voor iedereen met een open
      mind; advies om eerst ~10 lessen te volgen. Bewust dat een Kundalini Yoga
      opleiding intens en confronterend kan zijn; lichte fysieke/geestelijke
      beperkingen in overleg."
    price:
      amount_eur: 4197
      vat: unknown
      published: yes
      includes: >
        de lerarenopleiding (NL), 16 overnachtingen in een 2-persoonskamer,
        biologisch vegetarisch eten, 2 manuals (Engels), 1× 60 min persoonlijk
        consult met Guru Gian, levenslang toegang tot de online leeromgeving van
        de opleiding, 1 jaar gratis toegang tot de Kundalini Yoga Club (200+
        kriyas/ meditaties)
      excludes: "geen — gepresenteerd als all-in (studiemateriaal, overnachtingen,
        eten inbegrepen)"
      note: >
        €4197 all-in; betaling in 6 of 12 termijnen mogelijk. Geen
        btw-vermelding bij de prijs → vat unknown (§4.11), ondanks
        CRKBO-Instelling.
      source: site-ytt-2026-06
    hours_claimed:
      total: 200
      contact: null
      self_study: null
      supervised_teaching_practice: null
      breakdown_published: not_published
      source: site-ytt-2026-06
      note: >
        200u over 4 residentiële blokken (20 lesdagen: 2×4 + 1×5 + 1×7 dagen)
        met een volle dagstructuur (05:30-08:00 ochtendpractice,
        ochtend-/middag-/avond- programma). Tussen de blokken buddy-groepjes
        (geen extra live bijeenkomsten). Geen geïsoleerd
        contact-/lespraktijk-urental gepubliceerd; max 10% (2 dagen) verzuim
        toegestaan (inhalen in een volgende opleiding).
    group_size_claimed:
      max: 20
      source: site-ytt-2026-06
      note: "Investeringstabel noemt maximum 20; Q&A noemt gemiddeld 20, meestal max
        22, in uitzonderlijke gevallen 25."
    composition:
      type: single_program
    assessment_described:
      exists: not_published
      quote: "Wij hebben dit certificaat ontvangen voor onze trainingen en daarmee
        zijn E-RYT 500 en E-RYS 200 gecertificeerd door Yoga Alliance"
    track_record:
      first_seen_year: 2023
      source: ya-register-2026-06
      note: "YA-RYS sinds okt 2023 (1 review jan 2024). Gian Instituut bestaat sinds
        2015, maar dat betrof aanvankelijk de Kundalini Yoga Coaching (geen
        RYS-200)."
    cohorts:
      - id: ky-2026-08
        start: "2026-08"
        end: "2027-06"
        status: announced
        source: site-ytt-2026-06
        language: nl
        note: "4 blokken: 27-30 aug 2026, 8-12 nov 2026, 6-12 feb 2027, 17-20 jun 2027
          (Dopersduin, Schoorl)."
        lead_teachers: [ "jasper-kok" ]
    teachers:
      - person_id: jasper-kok
        role: "hoofddocent / oprichter"

