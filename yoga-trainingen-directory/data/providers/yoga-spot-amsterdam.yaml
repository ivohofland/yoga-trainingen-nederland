programs:
  - id: 200-hatha-flow
    name: "Hatha (Flow) Yoga Teacher Training (200u)"
    url: https://yogaspot.nl/hatha-yoga-teacher-training/
    format_label: "200"
    style_claimed: "Hatha, Hatha Flow & Hatha Vinyasa Flow: zwaartepunt op asana's;
      daarnaast holistische anatomie & fysiologie, pranayama, meditatie,
      filosofie/ geschiedenis/spiritualiteit, mantra's, chakra's, teacher skills
      + zakelijke aspecten van lesgeven"
    styles: [ hatha, vinyasa ]
    accreditation:
      - body: yoga_alliance
        label_claimed: "Geaccrediteerd door Yoga Alliance; na de 200u-training
          gecertificeerd yogadocent (RYT 200)"
        verified: yes
        source: ya-register-2026-06
        note: "School-RYS 200 geverifieerd; lead Margriet Verhagen is E-RYT 500."
      - body: crkbo
        label_claimed: "Geregistreerd bij het CRKBO en vrij van BTW"
        verified: yes
        source: crkbo-register-2026-06
        note: "CRKBO-Instelling 'Yogaspot VOF' register-geverifieerd."
    delivery:
      mode: in_person
      structure: weekends
      duration_months_min: 8
      language: nl
    prerequisites_claimed: "minimaal 2 jaar wekelijks yoga (thuis of in groep);
      goede beheersing van de Engelse taal vereist. Intakegesprek; deelname in
      onderling overleg besloten. Geen vrijstellingen."
    price:
      amount_eur: 2950
      vat: exempt_crkbo
      published: yes
      includes: "3-daags retreat in Winterswijk"
      note: "€2950, incl. 3-daags retreat. EXPLICIET 'vrij van BTW' (CRKBO)."
      source: site-2026-06
    hours_claimed:
      total: 200
      contact: null
      self_study: null
      supervised_teaching_practice: null
      breakdown_published: not_published
      source: site-2026-06
      note: >
        '200+ uur'. 11 lesweekenden (vr+za 13:30-18:30) + retreat (examens/
        diploma-uitreiking) + reserveweekend voor herexamens. Daarnaast ~3u
        studiebelasting + min. 2 yogalessen/week (met verslag); peer-teaching &
        adjustments. Geen geïsoleerd contact-/lespraktijk-urental gepubliceerd.
    assessment_described:
      exists: yes
      continuous: yes
      final: yes
      quote: "Weekend 10 ... theorie examen & examenvoorbereiding; Weekend 11 ...
        anatomy theorie en praktijk examen weekend"
    track_record:
      first_seen_year: 2020
      source: site-2026-06
      note: "Reviews van HYTT-studenten 2020-2021; jaarlijkse najaarsstart. YA-RYS
        sinds dec 2019."
    cohorts:
      - id: hatha-2025-10
        start: "2025-10"
        end: "2026-05"
        status: confirmed_ran
        source: site-2026-06
        language: nl
        note: "Start 10 okt 2025; 11 weekenden t/m examens + retreat 26-29 mei 2026
