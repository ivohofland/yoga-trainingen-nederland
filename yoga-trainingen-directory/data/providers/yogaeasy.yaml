    url: https://studio.yogaeasy.com/pages/academy-tt
    format_label: "200"
    style_claimed: >
      Hatha Vinyasa: asana, functionele anatomie, fysiologie & biomechanica,
      pranayama, meditatie, zenuwstelsel-regulatie, yogageschiedenis &
      filosofie, intelligent sequencing, ethics, mantras & mudras, en de
      business/marketing van lesgeven. Onderwezen door 8 gespecialiseerde
      docenten.
    styles: [ hatha, vinyasa ]
    accreditation:
      - body: yoga_alliance
        label_claimed: "Yoga Alliance certified 200-hour (RYT 200)"
