          Haan + Esther Ekhart (beiden E-RYT 500)."
    delivery:
      mode: online
      structure: mixed
      language: en
    prerequisites_claimed: "min. 2 jaar consistente praktijk + leergierigheid;
      geschikt voor aankomend docenten, bestaande docenten, verdiepende
      practitioners en wellness-professionals. Deelnemers worden geselecteerd."
    price:
