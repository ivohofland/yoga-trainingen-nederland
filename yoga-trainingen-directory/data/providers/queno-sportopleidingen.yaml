programs:
  # DE VIER TRAJECTEN. Alles hieronder staat op de gearchiveerde CYT-pagina.
  #
  # delivery.mode — ONS OORDEEL, NIET HUN WOORDEN, en het zwakste veld in dit
  # record. De pagina stelt de lesvorm van de samenstellende opleidingen nergens.
  # Wat ze wél stelt: de stage mag "dmv video", het praktijkexamen is een les die
  # je "opneemt in je eigen groep", en het praktijkexamen van het 500u-traject
  # moet "te geven in Westerbork" zijn — dus zowel afstand als fysiek. Het schema
  # dwingt hier een keuze af (geen `unknown` mogelijk); `hybrid` is onze lezing
  # van dát artefact en MOET opnieuw worden nagekeken tegen de opleidingspagina's.
  # structure: modular is wél gestaafd: "geheel op eigen tempo en volgorde te
  # plannen" + "Alle modules (opleidingen) worden los aangeboden".
  # delivery.language is weggelaten: de site is Nederlandstalig, maar de
  # instructietaal wordt niet gesteld.

  - id: cyt200-yin
    name: "CYT Yin Yoga 200 uur"
    url: https://quenosportopleidingen.nl/100-200-en-500-uur-cyt-certificering-yoga-alliance-international-india/
    format_label: "200"
    style_claimed: "Yin Yoga-traject; opgebouwd uit Docent Hatha Yoga, Docent Yin
      Yoga, Yoga Nidra, MindFit Trainer, De kracht van adem; Pranayama en
      Basiskennis anatomie"
    styles: [ yin ]
    accreditation:
      - body: other
        label_claimed: "internationale diploma CYT200 Yin Yoga"
        verified: unknown
        source: site-cyt-2026-07
        note: >
          Yoga Alliance INTERNATIONAL (YAI, India) — niet de Amerikaanse Yoga
          Alliance; zie registrations. Niet in een register geverifieerd.
    delivery:
      mode: hybrid
      structure: modular
    price:
      amount_eur: null
      vat: unknown
      published: unknown
      note: >
        De pagina noemt GEEN opleidingsprijs: "De kosten die je maakt zijn de
        kosten van de opleidingen (zie agenda) en €225,- voor je begeleiding
        (small group gesprek bij de start) nakijken theorie en praktijk examen
        en fee voor India." Wat je betaalt is dus: de losse opleidingen (prijzen
        op de agenda-pagina, die NIET is gearchiveerd) plus €225 begeleiding.
        Geen bedrag, geen totaal, geen prijsband. `period` blijft bewust op de
        default (`total`) en NIET op `per_module`: dat laatste betekent in dit
        model dat wij de moduleprijzen hébben en het totaal eruit optellen (§6,
        v0.8) — en deze trajecten zijn een menu van los verkochte opleidingen
        waarvan we geen enkele prijs hebben. `published: unknown` en NIET
        `not_published`: dat zou een bevinding over QUENO zijn, en de agenda
        hebben wíj niet onderzocht — het gat is het onze. `vat: unknown`
        (§4.11): het artefact noemt btw nergens; de enige CRKBO-vermelding is
        een footer-regel naast het straatadres, en dat is geen btw-uitspraak.
      source: site-cyt-2026-07
    hours_claimed:
      total: 200
      contact: null
      self_study: null
      supervised_teaching_practice: 20
      breakdown_published: yes
      contact_published: not_published
      source: site-cyt-2026-07
      note: >
        200 staat als urental in de kop van het traject zelf ("CYT Yin Yoga 200
        uur") én in de site-brede navigatiebanner ("YOGA ALLIANCE INTERNATIONAL
        100, 200 & 500 uur CYT certificering"). Let op: die banner is een
        NAVIGATIE-ELEMENT dat op elke pagina staat, geen uitspraak over dit
        traject — de kop van het traject is dat wel, en daar rust het getal op.
        Van de 200 uur wordt precies één deel apart benoemd: "20 uur stage" ("De
        stage bestaat uit 20 lessen die je kunt geven bij een collega docent of
        in je eigen groepen en laat beoordelen door je stagebegeleider(s)
        middels video"). Contact- en zelfstudie-uren worden nergens gegeven, ook
        niet per opleiding — vandaar `contact_published: not_published` (een
        bevinding: we keken op hun eigen trajectpagina) en geen €/contactuur.
    composition:
      # free_assembly: de trajecten zijn een menu van los verkochte opleidingen,
      # "geheel op eigen tempo en volgorde te plannen". Er is geen bundelprijs.
      type: free_assembly
      modules:
        [
          docent-hatha-yoga,
          docent-yin-yoga,
          yoga-nidra,
          mindfit-trainer,
          pranayama,
          basiskennis-anatomie
        ]
    coherence_signals:
      required_sequence: no
      required_sequence_note: "\"Het traject tot Certified Yoga Teacher is geheel op
        eigen tempo en volgorde te plannen.\""
      single_cohort_intake: no
      single_cohort_intake_note: "\"Alle opleidingen worden los aangeboden je kan je
        hier voor inschrijven op een moment dat voor jou past.\" Geen cohort,
        geen gezamenlijke start."
      integrative_assessment: yes
      integrative_assessment_note: "Theorie-examen + ontwikkelingsverslag + een
        afsluitende Yin Yoga-les die het geheel afrondt en wordt beoordeeld —
        een toetsing over de losse opleidingen heen."
      continuous_lead_teacher: unknown
      continuous_lead_teacher_note: "De pagina noemt geen enkele docent bij naam. Niet onderzocht."
      modules_sold_separately: yes
      modules_sold_separately_note: "\"Alle modules (opleidingen) worden los aangeboden.\""
      bundle_price_below_sum: unknown
      bundle_price_below_sum_note: "Niet vast te stellen: er is geen bundelprijs en de
        losse opleidingsprijzen staan op de niet-gearchiveerde agenda-pagina."
      source: site-cyt-2026-07
    assessment_described:
      exists: yes
      continuous: unknown
      final: yes
      quote: "Het examen bestaat uit een theorie examen en je rond het totaal af met
        een Yin Yoga les die je opneemt in je eigen groep welke beoordeeld zal
        worden."

