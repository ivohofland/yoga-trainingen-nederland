    identifier: "Yoga Alliance International (YAI, India) — CYT 100/200/500"
    holder: "QUENO Sportopleidingen"
    verified_in_register: unknown
    source: site-cyt-2026-07
    note: >
      LET OP — andere body: QUENO leidt op tot certificering van YOGA ALLIANCE
      INTERNATIONAL (YAI), volgens de eigen site "de eerste Yoga Alliance in
      India". YAI is een APARTE registratie-organisatie — NIET de Amerikaanse
      Yoga Alliance (yogaalliance.org), waar de RYS/RYT-labels elders in deze
      directory vandaan komen. Daarom `body: other` en niet `yoga_alliance`: een
      YAI-erkenning is geen RYS-registratie en de twee mogen in geen enkele
      weergave op één hoop. Niet in enig register nagezocht — de enige bron is
      QUENO's eigen pagina, dus `verified_in_register: unknown`.
