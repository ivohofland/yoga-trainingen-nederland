programs:
  - id: ashtanga-tt
    name: "2-jarige Basis Docentenopleiding gebaseerd op Ashtanga"
    url: https://reinierdorrepaal.nl/ashtanga-teacher-training/
    format_label: "200"
    style_claimed: "Ashtanga (primary serie), pranayama in Kaivalyadhama-lijn,
      hands-on adjustments"
    accreditation:
      - body: yoga_alliance
        label_claimed: "geregistreerd bij Yoga Alliance, een Amerikaanse organisatie die
          yogaopleidingen controleert en accrediteert"
        verified: "yes"
        source: ya-register-2026-06
        note: >
          Registratie zelf geverifieerd (RYS 200). De karakterisering
          "controleert en accrediteert" is claim-materiaal: YA inspecteert geen
          onderwijs. Opvallend eerlijk daarnaast: expliciete disclaimer dat de
          opleiding NIET leidt tot vermelding als authorised teacher bij Sharath
          Yoga Centre.
    delivery:
      mode: in_person
      structure: weekends # zaterdagen, bij uitzondering zondag
      duration_months_min: 24
      language: nl
    price:
      amount_eur: 2890
      vat: incl
      published: "yes"
      excludes: "studieboeken én registratiekosten Yoga Alliance bij afronding"
      note: "te betalen in twee jaarbedragen van €1.445"
      source: site-att-2026-06
    hours_claimed:
      total: null # nergens een urental op de pagina; format via YA-registratie (RYS 200)
      contact: null
      self_study: null
      supervised_teaching_practice: null
      breakdown_published: not_published
      contact_published: not_published
      source: site-att-2026-06
    assessment_described:
      exists: not_published
    track_record:
      first_seen_year: 2016
      source: ya-register-2026-06
      note: >
        Datumaanduidingen op de pagina zijn onderling inconsistent: kop
        "Registratie ASHTANGA TT 2026-2027" met start 14 maart 2026, daaronder
        "Opleiding 2028-2029" met laatste opleidingsdag november 2029, en een
        dataoverzicht gelabeld "Training days Ashtanga TT 2026 2027".
    cohorts:
      - id: att-2026-03
        start: "2026-03"
        status: announced
        source: site-att-2026-06
        note: "start 14 maart 2026"

  - id: pranayama-tt
    name: "Pranayama Teacher Training (200+ hours)"
    url: https://reinierdorrepaal.nl/pranayama-teacher-training/
    format_label: "200"
    style_claimed: "klassieke pranayama in de lijn van Kaivalyadhama/Swami
      Kuvalyananda; 'traditional practices with scientific understanding'"
    accreditation:
      - body: other
        label_claimed: "Completion grants official accreditation for Kaivalyadhama's
          year 1 Pranayama Teacher Training, with direct access to year 2 in
          India"
        verified: unknown
        source: site-ptt-2026-06
    delivery:
      mode: in_person
      structure: weekends
      duration_months_min: 14
      language: en # pagina volledig Engelstalig; instructietaal niet expliciet vermeld
    prerequisites_claimed: "gericht op 'dedicated yoga teachers or serious practitioners'"
    price:
      amount_eur: 2385
      vat: incl
      published: "yes"
      excludes: "verplichte boeken (€115 incl. btw, via Jai Yoga verkrijgbaar)"
      source: site-ptt-2026-06
    hours_claimed:
      total: 350
      contact: 200 # "200+ guided contact hours" / "200 hours of group teaching" — EERSTE provider in dataset die contacturen publiceert
      self_study: 150
      supervised_teaching_practice: null # "teaching methodology with supervised practice" geclaimd, niet gekwantificeerd
      breakdown_published: "yes"
      contact_published: "yes"
      source: site-ptt-2026-06
      note: >
        Zelfstudie-aanduiding inconsistent op dezelfde pagina: bovenaan
        "personal practice & study (100+ hrs.)", onderaan "approximately 150
        additional hours… number of hours amounts to 350".
    assessment_described:
      exists: not_published
    cohorts:
      - id: ptt-2026-05
        start: "2026-05"
        end: "2027-07"
        status: announced
        source: site-ptt-2026-06
        note: "start 16 mei 2026, afronding 4 juli 2027; volledige datumlijst als
          afbeelding gepubliceerd"
        language: en

claims:
  - id: ya-controleert
