programs:
  - id: 200-functional-yin
    name: "Online Functional Yin Yoga Anatomy & Meridians Teacher Training (200u)"
    url: https://www.yogatreat.eu/online-yin-yoga-teacher-training
    format_label: "200"
    style_claimed: >
      Functional Yin Yoga (geleid door de ervaring van de asana, niet de
      esthetiek; 'target areas', tension vs compression) + anatomie (variaties
      in botten, gewrichten, spiergroepen, fascia, organen) + Oosterse
      gezondheidsleer (Yoga Sutras, Taoisme, meridiaan-stimulatie & -theorie,
      Chi, 5-elemententheorie) + meditatie & mindfulness + pranayama &
      orbiting-energy-technieken + adjustments/ props + persoonlijke groei.
      Talen EN/ES/NL.
    styles: [ yin ]
    accreditation:
      - body: yoga_alliance
        label_claimed: "200 Hours, Yoga Alliance Certified (RYT 200)"
        verified: yes
        source: ya-register-2026-06
        note: "RYS 200 geverifieerd; lead José de Groot - de Haan is E-RYT 500."
      - body: crkbo
        label_claimed: "(CRKBO-Instelling; geen prijs/btw-vermelding op de waitlist-pagina)"
        verified: yes
        source: crkbo-register-2026-06
        note: "CRKBO-Instelling 'Yogatreat' register-geverifieerd → opleiding
          btw-vrijgesteld."
    delivery:
      mode: online
      structure: mixed
      duration_months_min: 11
      language: en
    prerequisites_claimed: "voor yogabeoefenaars én docenten die hun Yin-praktijk
