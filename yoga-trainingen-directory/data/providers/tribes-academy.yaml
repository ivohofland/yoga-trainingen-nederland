programs:
  - id: 200-modern-vinyasa
    name: "200-hour Modern Vinyasa Teacher Training"
    url: https://www.tribesacademy.nl/200-hour-modern-vinyasa
    format_label: "200"
    style_claimed: >
      Modern Vinyasa: functionele & embodied anatomie, alignment-based
      asana-studie (asana's gegroepeerd in families: backbends, forward bends,
      etc. + compensatie/ modificatie), veilige & intelligente sequencing
      (action-based blueprints), moderne perspectieven op traditionele filosofie
      (historische context, geen voorgeschreven leefstijl), authentiek lesgeven
      & presence.
    styles: [ vinyasa ]
    accreditation:
      - body: yoga_alliance
        label_claimed: "official diploma recognized by Yoga Alliance; register as a
          Certified Yoga Teacher (RYT 200)"
        verified: yes
        source: ya-register-2026-06
        note: "Onder de RYS 200 van Tribes dance & yoga; leads Willemieke Verweij &
          Fanny Alavoine, beiden E-RYT 500."
      - body: crkbo
        label_claimed: "no VAT charged, CRKBO-registered"
        verified: yes
        source: crkbo-register-2026-06
        note: "Via Tribes dance & yoga (CRKBO-Instelling)."
    delivery:
      mode: in_person
      structure: weekends
      duration_months_min: 6
      language: en
    prerequisites_claimed: "min. 1 jaar consistente eigen praktijk (~2x/week, studio
      of thuis); ook geschikt voor bewegingsdocenten (pilates/dans/barre) die
      willen verbreden. Geen expertise vereist, wel bereidheid je comfortzone te
      verlaten."
    prerequisite:
      - kind: experience
        label: "min. 1 jaar consistente eigen praktijk (~2×/week)"
        source: site-vinyasa200-2026-06
        note: >
          "one year of consistent" praktijk — een ervaringsdrempel, geen
          certificaat en geen aankoop. Geen bedrag.
    price:
      amount_eur: 3150
      vat: exempt_crkbo
      published: yes
      includes: >
        alle trainingsweekenden, de retreat-/weekintensive en de handleidingen +
        20% korting op class cards/passes/abonnementen bij Tribes
      excludes: "2 boeken zelf aanschaffen (anatomie ~€18 + filosofie €10-20)"
      note: >
        €3150; early bird 15% korting (code Early200). €500 niet-restitueerbare
        aanbetaling, restant voor aanvang. Betaling in 3 termijnen op aanvraag
        (+5% administratiekosten). "No VAT charged, CRKBO-registered" →
        exempt_crkbo.
      source: site-vinyasa200-2026-06
    hours_claimed:
      total: 200
      contact: null
      self_study: null
      supervised_teaching_practice: null
      breakdown_published: not_published
      contact_published: not_published
      source: site-vinyasa200-2026-06
      note: >
        6 weekenden (vr 18:00-20:00, za 12:00-20:00, zo 10:00-18:00) +
        retreatweek. Hands-on: 16 lessen volgen, 2 assisteren, 4 observeren bij
        Studio Tribes. Eindtoets: open-book essay (thuis) + groeps-lesexamen.
        Geen geïsoleerd contact-/lespraktijk-urental gepubliceerd.
    composition:
      type: single_program
    coherence_signals:
      single_cohort_intake: yes
      single_cohort_intake_note: "Eén cohort met vaste data (okt-mrt); niet los te instappen."
      continuous_lead_teacher: yes
      continuous_lead_teacher_note: "Willemieke Verweij & Fanny Alavoine leiden de
        hele opleiding (gastdocenten aanvullend)."
      integrative_assessment: yes
      integrative_assessment_note: "Afsluitende eindtoets + groeps-lesexamen over de hele opleiding."
      source: site-vinyasa200-2026-06
    assessment_described:
      exists: yes
      final: yes
      quote: "The final assessment includes a short open-book essay (done at home) and
        a group teaching exam"
    track_record:
      first_seen_year: 2023
      source: ya-register-2026-06
      note: "RYS sinds okt 2023; meerdere eerdere cohorten via testimonials (o.a.
        Olivia, ook YA-review sep 2025)."
    cohorts:
      - id: mv200-2026-10
        start: "2026-10"
        end: "2027-03"
        status: announced
        source: site-vinyasa200-2026-06
        language: en
        lead_teachers: [ willemieke-verweij, fanny-alavoine ]
        note: >
          9-11 okt, 13-15 nov, 11-13 dec 2026, 8-10 jan, 5-7 feb 2027, retreat
          1-7 mrt 2027 (Yogabee, Domburg), afsluiting 20-21 mrt 2027. (De pagina
          is intern inconsistent over de retreat-einddatum: 'Mar 1-7' vs 'ends
          Mar 20'.)
    teachers:
      - person_id: willemieke-verweij
        role: "co-lead teacher"
      - person_id: fanny-alavoine
        role: "co-lead teacher"

