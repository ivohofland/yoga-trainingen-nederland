programs:
  - id: 200-vinyasa
    name: "200H Vinyasa Yoga Teacher Training"
    url: https://www.yogaden.nl/ytt/training/
    format_label: "200"
    style_claimed: >
      Vinyasa: posture breakdowns met nadruk op alignment & safety, intelligent
      sequencing & creatief theming, geschiedenis & filosofie & Bhakti Yoga,
      functionele anatomie & mobility, asana lab & alignment, meditatie &
      pranayama, public speaking & leadership / persoonlijke ontwikkeling. Team-
      onderwezen door internationale senior-docenten.
    styles: [ vinyasa ]
    accreditation:
      - body: yoga_alliance
        label_claimed: "200H Vinyasa Yoga Teacher Training, Yoga Alliance certified (RYT
          200); te volgen als standalone of als onderdeel van de 500H RYT-route"
        verified: yes
        source: ya-register-2026-06
        note: "Onder de RYS 200 van Yoga Den Netherlands; 2026-editie team-onderwezen
          door 'E-RYT 500 Teachers' (site claimt alle docenten ≥500 RYT)."
    delivery:
      mode: in_person
      structure: mixed
      duration_months_min: 4
      language: en
    prerequisites_claimed: "zowel aankomend docenten als wie de eigen praktijk wil
      verdiepen ('not just for aspiring teachers')."
    price:
      amount_eur: 3597
      vat: unknown
      published: yes
      note: >
        Investering €3597, letterlijk op de opleidingspagina: "Pricing / Super
        Early Bird Special – Sign Up Before March 15 and save up to €1500! /
        Investment: €3597 (200 euro discount before March 31st)". Beide kortingen
        zijn verlopen; €3597 is het staande, algemeen beschikbare bedrag en
        daarmee de vergelijkbare basis (§4 price).

        TWEE KANALEN, TWEE BEDRAGEN — BEVINDING (2026-07-14). De inschrijfknop op
        diezelfde pagina leidt naar het Mindbody-boekingssysteem van de school, en
        daar staat voor dezelfde cursus (14-20 sep 2026) een ánder prijsblok:
        "Investment / Member price €3297 until March 31 / Non member price €3397
        until March 31 / Super Early Bird Special. Sign up before March 31 and
        save up to €1500." (mindbody-enrolment-200-2026-07; publiek zichtbaar,
        niet ingelogd). Drie verschillen: een ander bedrag (€3597 vs €3397 voor
        niet-leden), een lidmaatschapstarief dat de website nergens noemt, en een
        andere early-bird-datum (15 vs 31 maart). Alle genoemde deadlines liggen
        inmiddels in het verleden. Een lezer kan uit de eigen kanalen van de school
        dus niet opmaken wat deze opleiding vandaag kost.

        BEWUST NIET als price.variants vastgelegd: dat veld modelleert tarieven
        waaruit een cursist kan kiezen, en de listing maakt er "3 prijsvarianten"
        van. Twee kanalen die elkaar tegenspreken zijn geen keuzemenu, en ze als
        menu tonen zou de tegenspraak juist gladstrijken. Voor te leggen aan de
        school als correctieverzoek (§4.9) — zie technical-todo.md.

        BTW: unknown (§4.11). CORRECTIE 2026-07-12, vat was "incl". De toenmalige
        notitie beriep zich op "Pricing incl. VAT" op de 200u-pagina. Die zin
        bestaat wél, maar op een ANDERE pagina: de 100u Advanced YTT kopt "Pricing
        (incl VAT)" boven € 1697/€ 1797 (site-ytt-100h-2026-07). NB: die bewering
        stond hier tot 2026-07-14 ZONDER bron — overgenomen uit een zoeksamenvatting
        van een pagina die in geen enkel archief zat. Dat is exact de fout die dit
        record elders aanwijst; de pagina is nu vastgelegd en de bewering klopt.
        Geen enkel gearchiveerd artefact van de 200u-pagina noemt btw, en de
        Mindbody-inschrijfpagina evenmin. De btw van de ene opleiding is geen feit
        over de andere (§4.11; zelfde fout als adhouna/200-multistyle) → niet
        waargenomen, dus unknown.

        Observatie, geen oordeel: dezelfde school noemt de btw-behandeling wél bij
        haar 100u-opleiding en niet bij haar 200u-opleiding.

        VERWIJDERD 2026-07-14: includes = "training + certificering +
        studiomembership tijdens de opleiding". Géén Yoga Den-artefact dat wij
        hebben zegt dit — niet de opleidingspagina, niet het overzicht, niet de
        prijspagina, niet de inschrijfpagina (alle doorzocht op
        membership/included/certificate). Het was een onbewezen bewering over wat
        € 3597 kóópt. Als de school het ergens stelt: die pagina zoeken,
        archiveren, dan pas terugzetten.
      source: site-ytt-200-2026-07
    hours_claimed:
      total: 200
      contact: null
      self_study: null
      supervised_teaching_practice: null
      breakdown_published: not_published
      contact_published: not_published
      source: site-ytt-200-2026-06
      note: >
        1-weekse intensive (14-20 sep) + 3 Amsterdam-weekenden (2-4 okt, 6-8
        nov, 4-6 dec 2026). Locatie van de intensive niet gespecificeerd op de
        2026-pagina (de 2025-editie deed een week in Marokko). Geen geïsoleerd
        contact-/lespraktijk-urental.
    composition:
