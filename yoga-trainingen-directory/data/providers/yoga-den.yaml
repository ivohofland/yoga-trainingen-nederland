crkbo:
  registered: unknown
  checked: "2026-06-27"
  source: crkbo-register-2026-06
  note: >
    Geen treffer: naam "Yoga Den" én website "yogaden" → 0 in het
    Instellingenregister (2026-06-27). KvK/juridische naam ("Yoga Den B.V.") +
    docentnamen niet in het register doorzocht → registered unknown (niet no;
    §2.2/§4.11).

    CORRECTIE 2026-07-12: deze notitie voerde eerder een tweede argument aan —
    "de 200u-opleiding is btw-belast (de 200u-pagina vermeldde 'Pricing incl.
    VAT'), consistent met NIET CRKBO-geregistreerd". Die formulering staat op de
    100u-pagina ("Pricing (incl VAT)", site-ytt-100h-2026-07), niet op de
    200u-pagina: onze archieven daarvan (site-ytt-200-2026-06 en de hercapture
    site-ytt-200-2026-07) noemen geen btw, en de Mindbody-inschrijfpagina evenmin.
    Btw van de ene opleiding is geen feit over de andere (§4.11), dus het argument
    is verwijderd. De registerbevinding hierboven (0 treffers) staat op eigen
    benen en verandert niet. Zie price.vat = unknown bij 200-vinyasa.

    NB 2026-07-14: die zin over de 100u-pagina had hier tot vandaag GEEN bron —
    hij kwam uit een zoeksamenvatting, van een pagina die in geen enkel archief
    zat. Een notitie die een ander verwijt dat hij zijn bron niet vastlegde, mag
    dat zelf niet doen. De pagina is nu vastgelegd (site-ytt-100h-2026-07) en de
    bewering blijkt te kloppen — maar dat was geluk, geen methode.

    En het blijft een bewering OVER de btw, niet over het register: uit "de school
    rekent btw over de 100u" volgt niet dat zij niet CRKBO-geregistreerd is. Dat
    is dezelfde afleiding als §4.11 verbiedt, alleen andersom gelezen. registered
    blijft unknown tot iemand het register op de KvK-naam doorzoekt.
