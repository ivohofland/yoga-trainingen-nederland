programs:
  - id: 200-vinyasa
    name: "200H Vinyasa Yoga Teacher Training"
    url: https://www.yogaden.nl/ytt/training/
    format_label: "200"
    style_claimed: >
      Vinyasa: posture breakdowns met nadruk op alignment & safety, intelligent
      sequencing & creatief theming, geschiedenis & filosofie & Bhakti Yoga,
      functionele anatomie & mobility, asana lab & alignment, meditatie &
      pranayama, public speaking & leadership / persoonlijke ontwikkeling. Team-
      onderwezen door internationale senior-docenten.
    styles: [ vinyasa ]
    accreditation:
      - body: yoga_alliance
        label_claimed: "200H Vinyasa Yoga Teacher Training, Yoga Alliance certified (RYT
          200); te volgen als standalone of als onderdeel van de 500H RYT-route"
        verified: yes
        source: ya-register-2026-06
        note: "Onder de RYS 200 van Yoga Den Netherlands; 2026-editie team-onderwezen
          door 'E-RYT 500 Teachers' (site claimt alle docenten ≥500 RYT)."
    delivery:
      mode: in_person
      structure: mixed
      duration_months_min: 4
      language: en
    prerequisites_claimed: "zowel aankomend docenten als wie de eigen praktijk wil
      verdiepen ('not just for aspiring teachers')."
    price:
      amount_eur: 3597
      vat: unknown
      published: yes
      includes: "training + certificering + studiomembership tijdens de opleiding"
      note: >
        Investering €3597. Super early bird tot €1500 korting (vóór 15 mrt) en
        €200 korting (vóór 31 mrt) — beide deadlines inmiddels verstreken.

        Btw: CORRECTIE 2026-07-12, vat was "incl". De vorige notitie stelde dat
        "de 200u-pagina vermeldde 'Pricing incl. VAT'". Die formulering bestaat
        wél — maar op een ANDERE pagina: de 100u Advanced YTT
        (yogaden.nl/ytt/100h-ytt/) kopt "Pricing (incl VAT)" boven €1697/€1797.
        De 200u-pagina zelf (site-ytt-200-2026-06, vastgelegd 2026-06-28, HTML én
        browser-render) zegt over btw niets: het prijsblok luidt letterlijk
        "Pricing / Super Early Bird Special … / Investment: €3597 / (200 euro
        discount before March 31st)". De enige "vat"/"incl"-treffers in dat
        artefact zijn deelstrings ("including", "wp-includes"). Ook de live
        200u-pagina vermeldt per 2026-07-12 geen btw (extern bevestigd).

        Een btw-behandeling van de ene opleiding is geen feit over de andere —
        §4.11 verbiedt precies deze afleiding (zelfde fout als
        adhouna/200-multistyle, waar "incl. BTW" van de Yin XL-pagina naar de
        Multi Style-opleiding was overgenomen). Voor de 200u is de btw dus niet
        waargenomen → unknown.

        Los daarvan een observatie, geen oordeel: dezelfde school vermeldt de
        btw-behandeling wél bij haar 100u-opleiding en niet bij haar 200u-
        opleiding.
      source: site-ytt-200-2026-06
    hours_claimed:
      total: 200
      contact: null
      self_study: null
      supervised_teaching_practice: null
      breakdown_published: not_published
      contact_published: not_published
      source: site-ytt-200-2026-06
      note: >
        1-weekse intensive (14-20 sep) + 3 Amsterdam-weekenden (2-4 okt, 6-8
        nov, 4-6 dec 2026). Locatie van de intensive niet gespecificeerd op de
        2026-pagina (de 2025-editie deed een week in Marokko). Geen geïsoleerd
        contact-/lespraktijk-urental.
    composition:
      type: single_program
    assessment_described:
      exists: not_published
    track_record:
      first_seen_year: 2023
      source: ya-register-2026-06
      note: >
        YA-RYS sinds nov 2023; 7 YA-reviews (oudste dec 2024). 2026-editie is
        team- onderwezen; de 2025-editie werd geleid door Nino (Marokko-week,
        leerling van Sri Dharma Mittra) — gedocumenteerd via een eerdere
        capture.
    cohorts:
      - id: vinyasa-2026-09
        start: "2026-09"
        end: "2026-12"
        status: announced
        source: site-ytt-200-2026-06
        language: en
        lead_teachers: [ xinia-van-wijk ]
        note: >
          Intensive 14-20 sep + weekenden 2-4 okt, 6-8 nov, 4-6 dec 2026. Team
          o.l.v. senior-docenten: Xinia (van Wijk), Sarah, Lize, Anna, Sara,
          Tina, Soojin e.a. (alle docenten ≥500 RYT per de site).
    teachers:
      - person_id: xinia-van-wijk
        role: "senior teacher (200u 2026-team)"
      - person_id: bruce-chung
        role: "docent (mondiaal; YA-profiel nu België)"

  - id: 500-pathway
    name: "500H RYT Program Pathway (modulair)"
    url: https://www.yogaden.nl/ytt/
    format_label: "500"
    style_claimed: >
      Modulaire RYS 500-route: de 200H Vinyasa als foundational module + losse
      modulepagina's: 100H Advanced YTT, 50H Yin, 50H Advanced Asana & Ayurveda,
      50H Ashtanga Intensive, 50H Alignment, 50H Pilates, 50/100H Mentorship,
      50H Pranayama & Meditation, Restorative YTT en 50H Rocket. Multistyle.
    styles: [ multistyle, vinyasa, yin, ashtanga, restorative ]
    accreditation:
      - body: yoga_alliance
        label_claimed: "RYS 500 (500-uurs route, modulair op de 200u-basis)"
        verified: yes
        source: ya-register-2026-06
        note: "RYS 500 register-/directory-geverifieerd + RYS® 500 in de site-footer."
    delivery:
      mode: in_person
      structure: modular
      language: en
    prerequisites_claimed: "200H Vinyasa als foundational module; daarop bouw je de
      modules tot 300/500 uur."
    prerequisite:
      - kind: program
        label: "200H Vinyasa Yoga Teacher Training"
        program: 200-vinyasa
        source: site-ytt-overview-2026-06
        note: >
          De routepagina zet de eigen 200u-opleiding vóór alles: "Start with our
          foundational 200H Vinyasa Yoga Teacher Training, then build your own
          path through a curated selection of optional 50H or 100H advanced
          trainings", en de 500H-route is "For certified 200H teachers seeking
          their 500H RYT". LET OP voor wie hier later een prijs invult: Yoga Den
          publiceert géén prijs voor de 500u-route zelf — de route WORDT
          gekocht als 200H + losse modules. Zou er ooit één routeprijs komen die
          de 200H al bevat, dan is deze poort een dubbeltelling en hoort ze in
          `composition`, niet hier.
    price:
      amount_eur: null
      vat: unknown
      published: not_published
      note: >
        Geen totaal- of per-module-bedrag op /ytt of /pricing (die pagina betreft
        studiolidmaatschappen). vat = unknown (§4.11): de eerdere 'incl' was
        AFGELEID uit de factuur-entiteit ("zelfde btw-belaste entiteit, Yoga Den
        B.V., niet-CRKBO") — precies de gevolgtrekking die §4.11 verbiedt, en
        dezelfde denkfout als btw-vrijstelling afleiden uit een
        CRKBO-registratie. Geen enkel gearchiveerd Yoga Den-artefact van een
        pagina noemt btw; een btw-behandeling wordt waargenomen of is niet
        bekend. Exacte module-prijzen op de afzonderlijke modulepagina's.
      source: site-ytt-overview-2026-06
    hours_claimed:
      total: 500
      contact: null
      self_study: null
      supervised_teaching_practice: null
      breakdown_published: not_published
      contact_published: not_published
      source: site-ytt-overview-2026-06
      note: >
        200u (foundational) + modules (100H Advanced YTT, 50H Yin, 50H Advanced
        Asana & Ayurveda, 50H Ashtanga Intensive, 50H Alignment, 50H Pilates,
        50/100H Mentorship, 50H Pranayama & Meditation, Restorative YTT, 50H
        Rocket). Geen geïsoleerd contact-/lespraktijk-urental.
    composition:
      type: fixed_modular
    coherence_signals:
      modules_sold_separately: yes
      modules_sold_separately_note: "Elke module is een losse trainingspagina; samen
        vormen ze de 500u-route (de 200u kan ook standalone)."
      source: site-ytt-overview-2026-06
    assessment_described:
      exists: not_published
    track_record:
      first_seen_year: 2023
      source: ya-register-2026-06
      note: "RYS 500 sinds nov 2023; modulaire route met losse
        module-/niche-trainingen."

