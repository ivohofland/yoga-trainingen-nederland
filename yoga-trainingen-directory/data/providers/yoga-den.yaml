id: yoga-den
name: Yoga Den Amsterdam
aka: [ "Yoga Den", "Yoga Den Netherlands", "Yoga Den B.V." ]
website: https://www.yogaden.nl
status: active
locations:
  - city: Amsterdam
    address: "Zeilstraat 34H, 1075 SJ"
    note: "studio + YA-registratieadres."
crkbo:
  registered: unknown
  checked: "2026-06-27"
  source: crkbo-register-2026-06
  note: >
    Geen treffer: naam "Yoga Den" én website "yogaden" → 0 in het
    Instellingenregister (2026-06-27). KvK/juridische naam ("Yoga Den B.V.") +
    docentnamen niet in het register doorzocht → registered unknown (niet no;
    §2.2/§4.11).

    CORRECTIE 2026-07-12: deze notitie voerde eerder een tweede argument aan —
    "de 200u-opleiding is btw-belast (de 200u-pagina vermeldde 'Pricing incl.
    VAT'), consistent met NIET CRKBO-geregistreerd". Die formulering staat op de
    100u-pagina (yogaden.nl/ytt/100h-ytt/: "Pricing (incl VAT)"), niet op de
    200u-pagina: ons archief daarvan (site-ytt-200-2026-06, 2026-06-28) noemt geen
    btw, en de live 200u-pagina evenmin (2026-07-12). Btw van de ene opleiding is
    geen feit over de andere (§4.11), dus het argument is verwijderd. De
    registerbevinding hierboven (0 treffers) staat op eigen benen en verandert
    niet. Zie price.vat = unknown bij 200-vinyasa.
registrations:
  - body: yoga_alliance
    identifier: "RYS 200"
    holder: "Yoga Den Netherlands"
    first_registered: "2023-11"
    verified_in_register: yes
    source: ya-register-2026-06
    note: >
      RYS 200 geverifieerd op het live YA-profiel "Yoga Den Amsterdam" /
      registrant "Yoga Den Netherlands" (Zeilstraat 34h, Amsterdam; rating 5.0/7
      reviews; First Registered November 2023; bevestigd 2026-06-27). 1 upcoming
      training date (200H Vinyasa, 2026). LEAD-NUANCE: de 2026-200u is
      TEAM-onderwezen ("Yoga Den E-RYT 500 Teachers"); de site stelt dat alle
      docenten ≥500 RYT uur hebben. Individuele badge-niveaus wisselen: Bruce
      Chung is badge- bevestigd E-RYT 500 maar zijn YA-profiel staat inmiddels
      in België (Saint- Gilles); Xinia van Wijk's YA-profiel (XinYoga) toont
      RYT/3836 lesuren + YACEP, geen expliciet E-RYT 500-badge. De
      elevated-lead-eis is dus school-geclaimd (500+ team), niet per persoon
      register-bevestigd.
  - body: yoga_alliance
    identifier: "RYS 500"
    holder: "Yoga Den Netherlands"
    first_registered: "2023-11"
    verified_in_register: yes
    source: ya-register-2026-06
    note: >
      RYS 500 bevestigd in de YA-directorylijst ("Yoga Den Amsterdam ... RYS®
      200, RYS® 500, First Registered November 2023", 2026-06-27) + RYS®
      500-vermelding in de site-footer. Het 500u-traject is een modulaire route
      bovenop de 200u (zie programma 500-pathway); modules staan als losse
      pagina's op de site.
legal:
  legal_name: "Yoga Den B.V."
  note: >
    Footer: "2024, Yoga Den B.V." NAAMCOLLISIE: er bestaat ook een Amerikaanse
    "Yoga Den Teacher Training School" (Florida; yoga-den.com; RYS 200 + RYS
    300; YA First Registered mei 2005; 579 reviews) — een ANDERE YA-registrant.
    De Nederlandse Yoga Den (Amsterdam, yogaden.nl) is apart geregistreerd.
    KvK-nr niet doorzocht.
