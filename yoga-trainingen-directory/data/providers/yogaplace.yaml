programs:
  - id: 200-ashtanga
    name: "Yoga Docentenopleiding Ashtanga based (200 uur)"
    url: https://yogaplace.nl/academy/opleidingen/yoga-docentenopleiding/
    format_label: "200"
    style_claimed: "Ashtanga based — traditie T. Krishnamacharya / K. Pattabhi Jois,
      achtvoudige pad van Patanjali; pranayama in de Sri O.P. Tiwari-lijn;
      lesmethodologie ook in Easy/Vinyasa/Power flow"
    styles: [ ashtanga ]
    accreditation:
      - body: yoga_alliance
        label_claimed: "Onze Yoga docentenopleiding voldoet aan de criteria van Yoga
          Alliance US; met het certificaat kun je RYT 200 aanvragen"
        verified: yes
        source: ya-register-2026-06
        note: >
          RYS geverifieerd (live YA-profiel 'Yogaplace Academy', Sittard). De
          pagina formuleert het ZACHT ('voldoet aan de criteria' / 'aanvragen')
          terwijl de RYS reëel is — onderclaim. Zie registrations + claim
          ya-criteria.
    delivery:
      mode: in_person
      structure: mixed
      duration_months_min: 8
      language: nl
    prerequisites_claimed: "toelating via inschrijfprocedure; optionele Pre-teacher
      training vooraf (sep 2026)"
    price:
      amount_eur: 3695
      vat: incl
      published: yes
      includes: "all-in inclusief retreat (interne residentiële trainingsweek)"
      note: "€ 3695 all-in, incl. 21% btw. Studiebeurs mogelijk (1 mnd voor aanvang
        bekend)."
      source: site-2026-06
    hours_claimed:
      total: 200
      contact: null
      self_study: null
      supervised_teaching_practice: null
      breakdown_published: not_published
      source: site-2026-06
      note: >
        200u over 8 maanden: 7 trainingsweekenden (Sittard) + 1 interne
        residentiële week (Belfeld). Geen uren-uitsplitsing gepubliceerd.
        "Praktijkstage bij een erkende yogaschool" = begeleide lespraktijk, niet
        gekwantificeerd. Bevat ook mentoring + intervisie.
    assessment_described:
      exists: not_published
      quote: "Na afronding van deze yogaopleiding ontvang je een officieel certificaat
        van Yogaplace Academy, Docentenopleiding 200 uur."
    track_record:
      first_seen_year: 2016
      source: site-2026-06
      note: "RYS-vermelding in YA-directory sinds 2016; reviews van cohorten
        2020-2023; jaarlijkse opleiding."
    cohorts:
      - id: yogaplace-2027-03
        start: "2027-03"
