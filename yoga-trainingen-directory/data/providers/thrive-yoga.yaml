programs:
  - id: 200-vinyasa
    name: "Vinyasa Yoga Opleiding (200u)"
    url: https://thriveyoga.nl/events/vinyasa-yoga-opleiding-amsterdam/
    format_label: "200"
    style_claimed: "Vinyasa; combineert Ashtanga Vinyasa-benadering + elementen
      Jivamukti Yoga + Functionele Yoga, met kennismaking Yin. Drie pijlers:
      (functionele) anatomie, filosofie (Bhakti/mantra) en persoonlijke
      ontwikkeling; ook pranayama"
    styles: [ vinyasa ]
    accreditation:
      - body: yoga_alliance
        label_claimed: "Thrive Vinyasa Yoga Opleiding Amsterdam (200 uur Yoga Alliance);
          registratie als RYT na het certificaat"
        verified: yes
        source: ya-register-2026-06
        note: "RYS van Thrive geverifieerd in het register."
    delivery:
      mode: in_person
      structure: weekends
      duration_months_min: 9
      language: nl
    prerequisites_claimed: "enige yoga-ervaring (lessen of eigen practice);
      gemotiveerd; geschikt voor aankomend docent én verdieping eigen practice"
    price:
      amount_eur: 3050
      vat: exempt_crkbo
      published: yes
      includes: "reader; tijdens de training 10% korting op maandabonnement of 20% op
        strippenkaart"
      excludes: "overige boeken + het volgen van yogalessen buiten de weekenden"
      note: >
        €3050 reguliere prijs; €250 aanbetaling bij inschrijving, restant
        uiterlijk 4 weken voor aanvang; betaling in 4 termijnen mogelijk (+€50
        toeslag). EXPLICIET btw-vrij (CRKBO).
      source: site-2026-06
    hours_claimed:
      total: 200
      contact: null
      self_study: null
      supervised_teaching_practice: null
      breakdown_published: not_published
      source: site-2026-06
      note: >
        9 weekenden over 9 maanden (3x vrijdagavond 19-21 + za/zo 09:00-17:00),
        alle dagdelen fysiek. Daarnaast verwacht: gem. 4 yogalessen/maand (32
        totaal, min. 12 met de eigen mentor). 'Asana in Depth' (2
        sessies/weekend), teaching skills + sequencing (eigen lessen
        voorbereiden). Geen geïsoleerd contact-/lespraktijk-urental
        gepubliceerd.
    group_size_claimed:
      max: 14
      source: site-2026-06
      note: "Min. 10, max. ±14 cursisten, verdeeld over 2 mentorgroepen."
    assessment_described:
      exists: not_published
      quote: "na succesvolle afronding ontvang je het Thrive Yoga Vinyasa-certificaat"
    track_record:
      first_seen_year: 2018
      source: site-2026-06
      note: >
        Marco leidt op sinds 2018 (= YA-RYS); oud-deelnemers o.a. 2019.
        Jaarlijkse najaarsstart. Pagina noemt meerdere cohorten: een lopend
        '2026'-traject en de upcoming 2027-editie.
    cohorts:
      - id: vinyasa-2025-10
        start: "2025-10"
        end: "2026-06"
        status: confirmed_ran
        source: site-2026-06
        language: nl
        note: "Najaar 2025–jun 2026 ('De 2026 training is al begonnen'); volledige
          datumlijst gepubliceerd, laatste weekend 5-7 jun 2026."
      - id: vinyasa-2027-10
        start: "2027-10"
        status: announced
        source: site-2026-06
        language: nl
        note: "Vinyasa Yoga Opleiding 2027, opent medio 2026; ook Engelstalige variant
          ('International Teacher Training, English Spoken')."
    teachers:
      - person_id: marco
        role: "hoofddocent / oprichter Thrive"
      - person_id: stefania
        role: "hoofddocent"
      - person_id: gretchen
        role: "senior teacher"

