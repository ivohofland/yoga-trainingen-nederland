          teachers Fleur & Marlene; gastdocenten voor o.a. anatomie/Ayurveda."
      - body: crkbo
        label_claimed: "all prices at 0% VAT as we are CRKBO registered"
        verified: yes
        source: crkbo-register-2026-06
        note: "Via Bluebirds BV (CRKBO-Instelling)."
    delivery:
