      (benefits/contra-indicaties), 'embody the flow', pranayama (6 pranayamas),
      energetisch lichaam (chakra's & kosha's), teaching methodology, filosofie
      (Yoga Sutras), toegepaste anatomie (online cursus David Keil), art of
      relaxation (yin/restorative/yoga nidra), fysiologie (zenuwstelsel)"
    styles: [ vinyasa ]
    accreditation:
      - body: yoga_alliance
        label_claimed: "200h Vinyasa Teacher Training; RYT-200 na afronding"
