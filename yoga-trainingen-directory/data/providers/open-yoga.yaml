programs:
  - id: 200-basis
    name: "Basis Yoga Opleiding (200u) / Fundamental Teacher Training"
    url: https://openyoga.nl/basis-yoga-opleiding/
    format_label: "200"
    style_claimed: "Algemene 200u-basis: functioneel uitgevoerde asana, functionele
      anatomie (botten/spieren), meditatie, pranayama, lesgeven & sequencing,
      filosofie, geschiedenis, yoga & ondernemen"
    styles: []
    accreditation:
      - body: yoga_alliance
        label_claimed: "Once you have completed our teacher training you can register at
          Yoga Alliance with your certificate"
        verified: yes
        source: ya-register-2026-06
        note: "RYS van Open Yoga geverifieerd in het register."
    delivery:
      mode: in_person
      structure: weekends
      duration_months_min: 4
      language: nl
    prerequisites_claimed: "voor iedereen; geen vooropleiding (zowel aankomend
      docent als verdieping eigen practice)"
    price:
      amount_eur: 2890
      vat: unknown
      published: yes
      includes: "€175 inschrijfkosten; gratis lessen bij Open Yoga + 10% korting op
        workshops tijdens de opleiding"
      excludes: "boeken (±€125)"
      note: "€2890 incl. €175 inschrijfkosten; termijnbetaling mogelijk. Geen
        btw-vermelding → vat unknown (§4.11), ondanks CRKBO."
      source: site-basis-2026-06
    hours_claimed:
      total: 200
      contact: null
      self_study: null
      supervised_teaching_practice: null
      breakdown_published: not_published
      contact_published: not_published
      source: site-basis-2026-06
      note: >
        200u over 8 trainingsweekenden (vr/za/zo 09:00-17:00, jun-sep 2026).
        Functionele anatomie is een kernonderdeel. Lesgeven is onderdeel maar
        niet als geïsoleerd uren-/lespraktijk-urental gepubliceerd. NB: ook een
        Engelstalige variant ('Fundamental Teacher Training', zie
        site-fundamental).
    assessment_described:
      exists: not_published
      quote: "De diploma uitreiking is op 27 september."
    track_record:
      first_seen_year: 2018
      source: ya-register-2026-06
      note: "Studio 10+ jaar; RYS sinds 2018."
    cohorts:
      - id: basis-2026-06
        start: "2026-06"
        end: "2026-09"
        status: announced
        source: site-basis-2026-06
        language: nl
        lead_teachers: [ "Dieuwertje Homan", "Esther van der Hoef", "Sarah van der Sman" ]
        note: "Start 5-6-7 jun 2026, 8 weekenden, diploma-uitreiking 27 sep 2026."

  - id: 300-advanced
    name: "Advanced Teacher Training (300hr) — Continuing Education"
    url: https://openyoga.nl/advanced-yoga-teacher-training/
    format_label: "300"
    style_claimed: "Continuing Education: zelf samengesteld uit keuzemodules met
      internationale gastdocenten (filosofie, geschiedenis, asana, anatomie,
      pranayama)"
    styles: []
    accreditation:
      - body: yoga_alliance
        label_claimed: "300hr certification na het afronden van het programma binnen 2,5
          jaar; alle modules op dezelfde studio; daarna RYT500 aan te vragen"
        verified: yes
        source: ya-register-2026-06
        note: "RYS 300 van Open Yoga geverifieerd in het register."
    delivery:
      mode: in_person
      structure: modular
      duration_months_max: 30
      language: en
    prerequisites_claimed: "afgeronde 200u (Fundamental/Basis) Teacher Training"
    prerequisite:
      # DE POORT IS HUN EIGEN OPLEIDING, en die staat in dit record — dus geen
      # tweede, verouderbare kopie van de prijs hier: `program:` verwijst, en het
      # padtotaal leest de (afgeleide) totaalprijs van die opleiding zelf.
      - kind: program
        label: "Basis Yoga Opleiding (200u) / Fundamental Teacher Training"
        program: 200-basis
        source: site-advanced-2026-06
        note: >
          De pagina noemt de eigen 200u-opleiding als de opleiding die eraan
          voorafgaat: "After finishing your Fundamental Teacher Training
          (200-hour) you can deepen your teaching skills and expand your
          knowledge with our Continuing Education program." Een extern behaalde
          200u wordt op deze pagina niet genoemd. Het padtotaal blijft niettemin
          leeg: Open Yoga publiceert voor de Advanced (300u) zélf geen prijs
          (`published: not_published`), en een pad zonder eerste term is geen
          som maar een gok.
    price:
      amount_eur: null
      vat: unknown
      published: not_published
      note: >
        Geen vaste totaalprijs gepubliceerd: zelf samen te stellen uit losse
        modules (ook los te boeken zonder volledige inschrijving); prijs per
        module via e-mail. Na 200+300 → RYT500 aan te vragen.
      source: site-advanced-2026-06
    hours_claimed:
      total: 300
      contact: null
      self_study: null
      supervised_teaching_practice: null
      breakdown_published: not_published
      contact_published: not_published
      source: site-advanced-2026-06
      note: >
        300u zelf samen te stellen uit keuzemodules binnen 2,5 jaar; YA-eis:
        alle modules op één locatie. Modules grotendeels in weekenden/avonden,
        met internationale gastdocenten (o.a. Max Strom gaf hier gastlessen —
        zie provider inner-axis).
    composition:
      type: free_assembly
    coherence_signals:
      required_sequence: no
      required_sequence_note: "'Design your own' — modules in vrije volgorde/keuze."
      single_cohort_intake: no
      single_cohort_intake_note: "Doorlopend modulair (Continuing Education), geen vaste cohort-start."
      integrative_assessment: not_published
      integrative_assessment_note: "Geen overkoepelende toetsing beschreven; CE-modules."
      continuous_lead_teacher: no
      continuous_lead_teacher_note: "Wisselende internationale gastdocenten per module."
      modules_sold_separately: yes
      modules_sold_separately_note: "Modules zijn los te volgen zonder inschrijving
        voor het volledige 300u-traject."
      bundle_price_below_sum: not_published
      bundle_price_below_sum_note: "Geen prijzen gepubliceerd."
      source: site-advanced-2026-06
    assessment_described:
      exists: not_published
    track_record:
      first_seen_year: 2018
      source: ya-register-2026-06
      note: "Modulair CE-traject; geen vaste cohort. Internationale gastdocenten."

