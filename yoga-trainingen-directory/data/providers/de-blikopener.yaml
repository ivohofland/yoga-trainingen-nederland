programs:
  - id: hatha-raja-opleiding
    name: "Hatha Raja Yoga docentenopleiding"
    url: https://www.blikopener.info/
    format_label: other # eigen meerjarig traject; VYN-erkend, geen RYT-label gepubliceerd
    style_claimed: "Hatha en Raja yoga; 'Houding + Adem = Energie'; klassieke traditie"
    accreditation:
      - body: vyn
        label_claimed: "landelijk officieel erkend door de Vereniging Yogadocenten
          Nederland (V.Y.N.) en de Europese Yogafederatie (U.E.Y.)"
        verified: "yes"
        source: vyn-register-2026-06
    delivery:
      mode: in_person
      structure: mixed
      language: nl
    price:
      # PER STUDIEJAAR, GEEN TOTAAL. De tarievenpagina zegt: "€ 1290,- (vanaf 1 juni
      # 2026) per studiejaar", en de opleiding is een meerjarig traject. Een
      # jaarbedrag is geen totaalprijs, en er is er geen: de Blikopener publiceert
      # nergens wat de hele opleiding kost. Vermenigvuldigen met een aantal jaren zou
      # een getal fabriceren dat zij niet noemen (en dat afhangt van een jarental dat
      # zij evenmin als urental publiceren) — dat is precies het soort afgeleide
      # "feit" over een genoemd bedrijf dat dit project verbiedt. Dus: het bedrag dat
      # zij WEL noemen, met in de note wat het is. Elke afgeleide die dit als totaal
      # zou lezen (€/contactuur) is hier hoe dan ook geblokkeerd: er zijn geen
      # gepubliceerde contacturen.
      amount_eur: 1290
      variants:
        - { label: "per studiejaar (vanaf 1 juni 2026)", amount_eur: 1290 }
        - { label: "vroegboekkorting 1e jaar 2026, bij inschrijving vóór 5 juli 2026", amount_eur: 1220 }
      # BLIJFT exempt_crkbo, NIET omdat de pagina dat zegt — zie note. Ongewijzigd
      # gelaten omdat het een bestaande, elders gemaakte keuze is; het bewijs
      # hieronder zegt dat `unknown` de juiste waarde zou zijn (spec §4.11).
      vat: exempt_crkbo
      published: "yes"
      excludes: "eenmalig € 100,- inschrijf- en boekengeld in het 1e jaar; de
        verblijfskosten van het jaarlijkse yogaweekend ('vanaf 1 juli 2026 € 335,-')."
      note: "€ 1290,- per STUDIEJAAR (tarievenpagina, geharvest 2026-07-12), niet per
        opleiding: het traject loopt meerdere jaren en een totaalprijs publiceren zij
        niet. Niet vermenigvuldigd — dat zou een bedrag verzinnen dat zij nergens
        noemen. LET OP (BTW): de tarievenpagina noemt géén BTW — geen 'incl.', geen
        'excl.', geen 'vrijgesteld', geen CRKBO. Volgens spec §4.11 hoort `vat` dan
        `unknown` te zijn; de bestaande waarde `exempt_crkbo` is hier niet op deze
        bron te gronden en lijkt afgeleid uit de CRKBO-registratie, wat §4.11 juist
        verbiedt. Bewust ongewijzigd gelaten en gemeld i.p.v. stil gecorrigeerd."
      source: tarieven-2026-07
    hours_claimed:
