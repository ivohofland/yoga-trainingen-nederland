programs:
  - id: 200-yin
    name: "Yin Yoga Opleiding (200u YA, 4 modules)"
    url: https://pureenergyyoga.nl/200-uur-yin-yoga-opleiding-training/
    format_label: "200"
    style_claimed: "Yin Yoga in de lijn van founders Paul & Suzee Grilley:
      functionele anatomie & fascia, skeletale variatie, energetische anatomie
      (meridianen, 5 elementen, Chinese geneeskunde), Qi Gong/energiewerk,
      myofascial release (myoyin), mindfulness & meditatie, lesopbouw/thematiek"
    styles: [ yin ]
    accreditation:
      - body: yoga_alliance
        label_claimed: "Yoga Alliance geregistreerde 200u Yin Yoga opleiding; na
          afronding aanmelden als RYT 200 (internationaal erkend docent). Elke
          module 50h CE (YACEP)"
        verified: yes
        source: ya-register-2026-06
        note: "RYS 200 van Pure Energy Yoga geverifieerd in het register; lead teacher
          Esther Scheen is E-RYT 500."
    delivery:
      mode: in_person
      structure: modular
      duration_months_min: 7
      language: nl
    prerequisites_claimed: "geen; advies om met de basis-module (Anatomie) te
      starten. Enige volgorde-eis: Yin Yoga & Energiewerk (Qi Gong) vereist
      eerst Yin Yoga & Energie (of een basis in meridianenleer + 5 elementen)"
    price:
      amount_eur: 2897
      variants:
        - { label: "1 module (50u)", amount_eur: 847 }
        - { label: "2 modules (100u)", amount_eur: 1547 }
        - { label: "3 modules (150u)", amount_eur: 2159 }
        - { label: "4 modules (200u, volledige opleiding)", amount_eur: 2897 }
      vat: unknown
      published: yes
      includes: >
        per module een full-colour Nederlandstalig Pure Energy Yin Yoga lesboek
        (4 totaal), playlists, lesoverzichten, ondersteunend videomateriaal, 2
        guasha-tools, 2 kleine fasciaballetjes + 1 opblaasbare fasciabal, en
        (eventueel) het online examen
      excludes: "'The Complete Guide to Yin Yoga' (Bernie Clark) — zelf aanschaffen"
      note: >
        €2897 voor de volledige 200u (4 modules), of per pakket/module
        afzonderlijk; termijnbetaling mogelijk. GEEN btw-vermelding op de site →
        vat unknown (§4.11), ondanks CRKBO-docentregistratie van Esther Scheen.
      source: site-event-200-2026-06
    hours_claimed:
      total: 200
      contact: null
      self_study: null
      supervised_teaching_practice: null
      breakdown_published: not_published
      source: site-200-2026-06
      note: >
        4 modules van 50u (Anatomie/basis, Energie, Energiewerk/Qi Gong,
        Myofascial release/myoyin). Elke 50u-module = 5 lesdagen + persoonlijke
        zelfstudie/lees-/huiswerkopdrachten (~12u/module, grotendeels
        Bernie-Clark-lezen vooraf). 200u-diploma = 4 modules + online
        theorie-examen + afrondingsopdracht. Geen geïsoleerd contact-/
        lespraktijk-urental gepubliceerd.
    composition:
      type: fixed_modular
    coherence_signals:
      required_sequence: no
      required_sequence_note: "Modules in flexibele volgorde, basis aanbevolen eerst;
        uitzondering: Qi Gong vereist eerst de Energie-module."
      single_cohort_intake: no
      single_cohort_intake_note: "Modules minstens 2×/jaar, op wisselende locaties
        (Amsterdam/Amersfoort/België); doorlopende, samen-te-stellen instroom.
        Daarnaast een gebundeld 200u-cohort (zie cohorts)."
      modules_sold_separately: yes
      modules_sold_separately_note: >
        Dezelfde 4 modules worden óók los verkocht als YACEP-nascholing (50h CE)
        voor reeds gediplomeerde docenten — dubbele dienst op 200u-niveau: ieder
        modulair onderdeel telt mee voor het 200u-traject én staat los als
        continuing-education-product (vgl. AALO).
    assessment_described:
      exists: yes
      quote: "Als je alle vier de modules volgt dan kun je een online theorie-examen
        en afronding doen en een 200 uurs Yoga Alliance diploma ontvangen"
    contract:
      cancellation_published: yes
      refund_published: yes
      installments_published: yes
      source: site-event-200-2026-06
      note: "Annulering: ≥12 wkn voor start €100 admin; 12-8 wkn 50%; <8 wkn 100%
        lesgeld. NA ontvangst van de studieboeken geen restitutie meer."
    track_record:
      first_seen_year: 2018
      source: ya-register-2026-06
      note: >
        RYS sinds nov 2018; doorlopend modulair aanbod (YA-venster 2024-2028).
        Esther Scheen werkte naar eigen zeggen jaren als lead
        teacher/ontwikkelaar van andere 200u Yin(&Yang)-opleidingen.
    cohorts:
      - id: yin-2026-09-amsterdam
        start: "2026-09"
        end: "2027-04"
        status: announced
        source: site-event-200-2026-06
        language: nl
        note: >
          Gebundeld 20-daags 200u-cohort, Yogaschool Noord Amsterdam (25 sep
          2026 - 17 apr 2027): Basis (sep-okt) → Energie (okt-nov) → MFR/Myoyin
          (jan-feb 2027) → Qi Gong (apr 2027). Inschrijving + booking via host
          yogaschoolnoord.nl; lead Esther Scheen + gastdocenten.
    teachers:
      - person_id: esther-scheen
        role: "lead teacher / eigenaar"
      - person_id: angelique-boset
        role: "gastdocent (zenuwstelsel & meditatie masterclasses)"
      - person_id: jeske-papadopoulos
        role: "docent (YA teaching staff)"

