crkbo:
  registered: yes
  register: instelling
  holder: "Yoga Moves B.V."
  checked: "2026-06-18"
  source: crkbo-register-2026-06
  note: >
    Register-geverifieerd: zoekterm "Yoga Moves" in het Naam-veld van het CRKBO
    Register Instellingen geeft exact 1 treffer — "Yoga Moves B.V., Utrecht,
    www.yogamoves.nl" (gecontroleerd 2026-06-18). Bevestigd door btw-vrije
    verkoop op de site ("exempt from VAT (BTW) as we are CRKBO-registered") =
    direct waargenomen exempt_crkbo. Het register heeft geen per-instelling
    permalink; bewijs is de gedateerde lokale snapshot van het zoekresultaat
    (zie bron crkbo-register-2026-06).
registrations:
  - body: yoga_alliance
    identifier: "RYS 200, RYS 300"
    holder: "Yoga Moves"
    first_registered: "2005-08"
    verified_in_register: unknown
    source: ya-register-ym-2026-06
    note: >
      Studio-gehouden registratie. Site: "Yoga Alliance Registered Yoga School
      (RYS) since 2005. (YA ID: 19445)". Oudste NL-geregistreerde RYS.
      verified_in_register=unknown tot de Salesforce-pagina browser-gerenderd is
      vastgelegd.
  - body: yoga_alliance
    identifier: "RYS 200"
    holder: "Pranayama (Marilou van Hoek)"
    first_registered: "2020-09"
    verified_in_register: yes
    source: ya-register-pranayama-2026-06
    note: >
      HOLDER-SPECIMEN: de Ashtanga-opleiding (programma ashtanga-tt) wordt
      gehost door Yoga Moves maar gecertificeerd door Marilou van Hoeks eigen
      school "Pranayama" (pranayama.nl) — een aparte YA-RYS, niet de Yoga
      Moves-registratie. Diploma komt van Pranayama; btw-vrijstelling loopt via
      Yoga Moves' CRKBO.
      HER-VERIFICATIE 2026-06-25 (plaatsingsbesluit gecontroleerd): het live
      YA-profiel "Pranayama" is een ECHTE zelfstandige RYS (eigen adres Franz
      Lehársingel, Utrecht — NIET het Yoga Moves-studioadres; First Registered
      September 2020; 4.78/16 reviews; enige teaching staff Marilou van Hoek,
      E-RYT 500/YACEP; 0 upcoming training dates). De Ashtanga-200u wordt echter
      uitsluitend op yogamoves.nl gemarket en geboekt; pranayama.nl is een
      brochure-site (slideshow) zonder eigen 200u-inschrijving (eerder alleen een
      100u Sādhana Mentorship waargenomen). Volgens decision #9 (canonieke
      marketing + booking = yogamoves.nl) blijft de Ashtanga-TT dus een programma
      ONDER Yoga Moves, met Pranayama als holder-nuance. SPLITS-TRIGGER: zodra
      pranayama.nl zelf een 200/300/500u-traject mét eigen inschrijving voert,
      Pranayama als eigen provider-record afsplitsen.
