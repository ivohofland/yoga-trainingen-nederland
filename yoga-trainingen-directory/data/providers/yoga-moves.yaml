programs:
  - id: 200-vinyasa
    name: "200 Hour Accredited Vinyasa Teacher Training"
    url: https://www.yogamoves.nl/yoga-moves-vinyasa-200hr
    format_label: "200"
    style_claimed: "Vinyasa Flow Yoga"
    styles: [ vinyasa ]
    accreditation:
      - body: yoga_alliance
        label_claimed: "Yoga Alliance Registered Yoga School (RYS) since 2005. (YA ID: 19445)"
        verified: unknown
        source: ya-register-ym-2026-06
        note: >
          Op dezelfde pagina ook: "register with Yoga Alliance International as
          RYT-200" — vermengt de gewone Yoga Alliance (RYS 19445) met "Yoga
          Alliance International". Zie claim ya-international-200.
    delivery:
      mode: in_person
      structure: mixed
      duration_months_min: 6
      language: en
    price:
      amount_eur: 2860
      vat: exempt_crkbo
      published: yes
      excludes: >
        studieboeken (±€70), reiskosten, lunch, extra
        (vinyasa-/alignment-)lessen; €100 niet-restitueerbare aanmeldkosten
      note: >
        Regulier €2860 (+ €50 admin bij termijnbetaling). Vroegboek-ladder
        afhankelijk van inschrijfdatum: aflopend tot €2360 (tiers €2760/2660/
        2560/2460/2360 per deadline, per start-editie).
      source: site-200-2026-06
    hours_claimed:
      total: 200
      contact: null
      self_study: null
      supervised_teaching_practice: null
      breakdown_published: not_published
      contact_published: not_published
      source: site-200-2026-06
      note: >
        Geen urenuitsplitsing op de pagina; "observing in YM classes" inbegrepen
        maar niet gekwantificeerd.
    assessment_described:
      exists: yes
      continuous: yes
      final: unknown
      quote: "evaluations during the course dates"
    track_record:
      first_seen_year: 2005
      source: ya-register-ym-2026-06
      note: "Oudste NL-RYS; vlaggenschip-200u. Twee parallel-edities (do-programma +
        weekendprogramma)."
    cohorts:
      - id: 200-do-2026-09
        start: "2026-09"
        status: announced
        source: site-200-2026-06
        language: en
        lead_teachers: [ "Jasmijn Koelink", "Caitlin Lindsey", "Hilary Brown" ]
        note: "Donderdagprogramma, start 24 sep 2026, ~3 donderdagen/maand, Studio ONE."
      - id: 200-we-2027-01
        start: "2027-01"
        end: "2027-07"
        status: announced
        source: site-200-2026-06
        language: en
        lead_teachers: [ "Jasmijn Koelink", "Caitlin Lindsey", "Hilary Brown" ]
        note: "Weekendprogramma, start 22 jan 2027, 8 weekenden vr-za-zo, Fly Studio,
          eindigt begin juli."

  - id: 300-advance
    name: "Advance Your Yoga — Teacher Training RYT 300 Hour"
    url: https://www.yogamoves.nl/advanceyouryoga
    format_label: "300"
    style_claimed: "embodied Vinyasa, Hatha, and Prana Flow"
    styles: [ vinyasa, hatha ]
    accreditation:
      - body: yoga_alliance
        label_claimed: >
          Yoga Alliance Registered Yoga School (RYS) since 2005 (YA ID: 19445);
          "The full 300-hour program meets Yoga Alliance requirements for
          advanced training (RYT-500)"
        verified: unknown
        source: ya-register-ym-2026-06
        note: >
          Deze pagina distantieert zich juist expliciet van naäpers ("we work
          with YogaAlliance.org (there are many copy cats!)") — contrast met de
          200u- en Ashtanga-pagina's die "Yoga Alliance International" noemen.
          Zie claim ya-copycats-300.
    delivery:
      mode: hybrid
      structure: modular
      duration_months_min: 12
      duration_months_max: 36
      language: en
    prerequisites_claimed: "200-hour certificate from a recognised school;
      practising a form of Vinyasa yoga"
    price:
      amount_eur: 3950
      variants:
        - { label: "volledig programma", amount_eur: 3950 }
        - { label: "vroegboek (volledig betaald voor 2 jan)", amount_eur: 3700 }
      vat: exempt_crkbo
      published: yes
      includes: >
        alle foundation-modules + retraite (accommodatie & eten), handleidingen
        per module, evaluatie per module, 2 jaar gratis online videotheek
      excludes: "transport, boeken, lunch, incidentals retraite, keuze-uren
        (electives); €50 admin bij termijn; €55 per uitgestelde module"
      note: >
        Ook deel-instap mogelijk: eerste 4 modules incl. Inner Compass los €2745
        (aanbod €2545), eerste 3 modules €1545 (aanbod €1395).
      source: site-300-2026-06
    hours_claimed:
      total: 300
      contact: 245
      self_study: null
      supervised_teaching_practice: null
      breakdown_published: yes
      contact_published: yes
      source: site-300-2026-06
      note: >
        "245+ contact hours in 8 required modules" + 45 keuze-uren (electives) +
        "OmWork" (persoonlijke praktijk ±15-20u/maand, 25 te geven lesuren,
        eindproject). Begeleide lespraktijk niet als apart urental; wel Module 7
        "The Art of Reading Bodies" (adjustments) en 25 lesuren als
        afstudeereis.
    composition:
      type: free_assembly
    coherence_signals:
      required_sequence: not_published
      required_sequence_note: "8 modules met data feb-dec, maar 'electives at your own
        timing' en af te ronden over 1-3 jaar; elke module draait elke 12-18
        mnd."
      single_cohort_intake: no
      single_cohort_intake_note: "Modulair; aangekondigde start feb 2026 maar modules
        afzonderlijk en gespreid te volgen."
      integrative_assessment: yes
      integrative_assessment_note: "Eindproject (gedeeld in laatste weekend) overspant
        het traject; daarnaast per-module evaluatie."
      continuous_lead_teacher: no
      continuous_lead_teacher_note: "Samengestelde faculty (Doug Keller, Shiva Rea,
        Simon Rowe, Nele van Poucke, Hilary Brown, Marianne van Wetter); geen
        doorlopende hoofddocent."
      modules_sold_separately: yes
      modules_sold_separately_note: "\"individual modules can also be booked
        separately\"; elke module heeft eigen prijs/pagina."
      bundle_price_below_sum: unknown
      bundle_price_below_sum_note: "Modulprijzen nog niet alle uitgelezen;
        deel-aanbiedingen (€2545 vs €2745) suggereren korting maar volledige som
        nog te berekenen."
      source: site-300-2026-06
    assessment_described:
      exists: yes
      continuous: yes
      final: yes
      quote: "Attend & pass each modules evaluation process, which may include a
        multiply choice a written or video assignment, practical evaluations, or
        quizzes"
    contract:
      cancellation_published: yes
      refund_published: yes
      min_participants:
        clause: yes
      installments_published: yes
      invoicing_entity: "Yoga Moves B.V."
      source: site-300-2026-06
      note: "Annulering tot 42 dagen (6 weken) voor start, onder inhouding van o.a.
        €100 aanmeld- en €50 admin-fee; daarna geen restitutie. School behoudt
        recht te annuleren bij onvoldoende inschrijvingen."
    transparency:
      syllabus_published: yes
      hours_breakdown_published: yes
      assessment_criteria_published: yes
      reading_list_published: not_published
      teacher_bios_published: yes
      source: site-300-2026-06
    track_record:
      first_seen_year: 2026
      source: site-300-2026-06
      note: "Als 'NEW' aangekondigd, start feb 2026; school heeft RYS sinds 2005 maar
        dit specifieke 300u-traject is nieuw."
    cohorts:
      - id: 300-2026-02
        start: "2026-02"
        status: announced
        source: site-300-2026-06
        language: en
        note: "Modulair, start feb 2026, af te ronden in 1-3 jaar."

  - id: ashtanga-tt
    name: "Ashtanga Yoga Teacher Training"
    url: https://www.yogamoves.nl/ashtanga-teacher-training
    format_label: "200"
    style_claimed: "Ashtanga Yoga (Primary Series), lijn Pattabhi Jois /
      Krishnamacharya; pranayama in Kaivalyadham-lijn"
