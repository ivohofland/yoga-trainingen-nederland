      duration_months_min: 9
      language: en
    prerequisites_claimed: "solid foundation in Ashtanga yoga practice (Led classes
      and/or Mysore) of preferably at least 1 year; min. 3 maanden regelmatige
      praktijk bij instroom uit andere stijl"
    price:
      amount_eur: 2750
      variants:
        - { label: "regulier", amount_eur: 2750 }
        - { label: "vroegboek (tot 1 feb)", amount_eur: 2650 }
        - { label: "termijnbetaling", amount_eur: 2800 }
      vat: exempt_crkbo
      published: yes
      excludes: "studieboeken (5 verplichte titels)"
      note: "Btw-vrij via Yoga Moves' CRKBO."
      source: site-ashtanga-2026-06
    hours_claimed:
      total: null
      contact: null
      self_study: null
      supervised_teaching_practice: null
      breakdown_published: not_published
      contact_published: not_published
      source: site-ashtanga-2026-06
      note: >
        Geen uren-totaal op de pagina (format via RYS 200). Wel: "Observing and
        Assisting in Class: at least 12 hours under the guidance of Lead
        Teacher/ Assistant(s)" (observeren/assisteren), dagelijkse eigen
        praktijk 1-2u, huiswerk 3-8u/week.
    assessment_described:
      exists: yes
      continuous: unknown
      final: yes
      quote: "The last weekend is examinations and graduation day."
    track_record:
      first_seen_year: null
      source: site-ashtanga-2026-06
      note: "Eerdere edities blijkens testimonials/foto's (o.a. 2022); huidige cohort
        start 7 maart 2026."
    cohorts:
      - id: ashtanga-2026-03
        start: "2026-03"
        status: announced
        source: site-ashtanga-2026-06
        language: en
        lead_teachers: [ "Marilou van Hoek" ]
        note: "Start 7 maart 2026 (oorspronkelijk 6 maart; inhaaldag 20 juni); 8
          weekenden vr-za-zo 11:30-18:30, Fly Studio."

