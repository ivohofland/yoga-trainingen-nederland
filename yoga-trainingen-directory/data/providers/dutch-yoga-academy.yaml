programs:
  - id: 200-vinyasa
    name: "200-uurs Vinyasa Yogadocentopleiding"
    url: https://www.dutchyogaacademy.com/opleiding
    format_label: "200"
    style_claimed: "Vinyasa Flow (basis ook toepasbaar op Hatha/Gentle/Slow/Hatha
      Flow); asana & pranayama (+ kriyas/bandhas), alignment & adjustment
      (Iyengar/ Hanson Lasater/Van Leeuwen/Grilley-invloeden), anatomie &
      fysiologie, meditatie, filosofie (Yoga Sutras), didactiek, sequencing,
      yoga business"
    styles: [ vinyasa ] # primair Vinyasa; Hatha/Slow Flow als variant "ruimte voor eigen stijl", niet co-equaal (§4.12)
    accreditation:
      - body: yoga_alliance
        label_claimed: "geregistreerd bij Yoga Alliance; 'voldoet aan de hoogste
          kwaliteitseisen van Yoga Alliance'"
        verified: yes
        source: ya-register-2026-06
        note: >
          RYS 200 geverifieerd. Zelfde claim-formulering "Yoga Alliance een
          Amerikaanse organisatie die yogaopleidingen controleert en
          accrediteert" als bij Jai Yoga - terugkerend patroon (YA inspecteert
          geen onderwijs). Lead teacher Merel Martens is E-RYT 500.
      - body: crkbo
        label_claimed: "(geen expliciete CRKBO-/btw-claim op de opleidingspagina)"
        verified: yes
        source: crkbo-register-2026-06
        note: "CRKBO-Instelling 'Dutch Yoga Academy' (Odiliapeel) register-geverifieerd;
          de site claimt CRKBO niet prominent."
    delivery:
      mode: in_person
      structure: weekends
      duration_months_min: 10
      language: nl
    prerequisites_claimed: "ervaring/enthousiasme voor yoga; bij voorkeur 1-2 jaar
      yoga-ervaring. Geschikt voor aankomend docent én verdieping."
    price:
      amount_eur: null
      vat: unknown
      published: not_published
      includes: >
        10 opleidingsweekenden, Syllabus Theorie & Anatomie (80+ pp), Syllabus
        Alignment (50 houdingen), boek 'Essential Yoga Therapy' (twv €25),
        online cursus 'Applied Anatomy and Physiology' (twv €250), individueel
        begeleidingstraject (intake- + voortgangsgesprek)
      excludes: "literatuur (Ray Long, Eddie Stern, Van Kraalingen) — zelf aanschaffen"
      note: >
        BASISBEDRAG NIET NUMERIEK GEPUBLICEERD op de Data&Kosten-pagina: alleen
        €260 vroegboekkorting (inschrijven voor november) + €500 aanbetaling
        worden genoemd. Geen btw-vermelding → vat unknown (§4.11) ondanks CRKBO.
      source: site-2026-06
    hours_claimed:
      total: 200
      contact: null
      self_study: null
      supervised_teaching_practice: null
      breakdown_published: not_published
      source: site-2026-06
      note: >
        10 weekenden (za 12:00-18:00, zo 10:00-17:00) + ~3-5u zelfstudie/week.
        Concreet feedbacksignaal: halverwege én aan het einde een OPGENOMEN les
        die door de hoofddocent wordt beoordeeld + uitgebreide feedback (op
        opnames, niet live geobserveerd). Geen geïsoleerd
        contact-/lespraktijk-urental.
    group_size_claimed:
      min: 8
      max: 21
      source: site-2026-06
      note: "Streven 18-21 deelnemers; training gaat door bij min. 8 (anders
        aanbetaling retour)."
    assessment_described:
      exists: yes
      final: yes
      quote: "Om het certificaat te ontvangen vragen we je op het einde van de
        opleiding een yogales op te nemen. Deze wordt door de hoofddocent
        beoordeeld en van feedback voorzien."
    contract:
      cancellation_published: yes
      refund_published: yes
      source: site-2026-06
      note: "14 dagen wettelijke bedenktijd (kosteloos); daarna aanbetaling (€500)
        niet gerestitueerd; na aanvang geen annulering (opschorting mogelijk bij
        ziekte/zwangerschap). DYA kan annuleren bij <8 aanmeldingen (volledige
        terugbetaling)."
    track_record:
      first_seen_year: 2020
      source: ya-register-2026-06
      note: >
        Claimt 15+ jaar opleiden (India + NL), 300+ afgestudeerden; DYA Nijmegen
        sinds 2018; YA-RYS sinds 2020. Jaarlijks cohort (maart-december).
    cohorts:
      - id: vinyasa-2026-03
        start: "2026-03"
        end: "2026-12"
        status: confirmed_ran
