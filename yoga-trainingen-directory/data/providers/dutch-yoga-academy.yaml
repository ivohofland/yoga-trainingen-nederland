programs:
  - id: 200-vinyasa
    name: "200-uurs Vinyasa Yogadocentopleiding"
    url: https://www.dutchyogaacademy.com/opleiding
    format_label: "200"
    style_claimed: "Vinyasa Flow (met ruimte voor eigen stijl: Dynamische Hatha /
      Slow Flow); wetenschappelijk onderbouwde anatomie en fysiologie"
    styles: [vinyasa]  # primair Vinyasa; Hatha/Slow Flow als variant "ruimte voor eigen stijl", niet co-equaal → geen tweede tag (§4.12)
    accreditation:
      - body: yoga_alliance
        label_claimed: "geregistreerd bij Yoga Alliance; 'voldoet aan de hoogste
          kwaliteitseisen van Yoga Alliance'"
        verified: "yes"
        source: ya-register-2026-06
        note: >
          RYS 200 geverifieerd. Zelfde claim-formulering "Yoga Alliance een
          Amerikaanse organisatie die yogaopleidingen controleert en
          accrediteert" als bij Jai Yoga - terugkerend patroon (YA inspecteert
          geen onderwijs). "Voldoet aan de hoogste kwaliteitseisen" is eveneens
          claim-materiaal.
    delivery:
      mode: in_person
      structure: weekends
      duration_months_min: 10
      language: nl
    price:
      amount_eur: null
      vat: unknown
      published: "yes"
      includes: "syllabus, online cursus 'Anatomie & Fysiologie voor Yogadocenten'
        (los EUR 250), boek 'Essential Yoga Therapy' (los EUR 25)"
      note: "prijs op /data-prijzen, nog niet uitgelezen; vroegboekkorting genoemd;
        overige literatuur zelf aanschaffen"
      source: site-2026-06
    hours_claimed:
      total: 200
      contact: null
      self_study: null
      supervised_teaching_practice: null
      breakdown_published: not_published
      source: site-2026-06
      note: >
        Geen urenverdeling gepubliceerd. Wel concreet feedbacksignaal: "twee
        keer uitgebreid persoonlijke feedback op een opgenomen les" - begeleide
        feedback op lesgeven, zij het op opnames i.p.v. live geobserveerd.
    group_size_claimed:
      max: 20
      source: site-2026-06
      note: "'we streven naar 18-20 mensen per groep'"
    assessment_described:
      exists: not_published
    track_record:
      first_seen_year: 2020
      source: ya-register-2026-06
      note: "claimt 15+ jaar opleiden (India + NL), 300+ afgestudeerden; DYA Nijmegen
        sinds 2018"

