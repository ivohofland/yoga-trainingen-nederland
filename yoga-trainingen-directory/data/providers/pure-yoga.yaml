programs:
  - id: 200-pureteacher
    name: "Pureteacher 200-uur Yoga Teacher Foundation Course"
    url: https://www.pureyoga.nl/site/index.php/opleidingen/pureteacher
    format_label: "200"
    style_claimed: >
      All-round Hatha Yoga: je leert lesgeven in vier yogastijlen — Klassieke
      Hatha Yoga, moderne Hatha Yoga, Yin Yoga en Vinyasa (Power) Yoga — plus
      Vedische (yoga)filosofie & de Sūtra's van Patañjali, anatomie/fysiologie/
      kinesiologie gericht op asana (alignment, indicaties/contra-indicaties,
      adjustments, hulpmiddelen), therapeutische werking van yoga, pranayama,
      meditatie/mindfulness, ontspanning en didactiek voor groepslessen. Nadruk
      op zelf beoefenen en een 'beginner's mind'. Nederlandstalig.
    styles: [ hatha, yin, vinyasa ]
    accreditation:
      - body: other
        label_claimed: "internationaal erkende 200 uur opleiding, erkend door /
          'Approved Training Provider' van Yoga Alliance Professionals (RYT
          200)"
        verified: unknown
        source: site-accreditatie-2026-06
        note: >
          Yoga Alliance PROFESSIONALS (YAP, VK) — aparte body, niet de US Yoga
          Alliance. Claim verbatim; niet onafhankelijk in het YAP-register
          gecontroleerd. Zie registrations.
    delivery:
      mode: in_person
      structure: modular
      duration_months_min: 24
      language: nl
    prerequisites_claimed: >
      Toegankelijk voor beginners t/m gevorderden en docenten. Vereisten: min. 2
      jaar eigen yogabeoefening; het is een VEREISTE om naast de opleiding
      yogalessen bij een yogadocent te blijven volgen; vrij van zware blessures;
      schriftelijk intake-assessment + intake-gesprek mogelijk.
      Fysiek/emotioneel veeleisend programma.
    price:
      amount_eur: 4235.20
      vat: incl
      published: yes
      note: >
        €4.235,20 incl. 9% btw (= €3.885,50 excl.) voor de volledige opleiding
        (4 modules). Per module ook mogelijk: I €1.346,70 incl.; II €2.066,64
        incl.; III €1.346,70 incl.; IV inbegrepen na afronden I-III. Betaling in
        termijnen mogelijk. Opmerkelijk: 9% laag btw-tarief (niet 21%); prijs
        wordt incl. btw getoond (ACM-conform). Prijzen vanaf 18 jan 2025.
      source: site-prijzen-2026-06
    hours_claimed:
      total: 200
      contact: 200
      self_study: null
      supervised_teaching_practice: null
      breakdown_published: not_published
      source: site-pureteacher-2026-06
      note: >
        De site noemt "200 contacturen" over ca. 2 jaar, verdeeld over 39
        lesdagen (Module I 10 + II 16 + III 10 + IV 3), naast eigen oefen-/
        studie-uren. De 200u zijn dus geframed als contacturen; de
        zelfstudie-uren en een geïsoleerd lespraktijk-/supervised-teaching-getal
        zijn niet als getallen gepubliceerd.
    composition:
      type: fixed_modular
      modules: [ mod-1-basis, mod-2-praktiseren, mod-3-essentie, mod-4-vaardigheid ]
    assessment_described:
      exists: yes
      continuous: yes
      final: yes
      quote: "Module IV — Vaardigheid: eind-assessments; daarnaast schriftelijk
        intake-assessment en doorlopend werken aan leerdoelen tijdens de
        themadagen."
    track_record:
      first_seen_year: 2021
      source: lesdata-image-2026-06
      note: "Bekende cohorten: 2021 Breda, 2022 Drenthe, 2023 Zwolle. Laatste getoonde
        cohort 2023; geen 2024-2026-cohort op de getoonde lesdata."
    cohorts:
      - id: cohort-2021-breda
        start: "2021-01"
        status: unknown
        source: lesdata-image-2026-06
        language: nl
        note: >
          Cohort 2021 te Breda. LET OP: alleen het jaartal staat op de getoonde
          lesdata; de exacte startmaand is niet gepubliceerd — "2021-01" is een
          schema-placeholder (YYYY-MM verplicht), GEEN geclaimde januari-start.
          De lesdata tonen Module II/III/IV voor dit cohort (tweejarige
          doorloop), wat doorgang suggereert; afronding niet bevestigd (§8) →
          status unknown.
      - id: cohort-2022-drenthe
        start: "2022-01"
        status: unknown
        source: lesdata-image-2026-06
        language: nl
        note: >
          Cohort 2022 in Drenthe (Module I getoond). Startmaand niet
          gepubliceerd; "2022-01" is een placeholder (alleen jaartal bekend).
          Doorgang niet bevestigd (§8).
      - id: cohort-2023-zwolle
        start: "2023-01"
        status: unknown
        source: lesdata-image-2026-06
        language: nl
        note: >
          Cohort 2023 te Zwolle (Module I/II getoond) — meest recente getoonde
