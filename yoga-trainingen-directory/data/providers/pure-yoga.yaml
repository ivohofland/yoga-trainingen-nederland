          opleiding mogelijk tussen cohorten of dormant. Doorgang niet bevestigd
          (§8).
    teachers:
      - person_id: rineke-vierhoven
        role: "Senior Teacher / hoofddocent (min. 30 van 39 lesdagen)"
      - person_id: pepijn-van-sandijk
        role: "docent (ca. 9 lesdagen; onderwijskundige)"

