# yaml-language-server: $schema=../provider.schema.json
id: pure-yoga
name: Pure Yoga
aka: [ "Pureyoga", "Pureteacher", "Pureteacher Yoga Teacher Foundation Course" ]
website: https://www.pureyoga.nl
status: active
# LET OP — naamcollisie: dit is NIET "Pure Energy Yoga" (pureenergyyoga.nl, Esther
# Scheen, Yin/YA-RYS, eigen record pure-energy-yoga). Pure Yoga / Pureteacher is een
# andere organisatie: all-round Hatha-opleiding van Rineke Vierhoven & Pepijn van
# Sandijk, geaccrediteerd bij Yoga Alliance PROFESSIONALS (UK), niet de US Yoga Alliance.
locations:
  - city: Breda
    note: "leslocatie cohort 2021."
  - city: Drenthe
    note: "leslocatie cohort 2022 (provincie; exacte plaats niet gespecificeerd)."
  - city: Zwolle
    note: "leslocatie meest recente cohort 2023. Opleiding draait op wisselende
      leslocaties per cohort; geen vaste hoofdvestiging gepubliceerd."
crkbo:
  registered: unknown
  checked: "2026-06-30"
  source: crkbo-register-2026-06
  note: >
    Geen treffer: naam "Pureyoga" en website "pureyoga" → 0 in het
    Instellingenregister; docent "Vierhoven" → 0 in het Docentenregister
    (2026-06-30). De opleiding wordt EXPLICIET incl. 9% btw geprijsd (€3.885,50
    excl. / €4.235,20 incl.) — er wordt dus btw geheven, consistent met NIET
    CRKBO-vrijgesteld. LEUNT STERK NAAR no, maar blijft unknown: de
    KvK-/juridische naam is niet doorzocht en §4.11 reserveert registered: no
    voor een gedocumenteerde zoektocht op legal name (KvK) + persoonsnamen (een
    merknaam-miss of btw-inferentie alleen blijft unknown). price.vat = incl
    (directe observatie).
registrations:
  - body: other
    identifier: "Yoga Alliance Professionals (YAP) — 'Approved Training Provider'
      (RYT 200-pathway)"
    holder: "Pureyoga (lead: Rineke Vierhoven, Senior Teacher YAP)"
    verified_in_register: unknown
    source: site-accreditatie-2026-06
    note: >
      LET OP: de accreditatie is bij YOGA ALLIANCE PROFESSIONALS (YAP, gevestigd
      in het VK) — een aparte, commerciële body, NIET de US Yoga Alliance
      (app.yogaalliance.org) die wij elders register-verifiëren. Na de
      Pureteacher 200u kan de cursist zich bij YAP registreren als Registered
      Yoga Teacher (membership). Pureyoga afficheert zich als "Approved Training
      Provider" van YAP en lead-docent Rineke Vierhoven als YAP "Senior
      Teacher". Claim verbatim vastgelegd; niet onafhankelijk in het
      YAP-register gecontroleerd (verified_in_register unknown). Een afwezigheid
      in de US YA is hier GEEN overclaim-signaal — het is een andere body.
  - body: vyn
    identifier: "VYN-lidmaatschap lead-docent"
    holder: "Rineke Vierhoven (docent)"
    verified_in_register: unknown
    source: site-docenten-2026-06
    note: >
      Lead-docent Rineke Vierhoven is volgens de docentenpagina lid van de
      Vereniging Yogadocenten Nederland (VYN). Persoonlijk docentlidmaatschap,
      geen school-/opleidingsregistratie; niet in het VYN-register geverifieerd.
legal:
  legal_name: "onbekend (Pureyoga)"
  note: >
    Opleiding verzorgd door Rineke Vierhoven (Senior Teacher YAP; VYN-lid;
    achtergrond in de medische wereld, mindfulness, HartFocus, massage) en haar
    partner Pepijn van Sandijk (onderwijskundige achtergrond). Juridische naam /
    KvK niet doorzocht → legal_name onbekend.
depth: listed
last_verified: "2026-06-30"
sources:
  - id: site-pureteacher-2026-06
    type: website
    url: https://www.pureyoga.nl/site/index.php/opleidingen/pureteacher
    archived_url: https://web.archive.org/web/20260630134409/https://www.pureyoga.nl/site/index.php/opleidingen/pureteacher
    captured: "2026-06"
    note: >
      LIVE (browser-gerenderd) "Pureteacher — erkende 200 uur Yoga docenten
      opleiding, erkend door de Yoga Alliance Professionals". All-round Hatha
      Yoga docent; tweejarige opzet, 200 contacturen, 39 lesdagen verdeeld over
      4 modules: I De basis (Asana, yoga-anatomie, instructie) 10 dagen; II
      Praktiseren (lesgeven in 4 stijlen: Klassieke Hatha, moderne Hatha, Yin,
      Vinyasa) 16 dagen; III De essentie (Pranayama, Meditatie, Adjustments,
      Vedische Filosofie) 10 dagen; IV Vaardigheid (eind-assessments) 3 dagen.
      Curriculum incl. Vedische filosofie & Patañjali-sūtra's, anatomie/
      fysiologie/ kinesiologie, therapeutische werking, adjustments & props,
      didactiek groepslessen, "beginner's mind".
