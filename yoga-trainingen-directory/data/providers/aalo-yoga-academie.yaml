programs:
  - id: yin-yang-ryt200
    name: "Yin/Yang Yoga Teacher Training (RYT-200)"
    url: https://www.aalo.nl/yoga-academie/yin-yang-yoga-teacher-training-ryt-200/
    format_label: "200"
    style_claimed: "Yin en Yang (Power/Vinyasa) yoga; opgebouwd uit losse pakketten
      (basis + advanced + afronding)"
    accreditation:
      - body: yoga_alliance
        label_claimed: "internationaal erkend door Yoga Alliance; na afronding totale
          traject registreren als RYT-200"
        verified: "yes"
        source: ya-register-2026-06
    delivery:
      mode: in_person
      structure: modular
      language: nl
    price:
      # Vergelijkbare basis = goedkoopste ALGEMEEN BESCHIKBARE variant (spec §4). De
      # 5%-korting geldt voor iedereen die het lesgeld ineens betaalt — geen
      # ledenprijs, geen early bird met een datum erop — dus dát is de basis; net als
      # bij dru-yoga, waar 'ineens' de basis is en de termijnregeling de variant.
      # De pagina zet er zelf "VANAF €2988" boven; die € 2.988,- is het lesgeld zonder
      # korting én het totaal van de termijnregeling, en staat daarom als variant.
      amount_eur: 2838.6
      variants:
        - { label: "eenmalig, 5% korting", amount_eur: 2838.6 }
        - {
            label: "12 maandtermijnen à € 249,- (lesgeld zonder korting)",
            amount_eur: 2988
          }
      vat: unknown # de pagina noemt nergens BTW (§4.11: niet afleiden)
      published: "yes"
      includes: "studiemateriaal ('Het lesgeld voor de Yin/Yang Yoga Teacher Training
        is inclusief studiemateriaal')"
      # EXAMENGELD IS NIET INBEGREPEN, en het verschilt per opleiding (€ 553,- hier,
      # € 435,- bij yin-ryt200). Precies het geval waarvoor `excludes` bestaat: wie de
      # twee AALO-trainingen op lesgeld vergelijkt ziet tweemaal € 2.988,- en mist dat
      # de ene € 118,- meer verplicht examengeld kent dan de andere.
      excludes: "examengeld € 553,- ('Het examengeld is inclusief het theorie- en
        praktijkexamen en het erkend diploma')"
      note: "Lesgeld van de opleidingspagina zelf (geharvest 2026-07-12): eenmalig €
        2.988,- → € 2.838,60 met 5% korting, of 12 maandtermijnen à € 249,- (= €
        2.988,-). Examengeld € 553,- komt daar bovenop. De overzichtspagina
        (site-2026-06) noemt geen enkel bedrag; die citeren wij hier dus niet
        meer."
      source: site-yin-yang-2026-07
    hours_claimed:
      total: 200
      contact: null
      self_study: null
      supervised_teaching_practice: null
      breakdown_published: not_published
      contact_published: not_published
      source: site-2026-06
    composition:
      type: free_assembly # RYT200 samengesteld uit losse pakketten/modules
    contract:
      installments_published: "yes"
      source: site-yin-yang-2026-07
      note: "12 maandtermijnen à € 249,- (= € 2.988,-, gelijk aan het lesgeld zonder
        korting; de korting van 5% geldt alleen bij eenmalige betaling)"
    coherence_signals:
      required_sequence: not_published
      single_cohort_intake: "no"
      single_cohort_intake_note: "doorlopende moduulstarts op verschillende locaties/data"
      integrative_assessment: not_published
      integrative_assessment_note: "apart 'Afrondingspakket RYT-200' bestaat; inhoud nog niet uitgelezen"
      continuous_lead_teacher: "no"
      continuous_lead_teacher_note: "wisselende YA-geaccrediteerde docenten/Master Trainers per module"
      modules_sold_separately: "yes"
      modules_sold_separately_note: "modules ook los als basis-/advanced-pakket én als
        Yoga Alliance PE/continuing education verkocht - §7 dubbele dienst, hier
        al op 200u-niveau"
      source: site-2026-06
    assessment_described:
      exists: not_published
    track_record:
      first_seen_year: 2015
      source: ya-register-2026-06
      note: "AALO afficheert 'Feedback Company 8.8' studentbeoordeling als marketing"

