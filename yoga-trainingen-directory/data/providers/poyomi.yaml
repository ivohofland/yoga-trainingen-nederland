programs:
  - id: 200-awakening
    name: "The Awakening Yoga Soul Teacher Training & Retreat (200u)"
    url: https://poyomicenter.nl/products/the-aweking-yoga-soul-teacher-training-retreat
    format_label: "200"
    style_claimed: "Drie stijlen: Kundalini (expliciet NIET volgens Yogi Bhajan,
      i.v.m. zijn omstreden verleden), Easy Vinyasa Power Flow en Yin, plus
      fusion-lessen. Daarnaast: yogafilosofie (yama's/niyama's, achtvoudig pad),
      anatomie & fysiologie (nervus vagus, psoas), pranayama, energieleer
      (chakra's, nadi's), meditatie, teacher skills/sequencing/stemgebruik,
      business (eigen studio/retreat)"
    styles: [ multistyle, kundalini, vinyasa, yin ]
    accreditation:
      - body: yoga_alliance
        label_claimed: "geaccrediteerd door de International Yoga Alliance; officieel
          Yoga Alliance Certificaat na examen (RYT 200)"
        verified: yes
        source: ya-register-2026-06
        note: >
          RYS 200 geverifieerd in het register. 'International Yoga Alliance' is
          claim-materiaal (vermenging met de gewone Yoga Alliance / 'Yoga
          Alliance International') — terugkerend patroon (vgl. Dutch Yoga
          Academy, Jai Yoga).
    delivery:
      mode: hybrid
      structure: weekends
      duration_months_min: 7
      language: nl
    prerequisites_claimed: "HBO werk- en denkniveau; voor wie wil verdiepen,
      transformeren en/of les wil gaan geven"
    price:
      amount_eur: 2700
      variants:
        - { label: "gedeelde kamer", amount_eur: 2400 }
        - { label: "eenpersoonskamer (beperkte beschikbaarheid)", amount_eur: 2700 }
      vat: unknown
      published: yes
      includes: >
        online leeromgeving + studiemateriaal, opgenomen/live online lessen +
        live lessen op locatie, 3-daags retreatweekend incl. ontbijt/lunch/diner
      excludes: "maaltijden bij gewone live-lesdagen (overnachting B&B exclusief
        maaltijden); boekenlijst zelf aanschaffen"
      note: >
        €2400 (gedeelde kamer) / €2700 (eenpersoons), volledig betaald; max 8
        termijnen mogelijk. Geen btw-vermelding → vat unknown (§4.11).
      source: site-product-2026-06
    hours_claimed:
      total: 200
      contact: null
      self_study: null
      supervised_teaching_practice: null
      breakdown_published: not_published
      source: site-product-2026-06
      note: >
        200u training & coaching over ~7 maanden (hybride). 3 lesweekenden
        (Waalwijk/Veen) + 3 zoom-avonden + 3-daags retreatweekend + 2
        praktijkdagen + 2 examendagen. Daarnaast wekelijks zelf een les geven
        aan familie/vrienden + wekelijks zelf een les volgen. Geen geïsoleerd
        contact-/lespraktijk-urental.
    composition:
      type: fixed_modular
    assessment_described:
      exists: yes
      final: yes
      quote: "na het succesvol afleggen van het examen [ontvang je] het officiële Yoga
        Alliance Certificaat"
    track_record:
      first_seen_year: 2023
      source: ya-register-2026-06
      note: "YA-RYS sinds 2023; site-testimonials (2025) + 1 YA-review (okt 2025)."
