programs:
  - id: 200-klassikaal
    name: "RYT/VYN200 Yin & Yang Yoga Teacher Training (klassikaal, Zwolle)"
    url: https://sanayou.com/yin-yang-yoga-teacher-training-ryt200-klassikaal
    format_label: "200"
    style_claimed: "Allround Yin + Yang Yoga (Vinyasa Flow, Hatha, Easy Flow) met
      Critical Alignment-elementen; functionele anatomie/biomechanica, filosofie
      (Bhagavad Gita, Vayus/Koshas/Kriyas), meridianen & 5 Elementen, pranayama,
      meditatie"
    styles: [ multistyle, yin, vinyasa, hatha ]
    accreditation:
      - body: yoga_alliance
        label_claimed: "RYT200, erkend door Yoga Alliance"
        verified: yes
        source: ya-register-2026-06
        note: "RYS geverifieerd in het register."
      - body: vyn
        label_claimed: "VYN200, erkend door de Vereniging Yogadocenten Nederland"
        verified: unknown
        source: vyn-register-2026-06
        note: "VYN-erkenning van de 200u nog te bevestigen (mogelijk aanvraag; zie
          registrations)."
    delivery:
      mode: in_person
      structure: modular
      duration_months_min: 10
      duration_months_max: 36
      language: nl
    prerequisites_claimed: "geen; voor beginnende docenten én beoefenaars die willen verdiepen"
    price:
      amount_eur: 2999
      variants:
        - { label: "volledige RYT/VYN200 in 1 lesjaar (van €3500)", amount_eur: 2999 }
        - { label: "losse module (50u)", amount_eur: 875 }
      vat: unknown
      published: yes
      includes: >
        24 lesdagen (4 modules × 50u, incl. 1 Zoom-lesdag), online leerplatform
        (3 mnd/module), 5 lesboeken, 3 extra online modules (twv €465), 5
        theorietoetsen + deelcertificaten
      excludes: "praktijktoetsen (€97,50 per stuk, apart aan te vragen)"
      note: >
        Volledig in 1 lesjaar €2999 (van €3500, €500 voordeel), in 1/5/10
        termijnen; losse module €875. Tot 3 jaar om alle 4 modules af te ronden.
        Geen btw-vermelding → vat unknown (§4.11), ondanks CRKBO.
      source: site-klassikaal-2026-06
    hours_claimed:
      total: 200
      contact: null
      self_study: null
      supervised_teaching_practice: null
      breakdown_published: not_published
      contact_published: not_published
      source: site-klassikaal-2026-06
      note: >
        4 modules van 50u (Yin 1, Yin 2, Yang 1, Yang 2), elk 6 lesdagen.
        Lesgeven/didactiek + eigen lessen opbouwen aanwezig; geen geïsoleerd
        contact-/lespraktijk-urental gepubliceerd.
    composition:
      type: fixed_modular
    coherence_signals:
      required_sequence: no
      required_sequence_note: "Modules flexibel: 'na elkaar of gelijktijdig', eigen
        tempo; 2 instroommomenten/jaar per module."
      single_cohort_intake: no
      single_cohort_intake_note: "Meerdere startmomenten; modulaire instroom."
      integrative_assessment: yes
      integrative_assessment_note: "Per 100u theorie- + praktijktoets; einddiploma pas
        na beide deelcertificaten + alle examens."
      continuous_lead_teacher: no
      continuous_lead_teacher_note: "Docententeam (Sandy Karsten = hoofd-opleider) +
        wisselende module-docenten."
      modules_sold_separately: yes
      modules_sold_separately_note: "Elke 50u-module los te koop (€875)."
      bundle_price_below_sum: yes
      bundle_price_below_sum_note: "Bundel €2999 < 4×€875 = €3500; bundeldelta ≈ −€501."
      source: site-klassikaal-2026-06
    assessment_described:
      exists: yes
      continuous: yes
      final: yes
      quote: "Wanneer je beide deelcertificaten hebt behaald én alle examens hebt
        afgerond, ontvang je het officieel erkende RYT/VYN200 Yin en Yang Yoga
        Teacher Training Diploma."
    track_record:
      first_seen_year: 2018
      source: site-klassikaal-2026-06
      note: "RYS sinds 2018; deelnemers geven gem. 9.6; meerdere cohorten/jaar."
    cohorts:
      - id: klassikaal-2026-09
        start: "2026-09"
        end: "2027-06"
        status: announced
        source: site-klassikaal-2026-06
        language: nl
        note: "Start 18 sep 2026 (Yin-route) of 25 sep 2026 (Yang-route); volledige
          datumlijst t/m mei 2027 gepubliceerd."
    teachers:
      - person_id: sandy-karsten
        role: "hoofd docentenopleider"
      - person_id: manja-weijers
        role: "anatomie/biomechanica/blessurepreventie"
      - person_id: sandra-merks
        role: "Vinyasa/filosofie/Yin"
      - person_id: amanda-beelen
        role: "Yin/TCM/5 Elementen"

  - id: 200-online
    name: "RYT200 Online Teacher Training (Yin / Yin & Yang / Yang)"
    url: https://sanayou.com/overzicht-online-ryt200-yoga-opleidingen
    format_label: "200"
    style_claimed: "Online, Nederlandstalig; 3 routes: Yin Yoga, Yin & Yang, of Yang"
    styles: [ yin, vinyasa ]
    accreditation:
      - body: yoga_alliance
        label_claimed: "RYT200, erkend door Yoga Alliance (Nederlandstalig, online)"
        verified: yes
        source: ya-register-2026-06
        note: "YA-only (geen VYN voor de online variant)."
    delivery:
      mode: online
      structure: modular
      language: nl
    price:
      amount_eur: 1250
      vat: unknown
      published: yes
      variants:
        - label: "Yin Yoga (online route)"
          amount_eur: 1250
        - label: "Yin & Yang (online route)"
          amount_eur: 1250
        - label: "Yang (online route)"
          amount_eur: 1250
      note: >
        € 1.250,- per route, en alle drie de routes (Yin Yoga / Yin & Yang / Yang)
        kosten hetzelfde — de overzichtspagina zet ze naast elkaar met driemaal
        "€ 1.250,-" en "Betaling in 1, 5 of 10 termijnen". Er is dus geen keuze te
        maken tussen routes voor de vergelijkbare basisprijs (§4-conventie): ze zijn
        identiek. Bedrag uitgelezen uit het gearchiveerde artefact van
        site-online-2026-06 (vastgelegd 2026-06-20).

        Btw: de pagina noemt geen btw-behandeling bij de prijs. Het enige
        btw-woord in het artefact is het BTW-nummer in de footer
        ("BTW nummer: NL001422164B38") — een registratienummer, geen uitspraak
        over de prijs. SanaYou ís CRKBO-geregistreerd, maar §4.11 verbiedt de
        vrijstelling daaruit af te leiden → vat blijft unknown.

        CORRECTIE 2026-07-12: deze notitie stelde eerder dat de geciteerde bron
        "zélf geen bedrag" bevat en dat de prijzen op niet-gearchiveerde
        module-/inschrijfpagina's stonden. Dat was onjuist en het was ONZE fout,
        niet die van de aanbieder: het bedrag stond al die tijd in ons eigen
        archief van deze pagina. De bewering kwam uit een eerste, kapotte versie
        van de provenance-check die PDF's met `strings` doorzocht — dat leest geen
        gecomprimeerde tekststromen, dus las het "geen bedrag" waar er drie
        stonden. De definitieve check (pdftotext, HTML én browser-render) heeft
        deze bron nooit geflagd.
      source: site-online-2026-06
    hours_claimed:
      total: 200
      contact: null
      self_study: null
      supervised_teaching_practice: null
      breakdown_published: not_published
      contact_published: not_published
      source: site-online-2026-06
      note: "200u online, modulair (o.a. Yin Yoga Basics, 5 Elementenleer, Fascia,
        Advanced Yin & Yang Flows)."
    composition:
      type: free_assembly
    track_record:
      first_seen_year: 2018
      source: ya-register-2026-06

  - id: 300-hybride
    name: "RYT300 — The Art of Advanced Teaching (hybride)"
    url: https://sanayou.com/overzicht-ryt300-yoga-opleidingen
    format_label: "300"
    style_claimed: "Verdieping; 2 richtingen: Yin Mastery of Yoga Awakening. Modules
      o.a. Critical Alignment, Yoga Nidra, Your Body Your Yoga, Nervus Vagus,
      Fascia, Restorative Alignment, 5 Elementen, Reiki"
    styles: [ yin, vinyasa ]
    accreditation:
      - body: yoga_alliance
        label_claimed: "RYT300, erkend door Yoga Alliance; doorgroei naar RYT500"
        verified: yes
        source: ya-register-2026-06
        note: "YA-only."
    delivery:
      mode: hybrid
      structure: modular
      language: nl
    prerequisites_claimed: "afgeronde RYT200"
    prerequisite:
      # EEN POORT DIE GELD KOST — maar niet aan hén, en dus geen optelpost. De
      # pagina eist "je RYT200", niet ÓNZE RYT200; SanaYou verkoopt er zelf wel
      # twee (klassikaal € 2.999, online € 1.250), maar de opleiding met hún 200u
      # beprijzen zou een route beweren die zij nergens eisen — en welke van de
      # twee zou dat dan zijn? Een gok met twee antwoorden is geen bedrag.
      - kind: other
        label: "afgeronde RYT200 (van een willekeurige school)"
        source: site-300-2026-06
        note: >
          "Groei van RYT200 naar RYT500" / "Je bouwt verder op je RYT200 met
          vernieuwende modules." De pagina vraagt een RYT200, niet die van
          SanaYou zelf. Een RYT200 is in de markt een te kópen poort — maar niet
          er één die deze school u verplicht bij hén te kopen, dus er wordt geen
          bedrag opgeteld (spec §4.3).
    price:
      amount_eur: 2250
      variants:
        - { label: "volledig (van €3500)", amount_eur: 2250 }
      vat: unknown
      published: yes
      note: "€2250 (van €3500); modulair, online + live dagen; €25 administratiekosten
        per te verplaatsen lesdatum. Geen btw-vermelding → vat unknown (§4.11)."
      source: site-300-2026-06
    hours_claimed:
      total: 300
      contact: null
      self_study: null
      supervised_teaching_practice: null
      breakdown_published: not_published
      contact_published: not_published
      source: site-300-2026-06
      note: "300u hybride, modulair (13+ keuzemodules), 2 richtingen (Yin Mastery /
        Yoga Awakening)."
    composition:
      type: free_assembly
    track_record:
      first_seen_year: 2018
      source: ya-register-2026-06

