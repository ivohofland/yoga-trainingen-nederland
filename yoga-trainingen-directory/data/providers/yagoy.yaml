programs:
  - id: 200-yin
    name: "Yin Yoga Teacher Training (200 hr RYT)"
    url: https://yagoy.nl/teacher-training/yin-yoga-teacher-training-200-hr-ryt/
    format_label: "200"
    style_claimed: "Yin Yoga via Traditional Chinese Medicine & meridiaansysteem;
      Paul Grilley-methode (functionele anatomie, skeletvariatie); chakra's,
      Bhagavad Gita"
    styles: [ yin ]
    accreditation:
      - body: yoga_alliance
        label_claimed: "After graduating you are eligible for a Yoga Alliance RYT-200
          (Registered Yoga School)"
        verified: yes
        source: ya-register-2026-06
        note: "RYS van Yagoy zelf geverifieerd in het register."
    delivery:
      mode: in_person
      structure: weekends
      duration_months_min: 9
      language: en
    prerequisites_claimed: "consistente, toegewijde yogapraktijk; tijdens de TT min.
      1x/week Yin + min. 1x/maand met Shari of Jonas"
    price:
      amount_eur: 2500
      variants:
        - { label: "early bird (max 10, soms gesloten)", amount_eur: 2300 }
        - { label: "regulier", amount_eur: 2500 }
        - { label: "termijnbetaling (aanbetaling + 4 termijnen)", amount_eur: 2600 }
      vat: exempt_crkbo
      published: yes
      note: >
        Prijs op het overzicht (overview-yin-2026-06): Early Bird €2300
        (volledig vooraf, beperkt tot 10 inschrijvingen — soms al gesloten),
        regulier €2500, termijnbetaling €2600 (aanbetaling + 4 termijnen). Kop
        expliciet "Training fee (VAT exempted)" → exempt_crkbo (bevestigt de
        CRKBO-registratie). Tijdens de TT: 'Sometimes Yagoy' pas (10 lessen/3
        mnd) €70 i.p.v. €110.
      source: overview-yin-2026-06
    hours_claimed:
      total: 200
      contact: null
      self_study: null
      supervised_teaching_practice: null
      breakdown_published: not_published
      source: site-yin-2026-06
      note: >
        200u-format over 10 weekenden (vr 18:30-21:30 masterclass; za/zo
        09:00-17:00: praktijk, theorie, 'practicing your skills'). Geen
        geïsoleerd uren-/ lespraktijk-urental gepubliceerd. Max. 28 deelnemers;
        wachtlijst.
    group_size_claimed:
      max: 28
      source: site-yin-2026-06
    assessment_described:
      exists: yes
      continuous: yes
      final: yes
      quote: "In the final weekends, there will be exams: a written exam in weekend 9
        and a practical exam in weekend 10."
    track_record:
      cadence_note: "Jaarlijkse 200u Yin-TT, 10 weekenden okt-juni (Yagoy Pijp)."
      source: overview-yin-2026-06
      note: >
        Detailpagina toont weekenddata zonder jaartal + verouderde
        intro-workshop-verwijzing ('September 2024 training'); het
        prijsoverzicht heeft echter actuele 2026/2027-deadlines, dus de lopende
        intake is 2026-2027.
    cohorts:
      - id: yin-2026-10
        start: "2026-10"
        end: "2027-06"
        status: announced
        source: overview-yin-2026-06
        language: en
        note: "Start ~okt 2026 (10 weekenden t/m jun 2027); jaar afgeleid uit
          prijspagina-deadlines (EB voor 1/15 sep 2026)."
    teachers:
      - person_id: shari-iskandar
        role: "hoofddocent Yin TT"
      - person_id: jonas-nathan
        role: "hoofddocent Yin TT"

  - id: 200-vinyasa
