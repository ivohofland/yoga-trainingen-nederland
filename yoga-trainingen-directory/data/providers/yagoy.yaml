        - { label: "termijnbetaling (aanbetaling + 4 termijnen)", amount_eur: 2600 }
      vat: exempt_crkbo
      published: yes
      note: >
        Prijs op het overzicht (overview-vinyasa-2026-06): Early Bird €2300 (max
