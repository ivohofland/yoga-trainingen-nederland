    type: website
    url: https://www.yogaschoolnoord.nl/vinyasa-yoga-opleiding
    archived_url: https://web.archive.org/web/20260628173433/https://www.yogaschoolnoord.nl/vinyasa-yoga-opleiding
    captured: "2026-06"
    note: >
      LIVE (browser-gerenderd) 200u Vinyasa Yoga TT, lead Esther van Voorst
      (mede-ontwikkeld 2017 met Sina Kaden). 8 weekenden / 24 lesdagen + 4
      verplichte intervisiedagen, start 23 okt 2026 - 16 mei 2027, NDSM
      Amsterdam (vr 17-21, za 11:30-18:30, zo 12:30-19:30). €2997 early bird
      (tot 1 aug) / €3497; "Vrijgesteld van BTW door CRKBO". Curriculum: asana
      (100+), alignment/ adjustments, meditatie
      (Vipassana/Kundalini/Osho/Chakra/Mantra), methodologie, vinyasa
      sequencing, functionele anatomie, stemtraining/didactiek, tantra &
      zelfontwikkeling, pranayama, filosofie (Hatha Yoga Pradipika, Bhagavad
      Gita), Ayurveda, ontspanning, chakra's/energie, voeding (sattvic),
