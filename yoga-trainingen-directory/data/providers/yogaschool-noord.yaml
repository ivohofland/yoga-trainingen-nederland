      samenwerking met Esther Scheen (Pure Energy Yoga)"; inhoudelijke vragen
      via esther@pureenergyyoga.nl; €847-€2897, "Vrijgesteld van BTW door
      CRKBO". DIT programma = Pure Energy's Yin (Grilley-lijn) — geregistreerd
      onder pure-energy-yoga; Yogaschool Noord is host/booking-home voor de
      Amsterdam- cohorten. Hier niet als eigen programma opgenomen (decision
