programs:
  - id: 200-vinyasa
    name: "200-uur Vinyasa Yoga Teacher Training"
    url: https://www.yogaschoolnoord.nl/vinyasa-yoga-opleiding
    format_label: "200"
    style_claimed: >
      Vinyasa, met een curriculum opgebouwd langs de chakra's: asana (100+
      houdingen), alignment/adjustments/contra-indicaties, meditatie (Vipassana/
      Kundalini/Osho/Chakra/Mantra), methodologie & didactiek, vinyasa
      sequencing, functionele anatomie, stemtraining, tantra & zelfontwikkeling,
      pranayama, filosofie (Hatha Yoga Pradipika, Bhagavad Gita), Ayurveda,
      ontspanning, chakra's & energie (nadi's, vayus, koshas), voeding
      (sattvic), inquiry, marketing — plus dans, ademwerk en ceremonies. 4
      masterclasses. Nederlandstalig.
    styles: [ vinyasa ]
    accreditation:
