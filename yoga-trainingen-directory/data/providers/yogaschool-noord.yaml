registrations:
  - body: yoga_alliance
    identifier: "RYS 200 (geclaimd; niet register-bevestigd)"
    holder: "onbekend"
    verified_in_register: no
    source: ya-search-2026-06
    note: >
      De Vinyasa-opleiding adverteert "door Yoga Alliance gecertificeerd" en een
      "Erkend Yoga Alliance diploma", maar er is GEEN RYS te vinden die dit
      dekt: school "Yogaschool Noord" → 0 in de YA-scholendirectory; docent "van
      Voorst" → 0; "Kaden" (mede-ontwikkelaar Sina Kaden) → alleen een US-docent
      (2026-06-28). De enige YA-geregistreerde partij in beeld is Esther Scheen
      / Pure Energy Yoga, die de YIN-opleiding certificeert (zie
      pure-energy-yoga), niet de Vinyasa. De Vinyasa-YA-claim is dus niet
      register-verifieerbaar — mogelijk via een niet-gevonden/vervallen holder
      of een partner-RYS. FLAG (overclaim-risico).
legal:
  legal_name: "Yogaschool Nooord"
  note: >
    Founder/hoofddocent Esther van Voorst (niet in het YA-docentregister; geen
    eigen RYS gevonden). De Vinyasa-opleiding is in 2017 mede-ontwikkeld met
    Sina Kaden (Embodied Yoga; ook niet in het YA-register). HOST-RELATIE
    (decision #9): Yogaschool Noord host + boekt óók de 200u YIN Yoga-opleiding
    van Pure Energy Yoga (Esther Scheen) — de Amsterdam-cohorten; dat programma
    is geregistreerd onder pure-energy-yoga en hier NIET gedupliceerd. Daarnaast
    kleinere opleidingen (Hands-on Adjustment 20u, Yoga Nidra 40u, Pre Teacher
    Training 10u, Zwangerschapsyoga 50u) — buiten fase-1 scope (§2). KvK niet
    doorzocht.
