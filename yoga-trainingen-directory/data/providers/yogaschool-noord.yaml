        note: >
          NIET register-verifieerbaar: geen RYS gevonden voor de school, voor
          lead Esther van Voorst, of voor mede-ontwikkelaar Sina Kaden
          (2026-06-28). Claim verbatim vastgelegd; mogelijk via een
          niet-gevonden/vervallen holder of partner-RYS. Overclaim-risico — zie
          registrations.
      - body: crkbo
        label_claimed: "Vrijgesteld van BTW door CRKBO"
