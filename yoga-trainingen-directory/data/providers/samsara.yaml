    verified_in_register: "yes"
    source: vyn-register-2026-06
  - body: other
    identifier: "EYU (European Yoga Union) 500u"
    verified_in_register: unknown
    source: site-2026-06
depth: listed
last_verified: "2026-06-13"
sources:
