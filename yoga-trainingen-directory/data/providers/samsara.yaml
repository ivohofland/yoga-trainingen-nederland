    local_snapshot: data/archives/samsara/vyn-register-2026-06-2026-06-13.pdf

programs:
  - id: 4jarige-allround-500
    name: "4-jarige opleiding tot allround yogadocent (VYN/EYU 500u)"
    url: https://samsara.nl/opleidingen/
    format_label: "500"
    style_claimed: "nonduale hatha yoga en jnana yoga; gegrond in advaita vedanta
      (Shankara, Krishnamurti, Ramana Maharsi, Nisargadatta, Wolter Keers, Douwe
      Tiemersma)"
    accreditation:
      - body: vyn
        label_claimed: "VYN-erkend 200u yoga-instructeur (na jaar 2); VYN/EYU-erkend
          500u allround yogadocent (na jaar 3-4)"
        verified: "yes"
        source: vyn-register-2026-06
    delivery:
      mode: in_person
      structure: weekends # 22 lesdagen/jaar; vrij of za afhankelijk van even/oneven startjaar
      duration_months_min: 48
      language: nl
    prerequisites_claimed: "min. 23 jaar; middelbare school afgerond; HBO
      werk-/denkniveau; min. 1 jaar yoga (bij voorkeur VYN-erkend docent);
      deelname open dag/gesprek"
    prerequisite:
      - kind: experience
        label: "± 1 jaar regelmatige yogabeoefening"
        source: site-2026-06
        note: >
          Toelatingseisen, letterlijk: "Om aan de opleiding te beginnen heb je
          enige yoga-ervaring nodig, ongeveer een jaar van regelmatige
          beoefening." Plus: middelbare school afgerond, HBO werk- en denkniveau,
          en deelname aan een informatiebijeenkomst/open dag of een persoonlijk
          gesprek. Ervaringseis, geen voorafgaande opleiding die je moet kopen —
          geen bedrag opgeteld. (De verkenning bij v0.9 verwachtte hier een
          BEPRIJSDE poort in het proza; het gearchiveerde artefact toont er geen.
          Het artefact wint.)
      - kind: experience
        label: "min. 120 uur yogalessen volgen bij een (erkende) docent, náást de
          opleiding"
        source: site-2026-06
        note: >
          Een aparte verplichting tijdens de opleiding, geen voorafgaande
          opleiding — en de school hangt er geen bedrag aan (dat hangt af van bij
          wie je die lessen volgt). Echte kosten voor de student, met een prijs
          die niemand publiceert: vastgelegd als poort, niet als bedrag.
    price:
      # PER STUDIEJAAR (spec v0.5, §6) — en de opleiding duurt er VIER.
      #
      # Dit stond als `period: total` in het record, met de waarschuwing in het
      # notitieveld: "LET OP: EUR 2.705 is de prijs PER STUDIEJAAR ... niet voor de
      # hele 4-jarige opleiding." Dat is precies de ziekte die v0.5 uitroeide bij de
      # Blikopener: een getal dat de lezer als prijs van de opleiding leest, terwijl
      # het de prijs van één jaar is — hier zelfs met een bandje "onder €3.000" om,
      # naast opleidingen die wél € 2.705 in totaal kosten. De waarschuwing stond in
      # proza, waar geen vergelijking bij kan.
      amount_eur: 2705
      period: per_year
      periods: 4
      vat: exempt_crkbo
      published: "yes"
      includes: "22 lesdagen, begeleiding/intervisie, 2 individuele gesprekken/jaar,
        lesmaterialen, retraiteweekend (jaar 4) incl. maaltijden, gebruik
        matten/kussens"
      excludes: "boeken (literatuurlijst per jaar); verdiepings-/specialisatiemodules"
      note: >
        De school publiceert een JAARPRIJS en een duur, en nergens hun product:
        "De investering voor het studiejaar 2026-2027 bedraagt 2.705 euro." en
        "Onze gedegen en brede opleiding omvat in totaal vier studiejaren". 4 ×
        € 2.705 = € 10.820 is ONZE rekensom — dat bedrag staat op geen enkele
        gearchiveerde pagina van Samsara en wordt daarom afgeleid en zichtbaar als
        het onze getoond (spec §6), nooit opgeslagen. Let op: alleen het tarief
        voor 2026-2027 is gepubliceerd; latere studiejaren kunnen afwijken — het
        afgeleide totaal is dus een schatting op het huidige tarief. Gespreid
        betalen in 4 termijnen.
      source: site-2026-06
    hours_claimed:
      total: 500 # eindkwalificatie VYN/EYU 500u over 4 jaar
      contact: null # 22 lesdagen/jaar gepubliceerd, niet als urentotaal
      self_study: null # "thuis 10-15 uur/week"; daarnaast min. 120u yoga bij erkende docent
      supervised_teaching_practice: null
      breakdown_published: not_published
      contact_published: not_published
      source: site-2026-06
      note: >
        Format uitgedrukt in lesdagen en weekuren, niet in een
        uren-uitsplitsing. Min. 120u yoga volgen bij (erkende) docent als aparte
        verplichting. Begeleide lespraktijk aanwezig ("oefenlessen geven aan
        medecursisten, eigen cursisten, intervisie") maar niet gekwantificeerd.
    composition:
      type: single_program # samenhangend 4-jarig traject met doorstroommomenten
    coherence_signals:
      required_sequence: "yes"
      required_sequence_note: "doorstroom per studiejaar afhankelijk van opdrachten,
        praktijkdagen en aanwezigheidsverplichting"
      single_cohort_intake: "yes"
      single_cohort_intake_note: "jaarlijkse start in september; even/oneven startjaar
        bepaalt vaste lesdag"
      integrative_assessment: "yes"
      integrative_assessment_note: "exameneisen per fase (200u na jaar 2, 500u na jaar
        4); opdrachten + praktijkdagen doorlopend"
      continuous_lead_teacher: not_published
      modules_sold_separately: "no"
      modules_sold_separately_note: "specialisatiemodules apart, maar de kernopleiding is één traject"
      source: site-2026-06
    assessment_described:
      exists: "yes"
      continuous: "yes"
      final: "yes"
      quote: "Hoewel de overgang naar een volgend studiejaar afhangt van het voldoen
        aan de opdrachten, praktijkdagen en het voldoen van de
        aanwezigheidsverplichting … Bij het voldoen aan de exameneisen ontvang
        je het diploma"
    cohorts:
      - id: c-2026-09
        start: "2026-09"
        status: announced
        source: site-2026-06
        note: "studiejaar 2026-2027; conceptplanning als PDF gepubliceerd"
