id: samsara
name: Samsara Yoga Opleiding
website: https://samsara.nl
status: active
locations:
  - city: Schiedam
    address: "Korte Haven 125, 3111 BH"
crkbo:
  registered: "yes"
  register: instelling
  holder: "Samsara Yoga Opleiding"
  checked: "2026-06-13"
  source: site-2026-06
  note: >
    Expliciet en zuiver vermeld: "De opleiding is geregistreerd in het CRKBO en
    derhalve vrijgesteld van BTW." Prijs is dienovereenkomstig btw-vrij (EUR
    2.705 excl. btw-heffing). Schone §10-casus: CRKBO hier als fiscaal feit
    gepresenteerd, NIET als kwaliteitskeurmerk - contrast met Arhanta's
    erkenning-lijstje.
registrations:
