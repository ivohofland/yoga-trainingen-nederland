programs:
  - id: 200-hatha
    name: "200-uur Hatha Yoga Teacher Training"
    url: https://theheartofconnection.com/hatha-yoga-teacher-training/
    format_label: "200"
    style_claimed: >
      Hatha als fundament (traditie & kernprincipes; relatie adem-zenuwstelsel);
      asana, sequencing & lesopbouw + assists/adjustments; pranayama, meditatie
      & innerlijk werk; filosofie, yogageschiedenis, mythologie, mantra's,
      mudra's, tantra & Ayurveda; lesgeven & (volwassen) communicatie; anatomie,
      fysiologie, subtiele anatomie, polyvagaaltheorie & trauma-geïnformeerde
      yoga; ceremonies. Sterke nadruk op persoonlijke ontwikkeling en lesgeven
      vanaf dag één.
    styles: [ hatha ]
    accreditation:
      - body: yoga_alliance
        label_claimed: "200-uur, wereldwijd erkend certificaat van Yoga Alliance (RYT
          200) na schriftelijk + praktisch examen"
        verified: yes
        source: ya-register-2026-06
        note: "RYS 200 geverifieerd; lead Selma van der Graaf is E-RYT 200 (zie
          lead-nuance bij registrations)."
    delivery:
      mode: in_person
      structure: intensive
      duration_months_min: 4
      language: nl
    prerequisites_claimed: "voor wie yoga dieper wil begrijpen dan alleen als
      fysieke practice; om docent te worden óf de eigen practice te verdiepen;
      ook geschikt als lesgeven niet het hoofddoel is. Kleinschalige groep."
    price:
      amount_eur: 3895
      variants:
        - { label: "early bird (aanmelden vóór 1 aug 2026)", amount_eur: 3500 }
        - { label: "regulier", amount_eur: 3895 }
        - { label: "in 3 termijnen (3×€1350)", amount_eur: 4050 }
      vat: unknown
      published: yes
      includes: "verblijf op Hof van Kairos (alle blokken), maaltijden, manual,
        trainingsmateriaal en certificaat"
      note: >
        Regulier €3895; early bird €3500 (vóór 1 aug 2026); in 3 termijnen
        €4050. Geen btw-vermelding → vat unknown (§4.11).
      source: site-hatha-2026-06
    hours_claimed:
      total: 200
      contact: null
      self_study: null
      supervised_teaching_practice: null
      breakdown_published: not_published
      source: site-hatha-2026-06
      note: >
        4 residentiële blokken (2 weekenden + 2 weken) op Hof van Kairos;
        dagstructuur 07:30 sadhana - 20:00 avondprogramma. ~3u
        integratiewerk/week tussen de blokken + intervisie in oefengroepjes.
        Geen geïsoleerd contact-/ lespraktijk-urental.
    composition:
      type: single_program
    assessment_described:
      exists: yes
      final: yes
      quote: "De opleiding wordt afgesloten met een schriftelijk en praktisch examen"
    track_record:
      first_seen_year: 2023
      source: ya-teacher-selma-2026-06
      note: "Merk sinds feb 2023, RYS sinds jan 2025; eerdere cohort(en) gelopen
        blijkens studenttestimonials (Afra, Carlijn, Sorcha, Ingeborg)."
