programs:
  - id: 200-ytt
    name: "200-uur Yoga Teacher Training (5 modules)"
    url: https://www.youarethebuddha.com/ytt
    format_label: "200"
    style_claimed: "Multistyle langs het achtvoudige pad van Patanjali: filosofie/
      geschiedenis/ethiek, asana (yin, hatha, vinyasa) met alignment & cueing,
      anatomie (Engels online programma), pranayama & subtiele anatomie,
      meditatie, didactiek/lesopbouw. Na afronding zelfstandig
      yin/hatha/vinyasa-les + ademsessie (30 min) + meditatiesessie (30 min)
      begeleiden"
    styles: [ multistyle, yin, hatha, vinyasa ]
    accreditation:
      - body: yoga_alliance
        label_claimed: "Yoga Alliance RYS-200; na afronding registreren als RYT 200"
        verified: yes
        source: ya-register-2026-06
        note: "School-RYS 200 geverifieerd; lead Marlies Tobias is E-RYT 500."
      - body: vyn
        label_claimed: "VYN-erkend (1 van 10 erkende opleidingen in NL);
          VYN-visitatierapport 2025"
        verified: yes
        source: vyn-register-2026-06
        note: "Op de VYN-lijst van erkende yogaopleidingen geverifieerd."
    delivery:
      mode: in_person
      structure: modular
      duration_months_min: 12
      language: nl
    prerequisites_claimed: "minimaal 1 jaar eigen yogapraktijk; min. 85%
      aanwezigheid; ruimte voor huiswerk/zelfstudie. Geschikt voor (aankomend)
      docenten, coaches en zorgprofessionals."
    price:
      amount_eur: 3450
      variants:
        - { label: "volledige opleiding (5 modules)", amount_eur: 3450 }
        - { label: "Module 1 Yoga Wisdom (6 lesdagen)", amount_eur: 699 }
        - { label: "Module 2 Asana Lab (8 lesdagen)", amount_eur: 899 }
        - { label: "Module 3 Breath Mechanics (6 lesdagen)", amount_eur: 699 }
        - { label: "Module 4 Mindful Mastery (6 lesdagen)", amount_eur: 699 }
        - { label: "Module 5 Studio Ready (7 lesdagen; alleen na 1-4)", amount_eur: 699 }
      vat: unknown
      published: yes
      includes: "studiemateriaal en certificering"
      note: >
        €3450 volledig; modules 1-4 los te volgen met deelcertificaat, module 5
        alleen na afronding 1-4. Som losse modules (699+899+699+699+699=€3695)
        ligt boven het bundeltarief €3450. Geen btw-vermelding → vat unknown
        (§4.11).
      source: site-2026-06
    hours_claimed:
      total: 200
      contact: null
      self_study: null
      supervised_teaching_practice: null
      breakdown_published: not_published
      contact_published: not_published
      source: site-2026-06
      note: >
        200u over 33 lesdagen (vrijdag 11:00-17:30) in 5 modules + Engelstalig
        online anatomie-programma + huiswerk/zelfstudie. Geen geïsoleerd
        contact-/lespraktijk-urental gepubliceerd.
    composition:
      type: fixed_modular
    coherence_signals:
      modules_sold_separately: yes
      modules_sold_separately_note: >
        Modules 1-4 los te volgen met eigen deelcertificaat (instap op één
        thema); module 5 'Studio Ready' alleen toegankelijk na afronding van
        1-4. Volledige RYS-200-diploma na alle 5.
    group_size_claimed:
      max: 10
      source: site-2026-06
      note: "Circa 10 deelnemers per groep (kleinschalig)."
    assessment_described:
      exists: yes
      continuous: yes
      quote: "Elke module sluit af met een deelcertificaat. Alle vijf samen leiden tot
        het RYS-200 diploma."
    track_record:
      first_seen_year: 2021
      source: ya-register-2026-06
      note: >
        YA-RYS sinds feb 2021; eerdere cohorten gedocumenteerd via reviews/
        testimonials YTT 2024 & 2025 en 'Groepsfoto YTT 2026'. Genoemd in
        YogaVizier nr. 1, 2026.
    cohorts:
      - id: ytt-2027-01
        start: "2027-01"
        status: announced
        source: site-2026-06
        language: nl
        note: "Start januari 2027, 33 lesdagen/5 modules op vrijdagen. (YA-profiel lijst
          daarnaast een window 9 okt-11 dec 2026.)"
    teachers:
      - person_id: marlies-tobias
        role: "lead teacher / oprichter"
      - person_id: marlou-ansems
        role: "docent (YA teaching staff)"

