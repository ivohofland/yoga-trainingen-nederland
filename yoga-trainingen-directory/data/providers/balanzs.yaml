programs:
  - id: 200-vinyasa-yin
    name: "200 uurs Yoga Teacher Training"
    url: https://balanzs.nl/trainingen/200h-den-haag/
    format_label: "200"
    style_claimed: "Vinyasa & Yin gecombineerd in één opleiding; oosters (TCM voor
      Yin) + westers (anatomie voor Vinyasa) curriculum; filosofie, fascia,
      zenuwstelsel, breathwork"
    styles: [ vinyasa, yin ]
    accreditation:
      - body: yoga_alliance
        label_claimed: "Yoga Alliance-gecertificeerd; 'Deze module vormt je tot een 200h
          Yoga Alliance teacher'"
        verified: yes
        source: ya-register-2026-06
        note: "RYS van Balanzs geverifieerd in het register (zie registrations)."
    delivery:
      mode: in_person
      structure: weekends
      duration_months_min: 9
      language: nl
    prerequisites_claimed: "HBO/BSc denkniveau + min. 1 jaar persoonlijke
      lichaam-&-geest-beoefening; Module 2 vereist afgeronde Module 1"
    price:
      amount_eur: 3115
      variants:
        - { label: "early bird 200u (tot early-bird-datum)", amount_eur: 2650 }
        - { label: "late bird 200u", amount_eur: 3115 }
        - { label: "termijnbetaling 200u", amount_eur: 3400 }
        - { label: "Module 1 los (85u), late bird", amount_eur: 1425 }
        - { label: "Module 2 los (115u), late bird", amount_eur: 2025 }
      vat: unknown
      published: yes
      excludes: "verplichte literatuur (±€120 voor beide modules)"
      note: >
        Volledige 200u (Module 1 + 2): early bird €2650 (15% korting, tot de
        per-cohort early-bird-datum; Den Haag 11 sep 2026), late bird €3115 (10%
        korting), termijnbetaling €3400. Modules ook los: Module 1 (85u)
        €1300/€1425/€1550; Module 2 (115u) €1800/€2025/€2300. De bundel (€3115
        late bird) ligt €335 ónder de som van de losse late-bird-modules
        (€1425+€2025=€3450). €100 niet-restitueerbare aanbetaling. Tijdens de
        opleiding 'Balanzs Always'-abonnement €65/4wk (i.p.v. €95). Geen
        btw-vermelding → vat unknown (§4.11), ondanks CRKBO.
      source: brochure-2026-06
    group_size_claimed:
      max: 28
      source: brochure-2026-06
      note: "Module 1: 28 plekken; Module 2: 20 plekken."
    hours_claimed:
      total: 200
      contact: null
      self_study: null
      supervised_teaching_practice: null
      breakdown_published: not_published
      source: brochure-2026-06
      note: >
        200u in 2 modules over 10 weekenden: Module 1 = 85u (4 weekenden;
        Yin+Yang/ Vinyasa-asana, anatomie elk weekend, 5 elementen/meridianen,
        filosofie, chakra's, Sanskriet), Module 2 = 115u (6 weekenden; teaching
        skills, voice, hands-on adjustments, blessurepreventie, business of
        yoga). Zelfstudie 2-4 uur/week. Begeleide lespraktijk aanwezig maar niet
        als urental: studenten geven asana's in weekend 5 & 7 en CO-DOCEREN een
        echte studioles met een ervaren docent in weekend 8. Geen geïsoleerde
        contact-/lespraktijk-uren.
    composition:
      type: fixed_modular
    coherence_signals:
      required_sequence: yes
      required_sequence_note: "Module 1 is 'krachtige voorbereiding op Module 2'; M1 vóór M2."
      single_cohort_intake: yes
      single_cohort_intake_note: "Vaste cohorten per stad (Den Haag okt 2026, Utrecht
        + Rotterdam jan 2027)."
      integrative_assessment: yes
      integrative_assessment_note: "Examen na Module 1 (22 jan 2027, Den Haag) + échte
        lespraktijk in Module 2."
      continuous_lead_teacher: unknown
      continuous_lead_teacher_note: "'Senior Teacher Team' (6 docenten) met
        André-Louis als TT-directeur; of één doorlopende hoofddocent lesgeeft is
        niet expliciet."
      modules_sold_separately: yes
      modules_sold_separately_note: "Beide modules los te koop: Module 1 (85u)
        €1300-1550, Module 2 (115u) €1800-2300 (M2 vereist afgeronde M1)."
      bundle_price_below_sum: yes
      bundle_price_below_sum_note: "Bundel 200u €3115 (late bird) < som losse
        late-bird-modules €1425+€2025=€3450; bundeldelta ≈ −€335."
      source: brochure-2026-06
    assessment_described:
      exists: yes
      continuous: yes
      final: yes
      quote: "This is also final exam weekend. Your knowledge and skills will be
        tested. If you successfully pass your examinations, we will present you
        with your Balanzs Yoga Teaching Training Certificate."
    track_record:
      first_seen_year: 2016
      source: ya-register-2026-06
      note: >
        RYS sinds 2016; testimonials van cohort 2024. Dezelfde opleiding draait
        in 3 steden (Den Haag, Utrecht, Rotterdam) met IDENTIEKE opzet, prijs en
        Senior Teacher Team — alleen locatie en startdatum verschillen.
    cohorts:
      - id: balanzs-denhaag-2026-10
        start: "2026-10"
        end: "2027-07"
        status: announced
        source: site-denhaag-2026-06
        language: nl
        note: "Den Haag (Laan van NOI); online opening 6 okt, 10 weekenden okt 2026–jul
          2027; examen 22 jan 2027; open dagen 5 jul/6 sep 2026."
      - id: balanzs-utrecht-2027-01
        start: "2027-01"
        status: announced
        source: site-utrecht-2026-06
        language: nl
        note: "Utrecht (Oudegracht); start jan 2027, exacte data volgen later; open dag
          8 feb."
      - id: balanzs-rotterdam-2027-01
        start: "2027-01"
        status: announced
        source: site-rotterdam-2026-06
        language: nl
        note: "Rotterdam (Kleiweg); start jan 2027, exacte data volgen later."
    teachers:
      - person_id: andre-louis
        role: "TT-directeur; Vinyasa/Power/Hot"
      - person_id: zsoka
        role: "oprichter; business of yoga + silence retreat"
      - person_id: katherine
        role: "anatomie/fysiologie"
      - person_id: dong
        role: "Yin/TCM, anatomie"

