crkbo:
  registered: yes
  register: instelling
  holder: "Balanzs"
  checked: "2026-06-20"
  source: crkbo-register-2026-06
  note: >
    Register-geverifieerd: zoekterm "Balanzs" → exact 1 treffer "Balanzs,
    's-Gravenhage, www.balanzs.nl" (2026-06-20). Opvallend: een commerciële
    keten die wél CRKBO-geregistreerd is — en de registratie staat op dezelfde
    entiteit die de opleiding verzorgt, dus btw-vrijstelling voor de
    docentenopleiding is zeer waarschijnlijk. TÓCH price.vat=unknown (§4.11): de
    TT-prijspagina's/ brochure noemen geen btw-regel, en de algemene voorwaarden
    (art. 11.1) stellen slechts generiek "prijzen inclusief omzetbelasting,
    tenzij anders vermeld" — all-in, maar niet TT-specifiek en zonder expliciete
    vrijstellingsvermelding. Een factuur/checkout-btw-regel zou het definitief
    maken.
