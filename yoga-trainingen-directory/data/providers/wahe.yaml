programs:
  - id: 200-vinyasa-ayurveda
    name: "200-uur Vinyasa Flow & Ayurveda Teacher Training"
    url: https://wahe-by-gitty.nl/vinyasa-flow-yoga-opleiding/
    format_label: "200"
    style_claimed: >
      Vinyasa Flow met Ashtanga-based opbouw (van vastere sequence naar
      creatieve flows o.b.v. de 5 elementen) + adjustments + aanvullende
      practices (pranayama, meditatie, mantra, Nataraj,
      Yin/restorative/eindontspanning) + Ayurveda & yogafilosofie (8-voudig pad,
      Bhagavad Gita, Patanjali, dosha/constitutie) + yogic lifestyle
      (dinacharya). Nederlandstalig.
    styles: [ vinyasa ]
    accreditation:
      - body: yoga_alliance
        label_claimed: "200 uur, YA-geaccrediteerd (RYT 200)"
        verified: yes
        source: ya-register-2026-06
        note: "Onder de RYS 200 van Wahé; lead Gitty de Gier is E-RYT 500."
    delivery:
      mode: in_person
      structure: weekends
      duration_months_min: 9
      language: nl
    prerequisites_claimed: "geen ervaring vereist; voor eigen verdieping én
      aankomend docenten ('Yoga is voor iedereen, ook als je geen les wilt
      geven')."
    price:
      amount_eur: 2495
      vat: excl
      published: yes
      includes: "contacturen + uitgebreide online ondersteuning + theorie-/werkboek"
      note: >
        €2495 excl. btw (€500 aanbetaling; gespreide betaling bespreekbaar).
        "Excl. btw" → er wordt btw geheven (geen CRKBO-vrijstelling waargenomen;
        zie crkbo). OPVALLEND/SIGNAAL (geen juridisch oordeel): de prijs wordt
        consument-gericht als "excl. btw" gecommuniceerd, terwijl de ACM-regel
        is dat prijzen aan consumenten ALTIJD incl. btw getoond moeten worden —
        alleen een uitsluitend/ onmiskenbaar B2B-aanbod mag excl. btw (zie bron
        acm-consumentenprijs). De feitelijke prijs voor een consument is dus
        ~€3019 (incl. 21% btw). Mogelijke B2B-redenering (afgestudeerden worden
        zzp-yogadocent) weegt zwak: de opleiding wordt expliciet óók aan
        niet-lesgevers / "eigen verdieping" aangeboden ("Yoga is voor iedereen,
        ook als je geen les wilt geven"), dus geen "uitsluitend/onmiskenbaar"
        B2B-aanbod.
      source: site-vinyasa200-2026-06
    hours_claimed:
      total: 200
      contact: null
      self_study: null
      supervised_teaching_practice: null
      breakdown_published: not_published
      source: site-vinyasa200-2026-06
      note: >
        22 live dagen in Baarn (11 blokken, vr+za 10:30-17:30) + min. 20 min
        eigen practice/dag + online leeromgeving + praktijkdagen. Geen
        geïsoleerd contact-/lespraktijk-urental.
    group_size_claimed:
      max: 17
      source: site-vinyasa200-2026-06
      note: "Groep max 17 voor veel persoonlijke aandacht."
    composition:
      type: single_program
    assessment_described:
      exists: not_published
    track_record:
      first_seen_year: 2024
      source: ya-register-2026-06
      note: "YA-RYS sinds mei 2024; lopende cohorten (een opleidingsjaar net afgerond
        per Instagram)."
