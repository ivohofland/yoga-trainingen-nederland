        een totaal van 500 uur opleiding." De school publiceert ook de opdeling
        (200 + 150 + 100 + 50) — dat is een module-opdeling, geen
        contact/zelfstudie-opdeling; een geïsoleerd contacturental ontbreekt.
        BEPERKING VAN DE ROUTE (feit, geen oordeel): van de vier onderdelen
        hebben er drie (200u Vinyasa, 150u Yin/Lunar, 100u Restorative) een eigen
        opleidingspagina met data en inschrijving; de 50-uursmodule Filosofie,
        Pranayama en meditatie heeft die niet — het opleidingsoverzicht zet die
        onder het kopje "Coming:" (capture 2026-06-28) en er staan geen data en
        geen prijs bij. De 500-uursroute is daarmee op dit moment niet af te
        ronden: 450 van de 500 uur zijn boekbaar.
    composition:
      type: fixed_modular
      modules: [ vinyasa-200, yin-lunar-150, restorative-100, filosofie-pranayama-50 ]
    coherence_signals:
      modules_sold_separately: yes
      modules_sold_separately_note: "Elke opleiding (200/150/100) is los te volgen;
        samen vormen ze de RYS 500-route."
      source: site-overview-2026-06
    track_record:
      first_seen_year: 2024
      source: ya-register-2026-06

