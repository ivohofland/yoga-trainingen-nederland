programs:
  - id: 200-inner-axis
    name: "Inner Axis Yoga Teacher Training (200-hour)"
    url: https://maxstrom.com/breathe-to-heal/inner-axis/200hr-yoga-teacher-training/
    format_label: "200"
    style_claimed: "Inner Axis — Max Strom's breath- en bewegingssysteem (yoga,
      breathwork, Qi Gong, bewegingstherapie); ademgeïnitieerde beweging"
    styles: [ own_method ]
    accreditation:
      - body: yoga_alliance
        label_claimed: "200-hour Yoga Alliance Registered Yoga School; Max Strom E-RYT
          500, YACEP"
        verified: yes
        source: ya-register-2026-06
        note: "RYS-registratie geverifieerd; zie registrations voor de holder-nuance
          (oorspr. 'Yoga Moves')."
    delivery:
      mode: hybrid
      structure: intensive
      language: en
    price:
      amount_eur: null
      vat: unknown
      published: not_published
      note: >
        Geen prijs gepubliceerd op opleidings- of inschrijfpagina; inschrijving
        via een Kajabi-interesseformulier zonder bedrag of cohortdata. Wie
        eerder de 40-uurs Breathe to Heal Facilitator Training volgde krijgt
        korting ("tuition will be adjusted accordingly").
      source: signup-2026-06
    hours_claimed:
      total: 200
      contact: null
      self_study: null
      supervised_teaching_practice: null
      breakdown_published: not_published
      contact_published: not_published
      source: site-maxstrom-2026-06
      note: >
        28 opleidingsdagen totaal, hybride. Segment 1: 15 dagen in-person Inner
        Axis yoga/beweging met Max (1 rustdag). Segment 2: Breathe to Heal
        (retraite Oostenrijk) + 6 dagen Applied Anatomy live online (Jamie
        Elmer, 3 weekenden). Max doceert 21 dagen, Jamie 7, + 4u online nazorg.
        Geen uren-uitsplitsing of geïsoleerd lespraktijk-urental gepubliceerd;
        wel posture labs en "practicing teaching" in het dagrooster (9-16:30
        incl. 1,5u pauze).
    assessment_described:
      exists: not_published
      quote: "there is some required reading, along with a few short writing
        assignments"
    track_record:
      first_seen_year: 2008
      source: ya-register-2026-06
      note: >
        YA-RYS sinds 2008; gehost bij Yoga Moves Utrecht. Inschrijfpagina toont
        geen aangekondigd cohort met datum (interesse-formulier) — geen Cohort
        met status announced opgenomen.
    teachers:
      - person_id: max-strom
        role: "hoofddocent / oprichter Inner Axis"
        teaches: [ "Inner Axis yoga & beweging", "breathwork", "teaching methodology" ]
      - person_id: jamie-elmer
        role: "faculty"
        teaches: [ "Applied Anatomy (live online)" ]

claims:
  - id: inner-axis-conditions
    scope: "program:200-inner-axis"
    quote: "Combining yoga, breath work, Qi Gong and movement therapy, Max developed
      the groundbreaking system Inner Axis, designed to alleviate crippling
      anxiety, depression, PTS and sleep problems."
    category: health_outcome
    source: site-maxstrom-2026-06
  - id: inner-axis-relieve
    scope: "program:200-inner-axis"
    quote: "you want to help your students reduce their stress levels, profoundly
      relieve anxiety, depression, grief and PTS. This is what the Inner Axis
      System can do."
    category: health_outcome
    source: site-maxstrom-2026-06
  - id: rapid-results
    scope: "provider"
    quote: "His field-tested method focuses on the causes rather than the symptoms
      and his system is known to produce rapid results."
    category: health_outcome
    source: site-maxstrom-2026-06

