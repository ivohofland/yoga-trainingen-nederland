    identifier: "RYS 200"
    holder: "International School of Dru Yoga"
    first_registered: "2005-12"
    verified_in_register: yes
    source: ya-register-2026-06
    note: >
      ENTITEIT-NUANCE: de YA-RYS staat op naam van "International School of Dru
      Yoga (Arnhem)" (De Overmaat 73, Arnhem; moederlocatie Snowdonia, UK) —
      niet op de NL-uitvoerende entiteit Dru Health & Wellbeing / Stichting Dru
      Health and Wellbeing (Wageningen). De NL-opleiding rijdt op die
      internationale RYS. Profielpagina (live 2026-06-18) bevestigt RYS-status +
      locatie Arnhem; RYS-niveau (200) en eerste registratie (2005-12) komen uit
      de YA-directory- enumeratie. YA-profiel noteert taal ENGLISH
      (internationale school), terwijl de NL-opleiding Nederlandstalig is.
