programs:
  - id: 200-dru
    name: "Dru Yoga Docenten Opleiding"
    url: https://www.druyogaopleiding.nl
    format_label: "200"
    style_claimed: "Dru Yoga — vindt zijn oorsprong in Hatha Yoga; Energy Block
      Release (EBR)-reeksen, asana, pranayama, mudra's, mantra, meditatie, yoga
      nidra"
    styles: [ own_method ]
    accreditation:
      - body: yoga_alliance
        label_claimed: "Een Dru Yoga diploma staat garant voor accreditatie bij de Yoga
          Alliance"
        verified: yes
        source: ya-register-2026-06
        note: >
          RYS 200 zelf geverifieerd, maar gehouden door International School of
          Dru Yoga (Arnhem), niet door de NL-entiteit. De formulering "staat
          garant voor accreditatie" is claim-materiaal (zie claim ya-garant).
    delivery:
      mode: in_person
      structure: weekends
      duration_months_min: 20
      language: nl
    prerequisites_claimed: "enige yoga-ervaring (bijv. wekelijkse yogales);
      intakegesprek maakt deel uit van de toelatingsprocedure"
    price:
      amount_eur: 2961
      variants:
        - { label: "ineens (voor start opleiding)", amount_eur: 2961 }
        - { label: "12 maandtermijnen (€254/mnd)", amount_eur: 3048 }
      vat: unknown
      published: yes
      includes: "alle offline trainingen, video's, studieboeken, lesgeld en het examen"
      excludes: "3-daagse retraite in module 5 (€125, verplicht onderdeel) + eigen
        accommodatie voor de retraite"
      note: >
        €250 niet-restitueerbare inschrijving (onderdeel van het totaal).
        Restbedrag ineens €2961 (2,7% goedkoper) of 12×€254 = €3048. Betaling
        via drunetherlands.plugandpay.nl (Dru Health & Wellbeing). Geen
        btw-vermelding.
      source: site-2026-06
    hours_claimed:
      total: null
      contact: 220
      self_study: null
      supervised_teaching_practice: null
      breakdown_published: yes
      source: site-2026-06
      note: >
        "De opleiding zelf bestaat uit 220 contacturen" — expliciet vermeld.
        Daarnaast 5-7 uur/week eigen praktijk + zelfstudie (geen totaal).
        Lesgeven is onderdeel (groepsles mogelijk na module 3), maar niet als
        urental geïsoleerd. Module 5 bevat een 3-daagse retraite.
    composition:
      type: fixed_modular
    coherence_signals:
      required_sequence: yes
      required_sequence_note: "6 opbouwende modules (1 'In verbinding met jezelf' → 6
        'Van leerling naar leraar'); lesgeven aan groepen pas mogelijk na module
        3."
      single_cohort_intake: yes
      single_cohort_intake_note: "Eén startdatum (28 mrt 2026), vaste groep met mentorgroep/intervisie."
      integrative_assessment: yes
      integrative_assessment_note: "Examen + diploma over het geheel; per-module
        huiswerkopdrachten en dagboek; module 6 integreert leerling→leraar."
      continuous_lead_teacher: unknown
      continuous_lead_teacher_note: "'Ervaren opleidingsteam' met meerdere docenten;
        geen doorlopende hoofddocent benoemd op de pagina."
      modules_sold_separately: no
      modules_sold_separately_note: "De 6 modules vormen samen de opleiding;
        bijscholing is een apart traject (bijscholing.druyoga.nl)."
      bundle_price_below_sum: not_published
      bundle_price_below_sum_note: "Geen losse moduleprijzen gepubliceerd."
      source: site-2026-06
    assessment_described:
      exists: yes
      continuous: yes
      final: yes
      quote: "Succesvol afronden van alle huiswerkopdrachten"
    contract:
      cancellation_published: not_published
      refund_published: not_published
      installments_published: yes
      invoicing_entity: "Dru Health & Wellbeing (Stichting Dru Health and Wellbeing)"
      source: site-2026-06
      note: "Alleen de €250 inschrijving is expliciet niet-restitueerbaar; volledig
        annulerings-/restitutiebeleid niet op de pagina."
    transparency:
      syllabus_published: yes
      hours_breakdown_published: yes
      assessment_criteria_published: yes
      reading_list_published: not_published
      teacher_bios_published: not_published
      source: site-2026-06
    track_record:
      first_seen_year: 2005
      source: ya-register-2026-06
      note: "YA-RYS sinds 2005-12 (International School of Dru Yoga); cohort 2026
        start 28 mrt 2026."
    cohorts:
      - id: dru-2026-03
        start: "2026-03"
        end: "2027-12"
        status: announced
        source: site-2026-06
        language: nl
        note: "Start 28 & 29 mrt 2026; 6 modules; weekenden za-zo 9:30-16:30; 2027-data
          onder voorbehoud."

