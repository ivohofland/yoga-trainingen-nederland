programs:
  - id: 500-allround
    name: "Allround Yogaopleiding (2-jarig, RYT 200 → RYT 500)"
    url: https://yogacentrumtilburg.nl/ryt-500-allround-yogaopleiding/
    format_label: "500"
    style_claimed: "Klassieke Hatha yoga als basis (incl. basis vinyasa flow);
      yogafilosofie (achtvoudig pad van Patanjali / sutra's), anatomie &
      fysiologie (incl. chakra-leer), asana, pranayama, didactiek, ethiek;
      praktijk-dagdelen o.a. zwangerschapsyoga, Lu Jong, vinyasa flow, Critical
      Alignment, hot yoga"
    styles: [ hatha, vinyasa, multistyle ]
    accreditation:
      - body: yoga_alliance
        label_claimed: "Internationaal erkend Yoga Alliance certificaat: na jaar 1 RYT
          200, na jaar 2 RYT 500"
        verified: yes
        source: ya-register-2026-06
        note: >
          School-designatie = RYS 500 (badge-asset RYS500.png; enige). De RYT
          200-tussenexit na jaar 1 wordt geclaimd; alleen RYS 500 is in het
          register zichtbaar (descriptieve nuance, geen oordeel).
      - body: crkbo
        label_claimed: "Geregistreerd in het CRKBO"
        verified: yes
        source: crkbo-register-2026-06
        note: "CRKBO-Instelling Yogacentrum Tilburg h.o.d.n. Yogacollege Tilburg
          register-geverifieerd."
    delivery:
      mode: in_person
      structure: modular
      duration_months_min: 24
      language: nl
    prerequisites_claimed: "HBO werk- en denkniveau gewenst; geschikt voor zowel
      beginners als ervaren beoefenaars. Leerbeperking bespreekbaar."
    price:
      amount_eur: 4600
      variants:
        - { label: "jaar 1 (RYT 200)", amount_eur: 2350 }
        - { label: "jaar 2 (RYT 300)", amount_eur: 2495 }
        - { label: "beide jaren in 1x (RYT 500)", amount_eur: 4600 }
        - { label: "early bird jaar 1 (voor 15 nov 2026)", amount_eur: 2150 }
        - { label: "early bird jaar 2", amount_eur: 2350 }
        - { label: "early bird beide jaren in 1x", amount_eur: 4400 }
      vat: unknown
      published: yes
      excludes: "studiemateriaal (~€60/jaar; gratis bij gebruik online omgeving) +
        verplicht yogaweekend (€265)"
      note: >
        Per jaar te betalen (jaar 1 €2350 / jaar 2 €2495) of gebundeld €4600;
        early bird €4400. Betaling in 12 maandtermijnen (automatische incasso)
        mogelijk. Na jaar 1 stoppen kan (200u-diploma). 'excl' op de site slaat
        op studiemateriaal/yogaweekend, NIET op btw; geen btw-vermelding → vat
        unknown.
      source: site-opleiding-2026-06
    hours_claimed:
      total: 500
      contact: null
      self_study: null
      supervised_teaching_practice: null
      breakdown_published: not_published
      source: site-opleiding-2026-06
      note: >
        2-jarig: jaar 1 = 18 lesdagen (3 digitaal), jaar 2 = 21 lesdagen;
        vrijdag 9:00-16:00. ~4-6u zelfstudie/week. 5 gratis yogalessen/maand
        (studio of online). Geen geïsoleerd contact-/lespraktijk-urental
        gepubliceerd.
    assessment_described:
      exists: yes
      final: yes
      quote: "Om af te studeren voltooi je met succes: een praktijkexamen [en] een
        theorie-examen. Beide examens hebben herkansingsmogelijkheden."
    track_record:
      first_seen_year: 2020
      source: ya-register-2026-06
      note: "RYS sinds 2020; jaarlijkse start in januari. Reviewers houden RYT 500
        (o.a. 2025-2026)."
    cohorts:
      - id: allround-2027-01
        start: "2027-01"
        status: announced
        source: site-opleiding-2026-06
        language: nl
        note: "'Start elke januari'; early bird-deadline 15 nov 2026 wijst op een
          januari-2027-cohort. Geen exacte datumlijst op de pagina (zie
          planning-PDF)."
    teachers:
      - person_id: marloes-van-boxtel
        role: "lead teacher / eigenaar"
      - person_id: jasper
        role: "docent / mede-oprichter"

