programs:
  - id: 200-hatha-online
    name: "Hatha Yoga Docent Opleiding (200u, online)"
    url: https://newnatureyoga.com/hatha-yoga-opleiding-200-uur/
    format_label: "200"
    style_claimed: "Hatha Yoga (Sivananda-lijn): meditatie & pranayama, yoga
      filosofie (8-voudig pad, chakra's, karma), yoga anatomie, lesgeven &
      ethiek, sequencing + 70+ asana's / 35 uitgewerkte asanalessen,
      asanapraktijk incl. traditionele asanales met Indiase gastdocent Yogi
      Madhav"
    styles: [ hatha ]
    accreditation:
      - body: yoga_alliance
        label_claimed: "Yoga Alliance erkend; internationaal erkend 200u Yoga Docent
          certificaat, registreren als RYT 200 na afronding"
        verified: yes
        source: ya-register-2026-06
        note: "School-RYS 200 geverifieerd; lead teacher Dorien Bortels is E-RYT 500."
      - body: crkbo
        label_claimed: "Erkend door CRKBO"
        verified: yes
        source: crkbo-register-2026-06
        note: "CRKBO-Instelling 'NewNature Yoga Academy' (Terborg)
          register-geverifieerd."
    delivery:
      mode: online
      structure: modular
      language: nl
    prerequisites_claimed: "geen; voor beginners én gevorderden, en voor wie de
      eigen practice wil verdiepen"
    price:
      amount_eur: 449
      variants:
        - { label: "reguliere prijs", amount_eur: 599 }
        - { label: "actieprijs (25% korting, t.t.v. capture)", amount_eur: 449 }
      vat: unknown
      published: yes
      includes: >
        6 modules incl. downloadbaar materiaal/handboek, regelmatige quizzen &
        opdrachten, ondersteuning tijdens én na de opleiding, min. 2 jaar
        onbeperkte toegang (verlengbaar), YA-erkend certificaat
      note: >
        €449 (van €599) als eenmalige aankoop (add-to-cart); termijnbetaling op
        aanvraag. Geen btw-vermelding bij de prijs → vat unknown (§4.11),
        ondanks CRKBO-Instelling.
      source: site-hatha-2026-06
    hours_claimed:
      total: 200
      contact: null
      self_study: null
      supervised_teaching_practice: null
      breakdown_published: not_published
      contact_published: not_published
      source: site-hatha-2026-06
      note: >
        VOLLEDIG ONLINE & SELF-PACED: de "200 uur" is zelfstudie-materiaal
        (videolessen, leesmateriaal, quizzen, opdrachten), geen live cohort of
        geroosterde contacturen (YA-profiel toont 0 training dates).
        Persoonlijke begeleiding op aanvraag (e-mail/telefoon/videobellen). LET
        OP (descriptief, geen compliance-oordeel): de huidige YA-standaard STAAT
        100% distance learning TOE, maar eist min. 15% synchroon = 30u voor een
        RYS 200 (docent + studenten real-time samen, online of fysiek). Een
        volledig pre-recorded/self-paced 200u zonder geroosterde synchrone
        component haalt die 30u-synchroon-eis niet. De RYS dateert echter van
        2019 en is mogelijk niet ge-up-levelt naar de elevated standaard
        (legacy) — zie standards-era backlog-idee.
    composition:
      type: fixed_modular
    assessment_described:
      exists: yes
      continuous: yes
      quote: "Bij de module 'Yogales geven' zal je gevraagd worden om een yogales
        samen te stellen en is er aan het einde van de module een 1 op 1
        videogesprek waarbij je feedback krijgt op de door jou samengestelde
        les"
    track_record:
      first_seen_year: 2019
      source: ya-register-2026-06
      note: >
        RYS sinds 2019; doorlopende (continue) inschrijving — geen cohorten.
        Recente YA-reviews (jun 2026) bevestigen dat de opleiding actief wordt
        afgerond ('de videos, de uitleg ...').
    teachers:
      - person_id: dorien-bortels
        role: "hoofddocent / mede-oprichter"
      - person_id: yogi-madhav
        role: "gastdocent (traditionele Indiase Hatha/Sivananda asanales)"

